<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 专注板</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f6f3}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid #185FA5;outline-offset:1px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
textarea{resize:vertical}
.gantt-bar{transition:opacity .15s}
.gantt-bar:hover{opacity:.85}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

/* ───────────────── constants ───────────────── */
const PROJECTS=[
  {id:1,name:"工作",color:"#185FA5"},
  {id:2,name:"个人成长",color:"#0F6E56"},
  {id:3,name:"健康",color:"#993C1D"},
];
const BULLET_TYPES=[
  {sym:"•",label:"任务",color:"#185FA5"},
  {sym:"○",label:"事件",color:"#0F6E56"},
  {sym:"—",label:"笔记",color:"#666"},
  {sym:">",label:"已迁移",color:"#854F0B"},
  {sym:"×",label:"已取消",color:"#A32D2D"},
];

/* ───────────────── helpers ───────────────── */
function daysFromNow(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function todayStr(){return new Date().toISOString().split("T")[0];}
function fmtDate(str){
  if(!str)return"";
  const d=new Date(str+"T00:00:00");
  const diff=Math.round((d-new Date().setHours(0,0,0,0))/86400000);
  if(diff<0)return"已逾期";if(diff===0)return"今天";if(diff===1)return"明天";
  return`${d.getMonth()+1}/${d.getDate()}`;
}
function isOverdue(str){return str?new Date(str+"T00:00:00")<new Date().setHours(0,0,0,0):false;}
function getProj(id){return PROJECTS.find(p=>p.id===id)||{name:"无项目",color:"#888"};}
function yyyymmdd(d){return d.toISOString().split("T")[0];}
function addDays(str,n){const d=new Date(str+"T00:00:00");d.setDate(d.getDate()+n);return yyyymmdd(d);}
function daysBetween(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}

const BLANK_TASK={notes:"",attachments:[],subtasks:[],subtaskDone:[],expanded:false,startDate:"",done:false};
const SAMPLE=[
  {...BLANK_TASK,id:1,title:"准备季度汇报PPT",project:1,due:daysFromNow(5),startDate:daysFromNow(-2),priority:"urgent"},
  {...BLANK_TASK,id:2,title:"回复产品经理邮件",project:1,due:daysFromNow(0),startDate:todayStr(),priority:"today"},
  {...BLANK_TASK,id:3,title:"读《深度工作》第三章",project:2,due:daysFromNow(6),startDate:daysFromNow(1),priority:"normal",subtasks:["第一节笔记","第二节笔记","总结"],subtaskDone:[false,false,false]},
  {...BLANK_TASK,id:4,title:"预约牙医",project:3,due:daysFromNow(-1),startDate:daysFromNow(-3),priority:"urgent"},
  {...BLANK_TASK,id:5,title:"整理桌面文件",project:1,due:daysFromNow(8),startDate:daysFromNow(3),priority:"normal",done:true},
];

function saveTasks(t){try{localStorage.setItem("zj_tasks_v3",JSON.stringify(t));}catch(e){}}
function loadTasks(){try{const r=localStorage.getItem("zj_tasks_v3");if(r)return JSON.parse(r).map(t=>({...BLANK_TASK,...t}));}catch(e){}return null;}
function saveJournal(j){try{localStorage.setItem("zj_journal_v1",JSON.stringify(j));}catch(e){}}
function loadJournal(){try{const r=localStorage.getItem("zj_journal_v1");if(r)return JSON.parse(r);}catch(e){}return{};}

/* ───────────────── tiny UI ───────────────── */
function Check({checked,onClick,size=18}){
  return<div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",border:checked?"none":"1.5px solid #bbb",background:checked?"#185FA5":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
    {checked&&<span style={{color:"#fff",fontSize:size*.55,fontWeight:700}}>✓</span>}
  </div>;
}
function Tag({type}){
  const S={urgent:{bg:"#FCEBEB",c:"#A32D2D",l:"紧急"},today:{bg:"#FAEEDA",c:"#854F0B",l:"今天"},normal:{bg:"#f0ede8",c:"#777",l:"普通"}};
  const s=S[type]||S.normal;
  return<span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>;
}
function Btn({onClick,children,style={},primary=false}){
  return<button onClick={onClick} style={{padding:"7px 14px",border:primary?"none":"0.5px solid #ccc",background:primary?"#1a1a1a":"#fff",color:primary?"#fff":"#1a1a1a",borderRadius:7,fontSize:13,cursor:"pointer",...style}}>{children}</button>;
}

/* ───────────────── TaskRow ───────────────── */
function TaskRow({task,onToggle,onToggleSub,onExpand,onAI,onOpen}){
  const p=getProj(task.project);
  const ov=isOverdue(task.due)&&!task.done;
  return<div style={{marginBottom:5}}>
    <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,opacity:task.done?.55:1}}>
      <Check checked={task.done} onClick={()=>onToggle(task.id)}/>
      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onOpen(task)}>
        <div style={{fontSize:14,color:task.done?"#aaa":"#1a1a1a",textDecoration:task.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
        <div style={{display:"flex",gap:8,marginTop:2,alignItems:"center"}}>
          <span style={{fontSize:11,color:p.color}}>{p.name}</span>
          {task.notes&&<span style={{fontSize:11,color:"#bbb"}}>📝</span>}
          {task.attachments?.length>0&&<span style={{fontSize:11,color:"#bbb"}}>📎{task.attachments.length}</span>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
        {task.due&&<span style={{fontSize:11,color:ov?"#A32D2D":"#aaa",whiteSpace:"nowrap"}}>📅{fmtDate(task.due)}</span>}
        <Tag type={task.priority}/>
        {!task.done&&!task.subtasks.length&&<button onClick={()=>onAI(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>拆解↗</button>}
        {task.subtasks.length>0&&<button onClick={()=>onExpand(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>{task.expanded?"▲":"▼"}{task.subtasks.length}步</button>}
      </div>
    </div>
    {task.expanded&&task.subtasks.length>0&&<div style={{paddingLeft:40,marginTop:3,display:"flex",flexDirection:"column",gap:3}}>
      {task.subtasks.map((s,i)=><div key={i} onClick={()=>onToggleSub(task.id,i)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:6,fontSize:13,color:task.subtaskDone[i]?"#aaa":"#555",background:"#f7f6f3",cursor:"pointer",textDecoration:task.subtaskDone[i]?"line-through":"none"}}>
        <Check checked={task.subtaskDone[i]} size={14} onClick={e=>{e.stopPropagation();onToggleSub(task.id,i);}}/>
        {s}
      </div>)}
    </div>}
  </div>;
}

/* ───────────────── TaskDetail modal ───────────────── */
function TaskDetail({task,onClose,onSave,onDelete}){
  const [f,setF]=useState({title:task.title,project:task.project,due:task.due||"",startDate:task.startDate||"",priority:task.priority,notes:task.notes||"",attachments:[...(task.attachments||[])],subtasks:[...task.subtasks],subtaskDone:[...task.subtaskDone]});
  const [ns,setNs]=useState("");
  const fRef=useRef();
  function up(k,v){setF(x=>({...x,[k]:v}));}
  function addSub(){if(!ns.trim())return;setF(x=>({...x,subtasks:[...x.subtasks,ns.trim()],subtaskDone:[...x.subtaskDone,false]}));setNs("");}
  function rmSub(i){setF(x=>({...x,subtasks:x.subtasks.filter((_,j)=>j!==i),subtaskDone:x.subtaskDone.filter((_,j)=>j!==i)}));}
  function handleFile(e){
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setF(x=>({...x,attachments:[...x.attachments,{name:file.name,size:file.size,type:file.type,data:ev.target.result}]}));
      r.readAsDataURL(file);
    });
  }
  function fmtSize(b){return b<1024?b+"B":b<1048576?Math.round(b/1024)+"KB":(b/1048576).toFixed(1)+"MB";}
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"40px 16px"}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,boxShadow:"0 12px 48px rgba(0,0,0,.18)",marginBottom:40}}>
      <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
        <textarea value={f.title} onChange={e=>up("title",e.target.value)} style={{flex:1,fontSize:16,fontWeight:500,border:"none",outline:"none",resize:"none",lineHeight:1.4,background:"transparent",padding:0,minHeight:24}} rows={1} onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}/>
        <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer",lineHeight:1,flexShrink:0,marginTop:2}}>✕</button>
      </div>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["所属项目",<select value={f.project} onChange={e=>up("project",parseInt(e.target.value))} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
            ["优先级",<select value={f.priority} onChange={e=>up("priority",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天</option><option value="normal">⚪ 普通</option></select>],
            ["开始日期",<input type="date" value={f.startDate} onChange={e=>up("startDate",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
            ["截止日期",<input type="date" value={f.due} onChange={e=>up("due",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ].map(([l,el])=><div key={l}><div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{l}</div>{el}</div>)}
        </div>
        <div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>备注</div>
          <textarea value={f.notes} onChange={e=>up("notes",e.target.value)} placeholder="添加任何想记录的内容…" rows={3} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,lineHeight:1.6}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>子步骤</div>
          {f.subtasks.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,background:"#f7f6f3",marginBottom:4}}>
            <Check checked={f.subtaskDone[i]} size={14} onClick={()=>{const sd=[...f.subtaskDone];sd[i]=!sd[i];up("subtaskDone",sd);}}/>
            <span style={{flex:1,fontSize:13,color:f.subtaskDone[i]?"#aaa":"#444",textDecoration:f.subtaskDone[i]?"line-through":"none"}}>{s}</span>
            <button onClick={()=>rmSub(i)} style={{color:"#ccc",background:"none",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <input value={ns} onChange={e=>setNs(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSub()} placeholder="添加步骤，回车确认" style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
            <button onClick={addSub} style={{padding:"6px 12px",background:"#f0ede8",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,cursor:"pointer"}}>+添加</button>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>附件</div>
          {f.attachments.map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#f7f6f3",borderRadius:6,marginBottom:4}}>
            <span style={{fontSize:16}}>{a.type?.startsWith("image")?"🖼️":a.type?.includes("pdf")?"📄":"📎"}</span>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div><div style={{fontSize:11,color:"#aaa"}}>{fmtSize(a.size)}</div></div>
            <a href={a.data} download={a.name} style={{fontSize:11,color:"#185FA5",textDecoration:"none"}}>下载</a>
            <button onClick={()=>setF(x=>({...x,attachments:x.attachments.filter((_,j)=>j!==i)}))} style={{color:"#ccc",background:"none",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
          <button onClick={()=>fRef.current.click()} style={{padding:"6px 14px",border:"0.5px dashed #ccc",background:"#fafafa",borderRadius:6,fontSize:13,cursor:"pointer",color:"#666",width:"100%",marginTop:2}}>+ 上传文件</button>
          <input ref={fRef} type="file" multiple style={{display:"none"}} onChange={handleFile}/>
        </div>
      </div>
      <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>onDelete(task.id)} style={{fontSize:13,color:"#A32D2D",background:"none",border:"none",cursor:"pointer"}}>删除任务</button>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={onClose}>取消</Btn>
          <Btn primary onClick={()=>{if(f.title.trim())onSave({...task,...f});}}>保存</Btn>
        </div>
      </div>
    </div>
  </div>;
}

/* ───────────────── Gantt ───────────────── */
function GanttView({tasks,onOpen}){
  const today=todayStr();
  const activeTasks=tasks.filter(t=>t.startDate&&t.due);
  if(!activeTasks.length)return<div style={{padding:"40px 0",textAlign:"center",color:"#aaa",fontSize:14}}>没有设置开始日期的任务。<br/>在任务详情里添加「开始日期」后会显示在这里。</div>;

  const allDates=[...activeTasks.flatMap(t=>[t.startDate,t.due]),today];
  const minDate=allDates.reduce((a,b)=>a<b?a:b);
  const maxDate=allDates.reduce((a,b)=>a>b?a:b);
  const span=Math.max(daysBetween(minDate,maxDate)+1,14);
  const dates=Array.from({length:span},(_,i)=>addDays(minDate,i));
  const COL=36;
  const ROW=38;
  const LEFT=180;
  const todayX=daysBetween(minDate,today);

  return<div style={{overflowX:"auto",paddingBottom:8}}>
    <div style={{minWidth:LEFT+span*COL,fontFamily:"inherit"}}>
      {/* header */}
      <div style={{display:"flex",position:"sticky",top:0,background:"#f7f6f3",zIndex:2,borderBottom:"0.5px solid #e0ddd6",paddingBottom:4}}>
        <div style={{width:LEFT,flexShrink:0,fontSize:12,color:"#aaa",padding:"6px 8px"}}>任务</div>
        {dates.map(d=>{
          const isToday=d===today;
          const dom=new Date(d+"T00:00:00").getDate();
          const isMon=new Date(d+"T00:00:00").getDay()===1;
          return<div key={d} style={{width:COL,flexShrink:0,textAlign:"center",fontSize:10,color:isToday?"#185FA5":isMon?"#555":"#bbb",fontWeight:isToday?700:isMon?500:400,paddingTop:6,position:"relative"}}>
            {isToday?<span style={{background:"#185FA5",color:"#fff",borderRadius:10,padding:"1px 5px"}}>{dom}</span>:dom}
          </div>;
        })}
      </div>
      {/* rows */}
      {activeTasks.map(t=>{
        const p=getProj(t.project);
        const s=daysBetween(minDate,t.startDate);
        const e=daysBetween(minDate,t.due);
        const w=Math.max(e-s+1,1)*COL;
        const x=s*COL;
        const done=t.done;
        const subDone=t.subtasks.length?t.subtaskDone.filter(Boolean).length:null;
        const pct=subDone!==null?Math.round(subDone/t.subtasks.length*100):done?100:0;
        return<div key={t.id} style={{display:"flex",alignItems:"center",borderBottom:"0.5px solid #f0ede8",height:ROW,position:"relative"}}>
          <div style={{width:LEFT,flexShrink:0,padding:"0 8px",cursor:"pointer",overflow:"hidden"}} onClick={()=>onOpen(t)}>
            <div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:done?"#aaa":"#1a1a1a",textDecoration:done?"line-through":"none"}}>{t.title}</div>
            <div style={{fontSize:11,color:p.color}}>{p.name}</div>
          </div>
          {/* grid lines */}
          {dates.map((d,i)=><div key={d} style={{position:"absolute",left:LEFT+i*COL,top:0,width:COL,height:"100%",background:d===today?"rgba(24,95,165,.05)":"transparent",borderRight:i%7===6?"0.5px solid #e0ddd6":"none"}}/>)}
          {/* bar */}
          <div className="gantt-bar" onClick={()=>onOpen(t)} style={{position:"absolute",left:LEFT+x,width:w,height:22,top:(ROW-22)/2,borderRadius:5,background:done?"#ddd":p.color,cursor:"pointer",overflow:"hidden",display:"flex",alignItems:"center"}}>
            {pct>0&&!done&&<div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,.3)",borderRadius:"5px 0 0 5px"}}/>}
            {w>60&&<span style={{position:"absolute",left:8,fontSize:11,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",maxWidth:w-16}}>{t.title}</span>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

/* ───────────────── Project Panel ───────────────── */
function ProjectPanel({project,tasks,onOpen,onBack}){
  const pts=tasks.filter(t=>t.project===project.id);
  const done=pts.filter(t=>t.done).length;
  const pct=pts.length?Math.round(done/pts.length*100):0;
  const [tab,setTab]=useState("list");
  return<div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={onBack} style={{fontSize:13,color:"#666",background:"none",border:"none",cursor:"pointer"}}>← 返回</button>
      <span style={{width:10,height:10,borderRadius:"50%",background:project.color,flexShrink:0}}/>
      <span style={{fontSize:16,fontWeight:500}}>{project.name}</span>
    </div>
    {/* stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
      {[["总任务",pts.length],["已完成",done],["进行中",pts.filter(t=>!t.done&&t.startDate<=todayStr()).length],["完成率",pct+"%"]].map(([l,v])=>(
        <div key={l} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:20,fontWeight:500}}>{v}</div>
          <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>
    {/* progress bar */}
    <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"14px 16px",marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
        <span style={{color:"#555"}}>整体进度</span>
        <span style={{fontWeight:500}}>{pct}%</span>
      </div>
      <div style={{height:8,background:"#f0ede8",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:project.color,borderRadius:4,transition:"width .3s"}}/>
      </div>
    </div>
    {/* tabs */}
    <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"0.5px solid #e0ddd6"}}>
      {[["list","任务列表"],["gantt","甘特图"]].map(([id,l])=>(
        <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 18px",fontSize:13,background:"none",border:"none",cursor:"pointer",color:tab===id?"#1a1a1a":"#888",borderBottom:tab===id?"2px solid #1a1a1a":"2px solid transparent",fontWeight:tab===id?500:400}}>
          {l}
        </button>
      ))}
    </div>
    {tab==="list"&&pts.map(t=>{
      const p=getProj(t.project);
      const ov=isOverdue(t.due)&&!t.done;
      return<div key={t.id} onClick={()=>onOpen(t)} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"10px 14px",marginBottom:6,cursor:"pointer",opacity:t.done?.6:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:t.done?"#ddd":project.color,flexShrink:0}}/>
          <span style={{fontSize:14,flex:1,color:t.done?"#aaa":"#1a1a1a",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
          {t.due&&<span style={{fontSize:11,color:ov?"#A32D2D":"#aaa"}}>📅{fmtDate(t.due)}</span>}
          <Tag type={t.priority}/>
        </div>
        {t.subtasks.length>0&&<div style={{marginTop:6,paddingLeft:18}}>
          <div style={{height:4,background:"#f0ede8",borderRadius:2,overflow:"hidden",marginBottom:3}}>
            <div style={{height:"100%",width:`${Math.round(t.subtaskDone.filter(Boolean).length/t.subtasks.length*100)}%`,background:project.color,borderRadius:2}}/>
          </div>
          <div style={{fontSize:11,color:"#aaa"}}>{t.subtaskDone.filter(Boolean).length}/{t.subtasks.length} 步骤完成</div>
        </div>}
      </div>;
    })}
    {tab==="gantt"&&<GanttView tasks={pts} onOpen={onOpen}/>}
  </div>;
}

/* ───────────────── Calendar + Bullet Journal ───────────────── */
function CalendarView({tasks,onAddTask}){
  const [curMonth,setCurMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selDay,setSelDay]=useState(todayStr());
  const [journal,setJournal]=useState(loadJournal);
  const [newEntry,setNewEntry]=useState("");
  const [newType,setNewType]=useState("•");
  const today=todayStr();

  function saveJ(j){setJournal(j);saveJournal(j);}
  function getDayEntries(d){return journal[d]||[];}

  function addEntry(){
    if(!newEntry.trim())return;
    const entry={id:Date.now(),sym:newType,text:newEntry.trim(),done:false};
    const updated={...journal,[selDay]:[...getDayEntries(selDay),entry]};
    saveJ(updated);
    if(newType==="•"){
      // sync to task list
      onAddTask({title:newEntry.trim(),project:1,due:selDay,priority:"normal",fromJournal:true});
    }
    setNewEntry("");
  }

  function toggleEntry(d,id){
    const entries=getDayEntries(d).map(e=>e.id===id?{...e,done:!e.done}:e);
    saveJ({...journal,[d]:entries});
  }
  function deleteEntry(d,id){
    saveJ({...journal,[d]:getDayEntries(d).filter(e=>e.id!==id)});
  }

  // calendar grid
  const firstDay=new Date(curMonth.y,curMonth.m,1);
  const lastDay=new Date(curMonth.y,curMonth.m+1,0);
  const startDow=(firstDay.getDay()+6)%7; // Mon=0
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=lastDay.getDate();d++)cells.push(new Date(curMonth.y,curMonth.m,d));

  function hasTasks(d){
    const s=yyyymmdd(d);
    return tasks.some(t=>t.due===s)||getDayEntries(s).length>0;
  }
  function monthName(){return new Date(curMonth.y,curMonth.m,1).toLocaleDateString("zh-CN",{year:"numeric",month:"long"});}

  const selEntries=getDayEntries(selDay);
  const selTasks=tasks.filter(t=>t.due===selDay);

  return<div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
    {/* left: calendar */}
    <div style={{width:280,flexShrink:0}}>
      <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid #e0ddd6"}}>
          <button onClick={()=>setCurMonth(m=>m.m===0?{y:m.y-1,m:11}:{y:m.y,m:m.m-1})} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#666"}}>‹</button>
          <span style={{fontSize:14,fontWeight:500}}>{monthName()}</span>
          <button onClick={()=>setCurMonth(m=>m.m===11?{y:m.y+1,m:0}:{y:m.y,m:m.m+1})} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#666"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"8px 8px 0"}}>
          {["一","二","三","四","五","六","日"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"#bbb",padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 8px 8px",gap:2}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={`e${i}`}/>;
            const ds=yyyymmdd(d);
            const isToday=ds===today;
            const isSel=ds===selDay;
            const hasData=hasTasks(d);
            return<div key={ds} onClick={()=>setSelDay(ds)} style={{
              aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              borderRadius:8,cursor:"pointer",position:"relative",
              background:isSel?"#1a1a1a":isToday?"#EBF3FB":"transparent",
              color:isSel?"#fff":isToday?"#185FA5":"#1a1a1a",
              fontWeight:isToday||isSel?600:400,fontSize:13,
            }}>
              {d.getDate()}
              {hasData&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,.6)":isToday?"#185FA5":"#bbb",position:"absolute",bottom:3}}/>}
            </div>;
          })}
        </div>
      </div>
      {/* bullet type legend */}
      <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"12px 14px",marginTop:10}}>
        <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>符号说明</div>
        {BULLET_TYPES.map(b=><div key={b.sym} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
          <span style={{width:20,textAlign:"center",fontWeight:700,color:b.color,fontSize:14}}>{b.sym}</span>
          <span style={{fontSize:12,color:"#555"}}>{b.label}</span>
        </div>)}
      </div>
    </div>

    {/* right: daily log */}
    <div style={{flex:1,minWidth:0}}>
      <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px"}}>
        <div style={{fontSize:15,fontWeight:500,marginBottom:14,color:"#1a1a1a"}}>
          {new Date(selDay+"T00:00:00").toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"long"})}
          {selDay===today&&<span style={{fontSize:12,color:"#185FA5",background:"#EBF3FB",padding:"2px 8px",borderRadius:6,marginLeft:8}}>今天</span>}
        </div>

        {/* tasks due this day */}
        {selTasks.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>截止任务</div>
          {selTasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,background:"#f7f6f3",marginBottom:4}}>
            <span style={{fontSize:12,color:getProj(t.project).color}}>●</span>
            <span style={{fontSize:13,flex:1,color:t.done?"#aaa":"#1a1a1a",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
            <Tag type={t.priority}/>
          </div>)}
          <div style={{height:"0.5px",background:"#e0ddd6",margin:"12px 0"}}/>
        </div>}

        {/* journal entries */}
        {selEntries.length>0&&<div style={{marginBottom:14}}>
          {selEntries.map(e=>{
            const bt=BULLET_TYPES.find(b=>b.sym===e.sym)||BULLET_TYPES[2];
            return<div key={e.id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",borderBottom:"0.5px solid #f0ede8"}}>
              <button onClick={()=>toggleEntry(selDay,e.id)} style={{width:24,height:24,flexShrink:0,background:"none",border:"none",cursor:"pointer",fontSize:15,color:bt.color,fontWeight:700,lineHeight:1,padding:0,marginTop:1}}>{e.sym}</button>
              <span style={{flex:1,fontSize:14,color:e.done?"#aaa":"#1a1a1a",textDecoration:e.done?"line-through":"none",lineHeight:1.5}}>{e.text}</span>
              <button onClick={()=>deleteEntry(selDay,e.id)} style={{color:"#ddd",background:"none",border:"none",cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0}}>✕</button>
            </div>;
          })}
        </div>}

        {selEntries.length===0&&selTasks.length===0&&<div style={{fontSize:13,color:"#ccc",padding:"16px 0",textAlign:"center"}}>这天还没有记录</div>}

        {/* add entry */}
        <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center"}}>
          <select value={newType} onChange={e=>setNewType(e.target.value)} style={{width:72,padding:"7px 6px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>
            {BULLET_TYPES.map(b=><option key={b.sym} value={b.sym}>{b.sym} {b.label}</option>)}
          </select>
          <input value={newEntry} onChange={e=>setNewEntry(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry()} placeholder={newType==="•"?"输入任务（自动同步到任务列表）…":"输入记录…"} style={{flex:1,padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
          <button onClick={addEntry} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>记录</button>
        </div>
        <div style={{fontSize:11,color:"#bbb",marginTop:6}}>「•任务」条目会自动同步到任务列表</div>
      </div>
    </div>
  </div>;
}

/* ───────────────── AI Panel ───────────────── */
function AIPanel({open,onClose,tasks,onSubtasksAdded,sendRef}){
  const [msgs,setMsgs]=useState([{role:"ai",text:"你好！我可以帮你：\n• 把大任务拆成小步骤\n• 生成今日重点计划\n• 帮你理清思路\n\n有什么需要帮忙的？"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("zj_gemini_key")||"");
  const [showKey,setShowKey]=useState(false);
  const msgRef=useRef(null);
  useEffect(()=>{if(msgRef.current)msgRef.current.scrollTop=9999;},[msgs]);
  useEffect(()=>{if(sendRef)sendRef.current=(task)=>send(`帮我把这个任务拆成3-5个具体小步骤：${task.title}`,task.id);});
  function saveKey(k){setApiKey(k);localStorage.setItem("zj_gemini_key",k);setShowKey(false);}
  async function send(text,btid){
    if(!text||loading)return;
    if(!apiKey){setShowKey(true);return;}
    const msg=text.trim();setInput("");setMsgs(m=>[...m,{role:"user",text:msg}]);setLoading(true);
    const ctx=tasks.filter(t=>!t.done).map(t=>`- ${t.title}（${getProj(t.project).name}，${t.priority}）`).join("\n");
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`你是一个ADHD专属效率助手。回答简短有力、具体可执行。用户当前待办：\n${ctx}\n\n拆解任务时每步用"•"开头，控制在3-5步。\n\n用户问：${msg}`}]}]}),
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||"出错了，请重试。";
      setMsgs(m=>[...m,{role:"ai",text:reply}]);
      if(btid){
        const steps=reply.split("\n").filter(l=>l.trim().startsWith("•")).map(l=>l.replace(/^•\s*/,"").trim()).filter(Boolean);
        if(steps.length)onSubtasksAdded(btid,steps);
      }
    }catch(e){setMsgs(m=>[...m,{role:"ai",text:`错误：${e.message}`}]);}
    setLoading(false);
  }
  if(!open)return null;
  return<div style={{position:"fixed",right:0,top:0,height:"100%",width:300,background:"#fff",borderLeft:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",zIndex:100,boxShadow:"-4px 0 20px rgba(0,0,0,.08)"}}>
    <div style={{padding:"14px 16px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span style={{fontSize:14,fontWeight:500}}>✨ AI助手 <span style={{fontSize:11,color:"#aaa"}}>(Gemini)</span></span>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setShowKey(v=>!v)} style={{fontSize:11,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"2px 7px",cursor:"pointer",color:apiKey?"#0F6E56":"#cc6600"}}>{apiKey?"🔑 已设置":"🔑 设置Key"}</button>
        <button onClick={onClose} style={{fontSize:12,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer"}}>关闭</button>
      </div>
    </div>
    {showKey&&<div style={{padding:12,background:"#fffbe6",borderBottom:"0.5px solid #e8e0c0"}}>
      <div style={{fontSize:12,color:"#666",marginBottom:6}}>Gemini API Key：</div>
      <div style={{display:"flex",gap:6}}>
        <input defaultValue={apiKey} placeholder="AIza..." id="gkey" style={{flex:1,fontSize:12,padding:"5px 8px",border:"0.5px solid #ccc",borderRadius:5}}/>
        <button onClick={()=>saveKey(document.getElementById("gkey").value.trim())} style={{fontSize:12,padding:"5px 10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:5,cursor:"pointer"}}>保存</button>
      </div>
      <div style={{fontSize:11,color:"#999",marginTop:6}}>
        获取：<a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"#185FA5"}}>aistudio.google.com</a>
      </div>
    </div>}
    <div ref={msgRef} style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
      {msgs.map((m,i)=><div key={i} style={{fontSize:13,lineHeight:1.65,background:m.role==="ai"?"#f7f6f3":"transparent",padding:m.role==="ai"?"10px 12px":"0",borderRadius:8,color:m.role==="ai"?"#1a1a1a":"#666",textAlign:m.role==="user"?"right":"left",fontStyle:m.role==="user"?"italic":"normal",whiteSpace:"pre-wrap"}}>{m.text}</div>)}
      {loading&&<div style={{fontSize:13,color:"#aaa",fontStyle:"italic"}}>思考中…</div>}
    </div>
    <div style={{padding:12,borderTop:"0.5px solid #e0ddd6",display:"flex",gap:8}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="问我任何事…" style={{flex:1,fontSize:13,padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6}}/>
      <button onClick={()=>send(input)} style={{fontSize:13,padding:"7px 12px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>发送</button>
    </div>
  </div>;
}

/* ───────────────── App ───────────────── */
function App(){
  const [tasks,setTasks]=useState(()=>loadTasks()||SAMPLE);
  const [nextId,setNextId]=useState(()=>{const t=loadTasks();return t?Math.max(...t.map(x=>x.id))+1:6;});
  const [view,setView]=useState("today");
  const [aiOpen,setAiOpen]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [nTask,setNTask]=useState({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});
  const [quick,setQuick]=useState("");
  const [detail,setDetail]=useState(null);
  const [projView,setProjView]=useState(null);
  const aiRef=useRef(null);
  useEffect(()=>{saveTasks(tasks);},[tasks]);

  function toggleTask(id){setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));}
  function toggleSub(tid,i){setTasks(ts=>ts.map(t=>{if(t.id!==tid)return t;const sd=[...t.subtaskDone];sd[i]=!sd[i];return{...t,subtaskDone:sd};}));}
  function toggleExpand(id){setTasks(ts=>ts.map(t=>t.id===id?{...t,expanded:!t.expanded}:t));}
  function saveDetail(u){setTasks(ts=>ts.map(t=>t.id===u.id?u:t));setDetail(null);}
  function delTask(id){setTasks(ts=>ts.filter(t=>t.id!==id));setDetail(null);}
  function addSubsFromAI(tid,steps){setTasks(ts=>ts.map(t=>t.id===tid?{...t,subtasks:steps,subtaskDone:steps.map(()=>false),expanded:true}:t));}
  function aiBreak(id){const t=tasks.find(t=>t.id===id);if(!t)return;setAiOpen(true);setTimeout(()=>{if(aiRef.current)aiRef.current(t);},150);}

  function addTask(partial){
    const t={...BLANK_TASK,...partial,id:nextId};
    setTasks(ts=>[...ts,t]);setNextId(n=>n+1);
  }
  function addQuick(){if(!quick.trim())return;addTask({title:quick.trim(),project:1,due:"",priority:"normal"});setQuick("");}
  function addModal(){if(!nTask.title.trim())return;addTask(nTask);setShowAdd(false);setNTask({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});}

  const focus=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today"||isOverdue(t.due))).slice(0,3);
  const other=tasks.filter(t=>!t.done&&!focus.find(f=>f.id===t.id));
  const done=tasks.filter(t=>t.done);
  const tProps={onToggle:toggleTask,onToggleSub:toggleSub,onExpand:toggleExpand,onAI:aiBreak,onOpen:setDetail};

  const navTop=[{id:"today",l:"今日焦点",i:"☀️"},{id:"all",l:"所有任务",i:"📋"},{id:"calendar",l:"日历",i:"📅"},{id:"projects",l:"项目",i:"📁"}];

      <div style={{padding:"0 16px 20px",fontSize:15,fontWeight:600}}>🧠 专注板</div>

      <div style={{fontSize:11,color:"#bbb",padding:"14px 16px 4px",textTransform:"uppercase",letterSpacing:".06em"}}>我的项目</div>
      {PROJECTS.map(p=><div key={p.id} onClick={()=>{setView("projects");setProjView(p);}} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 16px",fontSize:13,color:projView?.id===p.id?"#1a1a1a":"#666",background:projView?.id===p.id?"#f0ede8":"transparent",cursor:"pointer"}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}/>{p.name}
      </div>)}
      <div style={{flex:1}}/>
      <div onClick={()=>setAiOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 16px",fontSize:13,color:"#185FA5",cursor:"pointer",background:aiOpen?"#EBF3FB":"transparent",borderTop:"0.5px solid #e0ddd6"}}>
        ✨ AI助手

    {/* main */}

        <span style={{fontSize:16,fontWeight:500}}>

          <span style={{fontSize:13,color:"#aaa"}}>{new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"})}</span>

            const pct=pts.length?Math.round(d/pts.length*100):0;
            return<div key={p.id} onClick={()=>setProjView(p)} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px",marginBottom:12,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:p.color,flexShrink:0}}/>
                <span style={{fontSize:15,fontWeight:500}}>{p.name}</span>
                <span style={{marginLeft:"auto",fontSize:13,color:"#aaa"}}>{d}/{pts.length} 完成</span>
              </div>
              <div style={{height:4,background:"#f0ede8",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:p.color,borderRadius:2}}/>
              </div>
              <div style={{fontSize:12,color:"#bbb",marginTop:6}}>{pts.filter(t=>!t.done&&t.priority==="urgent").length} 个紧急任务</div>
            </div>;
          })}</>
        )}
      </div>

      {/* quick add bar */}
      <div style={{background:"#fff",borderTop:"0.5px solid #e0ddd6",padding:"12px 24px",display:"flex",gap:10,flexShrink:0}}>
        <input value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuick()} placeholder="快速添加任务…" style={{flex:1,padding:"8px 12px",border:"0.5px solid #ccc",borderRadius:7,fontSize:13}}/>
        <button onClick={addQuick} style={{padding:"8px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>添加↵</button>
        <button onClick={()=>setAiOpen(true)} style={{padding:"8px 14px",border:"0.5px solid #B5D4F4",background:"#EBF3FB",color:"#185FA5",borderRadius:7,fontSize:13,cursor:"pointer"}}>✨ AI</button>
      </div>
    </div>

    <AIPanel open={aiOpen} onClose={()=>setAiOpen(false)} tasks={tasks} onSubtasksAdded={addSubsFromAI} sendRef={aiRef}/>
    {detail&&<TaskDetail task={detail} onClose={()=>setDetail(null)} onSave={saveDetail} onDelete={delTask}/>}

    {/* add modal */}
    {showAdd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:400,boxShadow:"0 8px 40px rgba(0,0,0,.15)"}}>
        <div style={{fontSize:15,fontWeight:500,marginBottom:16}}>添加任务</div>
        {[["任务名称",<input key="t" value={nTask.title} onChange={e=>setNTask(n=>({...n,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addModal()} placeholder="输入任务名称…" autoFocus style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["所属项目",<select key="p" value={nTask.project} onChange={e=>setNTask(n=>({...n,project:parseInt(e.target.value)}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
          ["开始日期",<input key="s" type="date" value={nTask.startDate} onChange={e=>setNTask(n=>({...n,startDate:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["截止日期",<input key="d" type="date" value={nTask.due} onChange={e=>setNTask(n=>({...n,due:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["优先级",<select key="pr" value={nTask.priority} onChange={e=>setNTask(n=>({...n,priority:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天完成</option><option value="normal">⚪ 普通</option></select>],
        ].map(([l,el])=><div key={l} style={{marginBottom:12}}><div style={{fontSize:12,color:"#777",marginBottom:4}}>{l}</div>{el}</div>)}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:18}}>
          <Btn onClick={()=>setShowAdd(false)}>取消</Btn>
          <Btn primary onClick={addModal}>保存任务</Btn>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
