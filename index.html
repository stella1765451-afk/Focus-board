// ══════════════════════════════════════════
// §ROUTINE_MGR  Routine管理器 RoutineManager
// ══════════════════════════════════════════
function RoutineManager({onClose,darkMode}){
  const [routines,setRoutines]=useState(loadRoutines);
  const [editing,setEditing]=useState(null); // routine id being edited
  const [newStepTitle,setNewStepTitle]=useState("");

  function save(r){setRoutines(r);saveRoutines(r);}
  function addRoutine(){
    const id=Date.now();
    const r={id,name:"新流程",color:CAT_PALETTES[Math.floor(Math.random()*CAT_PALETTES.length)][0],emoji:"⚡",scheduleType:"anytime",steps:[]};
    const updated=[...routines,r];save(updated);setEditing(id);
  }
  function deleteRoutine(id){if(confirm("删除这个流程？")){save(routines.filter(r=>r.id!==id));if(editing===id)setEditing(null);}}
  function updateRoutine(id,patch){save(routines.map(r=>r.id===id?{...r,...patch}:r));}
  function addStep(rId,type){
    const step={id:Date.now(),type,title:type==="task_slot"?"":newStepTitle||"新步骤",duration:10,note:"",taskIndex:0,label:"深度专注"};
    updateRoutine(rId,{steps:[...(routines.find(r=>r.id===rId)?.steps||[]),step]});
    setNewStepTitle("");
  }
  function removeStep(rId,sId){updateRoutine(rId,{steps:routines.find(r=>r.id===rId).steps.filter(s=>s.id!==sId)});}
  function updateStep(rId,sId,patch){updateRoutine(rId,{steps:routines.find(r=>r.id===rId).steps.map(s=>s.id===sId?{...s,...patch}:s)});}
  function moveStep(rId,idx,dir){
    const r=routines.find(r=>r.id===rId);if(!r)return;
    const steps=[...r.steps];const ni=idx+dir;
    if(ni<0||ni>=steps.length)return;
    [steps[idx],steps[ni]]=[steps[ni],steps[idx]];
    updateRoutine(rId,{steps});
  }

  const dm=darkMode;
  const bg=dm?"#1a1728":"#fff";
  const border=dm?"rgba(255,255,255,.1)":"#e0ddd6";
  const text=dm?"#f0eaff":"#1a1a1a";
  const sub=dm?"rgba(255,255,255,.4)":"#888";

  const editingRoutine=routines.find(r=>r.id===editing);
  const EMOJIS=["🌅","📚","🌙","💪","🎨","⚡","🎯","🧘","☕","🖥️","🎵","✨"];
  const COLORS=["#FFB3C6","#A8DAFF","#D4B8FF","#B8F0D8","#FFCBA4","#FFF0A0"];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:500,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:bg,borderRadius:14,width:"100%",maxWidth:560,marginBottom:40,boxShadow:"0 12px 48px rgba(0,0,0,.25)"}} className="fade-in">
        <div style={{padding:"18px 20px 14px",borderBottom:`0.5px solid ${border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:15,fontWeight:600,color:text}}>▶ Routine 管理</div>
          <button onClick={onClose} style={{fontSize:18,color:sub,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>

        {/* Routine list */}
        <div style={{padding:"12px 20px",display:"flex",flexDirection:"column",gap:8,maxHeight:"35vh",overflowY:"auto"}}>
          {routines.map(r=>(
            <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:9,border:`1.5px solid ${editing===r.id?r.color:border}`,background:editing===r.id?(dm?r.color+"22":r.color+"18"):dm?"rgba(255,255,255,.03)":"#fafaf8",cursor:"pointer"}} onClick={()=>setEditing(r.id===editing?null:r.id)}>
              <span style={{fontSize:18}}>{r.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:text}}>{r.name}</div>
                <div style={{fontSize:11,color:sub}}>{r.steps.length}个步骤 · 约{r.steps.reduce((a,s)=>a+(s.duration||0),0)}分钟</div>
              </div>
              <button onClick={e=>{e.stopPropagation();deleteRoutine(r.id);}} style={{fontSize:12,color:"#bbb",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>🗑</button>
            </div>
          ))}
          <button onClick={addRoutine} style={{padding:"9px",border:`1.5px dashed ${border}`,borderRadius:9,background:"transparent",fontSize:13,color:sub,cursor:"pointer"}}>+ 新建流程</button>
        </div>

        {/* Step editor */}
        {editingRoutine&&(
          <div style={{borderTop:`0.5px solid ${border}`,padding:"14px 20px"}}>
            {/* Meta */}
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {EMOJIS.map(e=><button key={e} onClick={()=>updateRoutine(editingRoutine.id,{emoji:e})} style={{width:28,height:28,borderRadius:6,border:`1.5px solid ${editingRoutine.emoji===e?"#1a1a1a":border}`,background:"transparent",cursor:"pointer",fontSize:14}}>{e}</button>)}
              </div>
              <input value={editingRoutine.name} onChange={e=>updateRoutine(editingRoutine.id,{name:e.target.value})} style={{flex:1,minWidth:120,padding:"5px 8px",border:`0.5px solid ${border}`,borderRadius:6,fontSize:13,background:dm?"#2a2440":"#fff",color:text}}/>
              <div style={{display:"flex",gap:4}}>
                {COLORS.map(c=><button key={c} onClick={()=>updateRoutine(editingRoutine.id,{color:c})} style={{width:20,height:20,borderRadius:"50%",background:c,border:`2px solid ${editingRoutine.color===c?"#1a1a1a":"transparent"}`,cursor:"pointer"}}/>)}
              </div>
            </div>
            {/* Steps */}
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"28vh",overflowY:"auto",marginBottom:10}}>
              {editingRoutine.steps.map((s,si)=>(
                <div key={s.id} style={{display:"flex",gap:6,alignItems:"center",padding:"7px 10px",borderRadius:7,background:s.type==="task_slot"?(dm?"rgba(168,218,255,.15)":"#EBF3FB"):(dm?"rgba(255,255,255,.04)":"#f7f6f3"),border:`0.5px solid ${s.type==="task_slot"?"#A8DAFF66":border}`}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <button onClick={()=>moveStep(editingRoutine.id,si,-1)} style={{fontSize:9,color:sub,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>▲</button>
                    <button onClick={()=>moveStep(editingRoutine.id,si,1)} style={{fontSize:9,color:sub,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>▼</button>
                  </div>
                  <span style={{fontSize:12,color:s.type==="task_slot"?"#185FA5":sub,flexShrink:0}}>{s.type==="task_slot"?"🎯":"⚙️"}</span>
                  <input value={s.type==="task_slot"?(s.label||"深度专注"):s.title} onChange={e=>updateStep(editingRoutine.id,s.id,s.type==="task_slot"?{label:e.target.value}:{title:e.target.value})} style={{flex:1,minWidth:60,fontSize:12,border:`0.5px solid ${border}`,borderRadius:4,padding:"3px 6px",background:dm?"#2a2440":"#fff",color:text}}/>
                  <input type="number" value={s.duration} onChange={e=>updateStep(editingRoutine.id,s.id,{duration:parseInt(e.target.value)||5})} style={{width:46,fontSize:12,border:`0.5px solid ${border}`,borderRadius:4,padding:"3px 5px",background:dm?"#2a2440":"#fff",color:text}} min={1} max={180}/>
                  <span style={{fontSize:11,color:sub,flexShrink:0}}>分钟</span>
                  {s.type==="fixed"&&<input value={s.note||""} onChange={e=>updateStep(editingRoutine.id,s.id,{note:e.target.value})} placeholder="提示（可选）" style={{flex:1.2,minWidth:60,fontSize:11,border:`0.5px solid ${border}`,borderRadius:4,padding:"3px 6px",color:sub,background:dm?"#2a2440":"#fff"}}/>}
                  <button onClick={()=>removeStep(editingRoutine.id,s.id)} style={{fontSize:11,color:"#bbb",background:"none",border:"none",cursor:"pointer"}}>✕</button>
                </div>
              ))}
            </div>
            {/* Add step buttons */}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input value={newStepTitle} onChange={e=>setNewStepTitle(e.target.value)} placeholder="步骤名称…" onKeyDown={e=>e.key==="Enter"&&newStepTitle.trim()&&addStep(editingRoutine.id,"fixed")}
                style={{flex:1,padding:"6px 8px",border:`0.5px solid ${border}`,borderRadius:6,fontSize:12,background:dm?"#2a2440":"#fff",color:text}}/>
              <button onClick={()=>newStepTitle.trim()&&addStep(editingRoutine.id,"fixed")} style={{padding:"6px 10px",background:dm?"rgba(255,255,255,.1)":"#f0ede8",border:`0.5px solid ${border}`,borderRadius:6,fontSize:12,color:text,cursor:"pointer"}}>⚙️固定步骤</button>
              <button onClick={()=>addStep(editingRoutine.id,"task_slot")} style={{padding:"6px 10px",background:"#EBF3FB",border:"0.5px solid #A8DAFF",borderRadius:6,fontSize:12,color:"#185FA5",cursor:"pointer"}}>🎯任务槽</button>
            </div>
          </div>
        )}
        <div style={{padding:"12px 20px",borderTop:`0.5px solid ${border}`}}>
          <button onClick={onClose} style={{width:"100%",padding:"10px",background:dm?"rgba(255,255,255,.1)":"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer"}}>完成</button>
        </div>
      </div>
    </div>
  );
}

// ── Routine Selector ──
// ══════════════════════════════════════════
// §ROUTINE_SEL  Routine选择器 RoutineSelector
// ══════════════════════════════════════════
function RoutineSelector({tasks,onStart,onClose,darkMode}){
  const routines=loadRoutines();
  const todayTasks=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today")).slice(0,4);
  const dm=darkMode;
  const bg=dm?"#1a1728":"#fff";
  const border=dm?"rgba(255,255,255,.1)":"#e0ddd6";
  const text=dm?"#f0eaff":"#1a1a1a";
  const sub=dm?"rgba(255,255,255,.4)":"#888";

  return(
    <div style={{position:"fixed",inset:0,background:dm?"rgba(0,0,0,.7)":"rgba(0,0,0,.45)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:bg,borderRadius:16,width:"100%",maxWidth:480,boxShadow:"0 16px 56px rgba(0,0,0,.25)"}} className="fade-in">
        <div style={{padding:"20px 20px 14px",borderBottom:`0.5px solid ${border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:15,fontWeight:600,color:text}}>选择今天的流程</div>
          <button onClick={onClose} style={{fontSize:18,color:sub,background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>

        {todayTasks.length>0&&(
          <div style={{padding:"10px 20px",background:dm?"rgba(168,218,255,.08)":"#EBF3FB",borderBottom:`0.5px solid ${border}`}}>
            <div style={{fontSize:11,color:"#185FA5",marginBottom:6,fontWeight:500}}>今日任务（将自动填入任务槽）</div>
            {todayTasks.map((t,i)=>(
              <div key={t.id} style={{fontSize:12,color:dm?"rgba(168,218,255,.8)":"#185FA5",padding:"2px 0"}}>
                {i+1}. {t.title.length>30?t.title.slice(0,30)+"…":t.title}
              </div>
            ))}
          </div>
        )}

        <div style={{padding:"14px 20px",display:"flex",flexDirection:"column",gap:10}}>
          {routines.map(r=>{
            const slots=r.steps.filter(s=>s.type==="task_slot");
            const totalMins=r.steps.reduce((a,s)=>a+(s.duration||0),0);
            return(
              <div key={r.id} onClick={()=>onStart(r)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:12,border:`2px solid ${border}`,cursor:"pointer",transition:"all .15s",background:dm?"rgba(255,255,255,.03)":"#fafaf8"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=r.color;e.currentTarget.style.background=r.color+(dm?"22":"18");}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=border;e.currentTarget.style.background=dm?"rgba(255,255,255,.03)":"#fafaf8";}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:r.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{r.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:text,marginBottom:3}}>{r.name}</div>
                  <div style={{fontSize:11,color:sub}}>
                    {totalMins}分钟 · {r.steps.length}个步骤
                    {slots.length>0&&<span style={{color:"#185FA5"}}> · {slots.length}个任务槽</span>}
                  </div>
                </div>
                <span style={{fontSize:18,color:r.color}}>▶</span>
              </div>
            );
          })}
        </div>
        <div style={{padding:"12px 20px 16px",borderTop:`0.5px solid ${border}`}}>
          <div style={{fontSize:12,color:sub,textAlign:"center"}}>没有合适的流程？去侧边栏"▶ Routine管理"自定义</div>
        </div>
      </div>
    </div>
  );
}

// ── Routine Fullscreen Executor ──
// ══════════════════════════════════════════
// §ROUTINE_EXEC  Routine执行引擎 RoutineExecutor
// ══════════════════════════════════════════
function RoutineExecutor({routine,tasks,onComplete,onExit,onTaskDone,darkMode}){
  const dm=darkMode;

  // Bind task slots to actual tasks
  const todayTasks=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today"));
  const resolvedSteps=routine.steps.map(s=>{
    if(s.type!=="task_slot")return{...s,resolved:null};
    const task=todayTasks[s.taskIndex]||null;
    return{...s,resolved:task};
  });

  const [stepIdx,setStepIdx]=useState(0);
  const [secsLeft,setSecsLeft]=useState((resolvedSteps[0]?.duration||5)*60);
  const [paused,setPaused]=useState(false);
  const [done,setDone]=useState(false);
  const [showExit,setShowExit]=useState(false);
  const [completedTaskIds,setCompletedTaskIds]=useState([]);
  const [showCheckIn,setShowCheckIn]=useState(null);
  const [catState,setCatState]=useState("idle");
  const [stepKey,setStepKey]=useState(0); // for animation reset

  const cur=resolvedSteps[stepIdx];
  const totalSecs=resolvedSteps.reduce((a,s)=>a+(s.duration||0)*60,0);
  const doneSecs=resolvedSteps.slice(0,stepIdx).reduce((a,s)=>a+(s.duration||0)*60,0)+(resolvedSteps[stepIdx]?.duration||0)*60-secsLeft;
  const progress=totalSecs>0?doneSecs/totalSecs:0;

  // Countdown
  useEffect(()=>{
    if(paused||done)return;
    if(secsLeft<=0){advanceStep();return;}
    const t=setInterval(()=>{
      setSecsLeft(s=>{
        if(s<=1){clearInterval(t);advanceStep();return 0;}
        if(s<=4)SoundEngine.countdownBeep();
        return s-1;
      });
    },1000);
    return()=>clearInterval(t);
  },[stepIdx,paused,done]);

  function advanceStep(){
    SoundEngine.stepDone();
    setCatState("celebrate");
    setTimeout(()=>setCatState("walk"),800);
    // If current step is a task slot with resolved task, mark done
    if(cur?.type==="task_slot"&&cur?.resolved){
      const taskId=cur.resolved.id;
      setCompletedTaskIds(ids=>[...ids,taskId]);
      if(cur.resolved.title.startsWith("[Day ")&&cur.resolved.notes?.includes("📌 今日微任务")){
        setShowCheckIn(cur.resolved);
        return; // pause until check-in done
      }
      onTaskDone(taskId);
    }
    goNext();
  }

  function goNext(){
    const ni=stepIdx+1;
    if(ni>=resolvedSteps.length){
      setDone(true);
      SoundEngine.routineDone();
      setCatState("celebrate");
      return;
    }
    setStepIdx(ni);
    setSecsLeft((resolvedSteps[ni]?.duration||5)*60);
    setStepKey(k=>k+1);
    setCatState("walk");
    setTimeout(()=>{SoundEngine.stepStart();setCatState("idle");},400);
  }

  function addTime(mins){setSecsLeft(s=>s+mins*60);}
  function skip(){setCatState("walk");setTimeout(goNext,200);}

  // Colors
  const accentColors=["#FFB3C6","#A8DAFF","#D4B8FF","#B8F0D8","#FFCBA4","#FFF0A0"];
  const stepColor=accentColors[stepIdx%accentColors.length];
  const bgLight="linear-gradient(135deg,#FFF5FA 0%,#F0F8FF 50%,#F5FFF5 100%)";
  const bgDark="linear-gradient(135deg,#1a0a2e 0%,#0d1a3a 50%,#0a2e1a 100%)";
  const textMain=dm?"#f0eaff":"#1a1a1a";
  const textSub=dm?"rgba(240,234,255,.5)":"rgba(0,0,0,.38)";

  const mm=String(Math.floor(secsLeft/60)).padStart(2,"0");
  const ss=String(secsLeft%60).padStart(2,"0");

  if(done) return(
    <div className={`routine-fs ${dm?"dark":"light"}`} style={{background:dm?bgDark:bgLight}}>
      <div style={{textAlign:"center",padding:32,maxWidth:400}}>
        <div style={{marginBottom:20,display:"flex",justifyContent:"center"}}>
          <PixelCat state="celebrate" size={5}/>
        </div>
        <div style={{fontSize:28,fontWeight:700,color:textMain,marginBottom:8}}>完成啦！🎉</div>
        <div style={{fontSize:14,color:textSub,marginBottom:24,lineHeight:1.8}}>
          {routine.name} 全部跑完<br/>
          {completedTaskIds.length>0&&`${completedTaskIds.length}个任务已打勾 ✓`}
        </div>
        <button onClick={onComplete} style={{width:"100%",padding:"14px",background:stepColor,color:"#1a1a1a",border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer"}}>
          返回专注板
        </button>
      </div>
    </div>
  );

  return(
    <div className={`routine-fs ${dm?"dark":"light"}`} style={{background:dm?bgDark:bgLight}}>
      {/* Exit confirm */}
      {showExit&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",zIndex:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:dm?"#1a1728":"#fff",borderRadius:14,padding:"24px",textAlign:"center",maxWidth:280}}>
            <div style={{fontSize:15,fontWeight:600,color:textMain,marginBottom:8}}>退出当前流程？</div>
            <div style={{fontSize:13,color:textSub,marginBottom:20}}>已完成的任务会保留，未完成的不会变化</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowExit(false)} style={{flex:1,padding:"9px",border:"0.5px solid #ccc",borderRadius:8,background:"transparent",color:textMain,cursor:"pointer"}}>继续</button>
              <button onClick={onExit} style={{flex:1,padding:"9px",background:"#A32D2D",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>退出</button>
            </div>
          </div>
        </div>
      )}

      {/* CheckIn overlay for block tasks */}
      {showCheckIn&&(
        <div style={{position:"absolute",inset:0,zIndex:10,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.6)"}}>
          <div style={{background:dm?"#1a1728":"#fff",borderRadius:14,padding:"24px",maxWidth:400,width:"100%",margin:"0 16px"}}>
            <div style={{fontSize:14,fontWeight:600,color:textMain,marginBottom:12}}>📤 完成打卡</div>
            <div style={{fontSize:13,color:textSub,marginBottom:16}}>{showCheckIn.title}</div>
            <textarea rows={3} placeholder="简单描述今天做了什么…"
              style={{width:"100%",padding:"8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,background:dm?"#2a2440":"#fff",color:textMain,marginBottom:12}}
              id="routine-checkin-text"/>
            <button onClick={()=>{
              const txt=document.getElementById("routine-checkin-text")?.value||"";
              onTaskDone(showCheckIn.id,{checkInOutput:txt,checkInDate:todayStr(),done:true});
              setShowCheckIn(null);goNext();
            }} style={{width:"100%",padding:"10px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",fontWeight:500}}>
              ✓ 打卡完成，下一步
            </button>
          </div>
        </div>
      )}

      {/* Top progress bar */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:dm?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)"}}>
        <div style={{height:"100%",width:`${progress*100}%`,background:`linear-gradient(90deg,${stepColor},${accentColors[(stepIdx+1)%accentColors.length]})`,transition:"width .8s ease",boxShadow:`0 0 8px ${stepColor}`}}/>
      </div>

      {/* Top right exit */}
      <button onClick={()=>setShowExit(true)} style={{position:"absolute",top:14,right:16,fontSize:12,color:textSub,background:"none",border:`0.5px solid ${dm?"rgba(255,255,255,.15)":"rgba(0,0,0,.12)"}`,borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>✕ 退出</button>

      {/* Step counter */}
      <div style={{position:"absolute",top:16,left:20,fontSize:12,color:textSub}}>{stepIdx+1} / {resolvedSteps.length}</div>

      {/* Main content */}
      <div key={stepKey} style={{textAlign:"center",padding:"0 24px",maxWidth:480,width:"100%",animation:"step-enter .35s ease"}}>

        {/* Next step preview */}
        {stepIdx>0&&(
          <div style={{fontSize:11,color:textSub,marginBottom:8,letterSpacing:".08em",textTransform:"uppercase"}}>当前</div>
        )}

        {/* Cat companion */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          <PixelCat state={catState} size={4}/>
        </div>

        {/* Step type badge */}
        <div style={{display:"inline-block",padding:"3px 12px",borderRadius:20,background:cur?.type==="task_slot"?"rgba(168,218,255,.25)":stepColor+"33",marginBottom:12}}>
          <span style={{fontSize:12,color:cur?.type==="task_slot"?"#A8DAFF":stepColor,fontWeight:600,letterSpacing:".04em"}}>
            {cur?.type==="task_slot"?"🎯 任务时间":"⚙️ "+( cur?.title||"")}
          </span>
        </div>

        {/* Title */}
        <div style={{fontSize:cur?.type==="task_slot"?22:18,fontWeight:700,color:textMain,marginBottom:cur?.type==="task_slot"?8:16,lineHeight:1.3}}>
          {cur?.type==="task_slot"
            ?(cur?.resolved?.title||cur?.label||"自由专注")
            :cur?.title}
        </div>

        {/* Task detail for task slots */}
        {cur?.type==="task_slot"&&cur?.resolved?.notes&&(()=>{
          const micro=cur.resolved.notes.match(/📌 今日微任务：(.+)/)?.[1];
          return micro?(
            <div style={{fontSize:13,color:textSub,marginBottom:16,padding:"8px 16px",background:dm?"rgba(255,255,255,.06)":"rgba(0,0,0,.04)",borderRadius:8,lineHeight:1.6}}>
              {micro}
            </div>
          ):null;
        })()}

        {/* Note for fixed steps */}
        {cur?.type==="fixed"&&cur?.note&&(
          <div style={{fontSize:13,color:textSub,marginBottom:16,lineHeight:1.6}}>{cur.note}</div>
        )}

        {/* Timer ring */}
        <div style={{position:"relative",width:160,height:160,margin:"0 auto 24px",borderRadius:"50%",
          background:dm?`conic-gradient(${stepColor} ${(1-secsLeft/((cur?.duration||5)*60))*360}deg, rgba(255,255,255,.06) 0deg)`
            :`conic-gradient(${stepColor} ${(1-secsLeft/((cur?.duration||5)*60))*360}deg, rgba(0,0,0,.06) 0deg)`,
          animation:secsLeft<=5?"ring-pulse"+(dm?"-dark":"")+" 1s infinite":"none",
          boxShadow:`0 0 ${secsLeft<=10?20:8}px ${stepColor}66`}}>
          <div style={{position:"absolute",inset:12,borderRadius:"50%",background:dm?"#1a1728":bgLight.split(",")[0].replace("linear-gradient(135deg,",""),
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:36,fontWeight:700,color:textMain,fontVariantNumeric:"tabular-nums",letterSpacing:"-.02em"}}>{mm}:{ss}</div>
            <div style={{fontSize:11,color:textSub,marginTop:2}}>{cur?.duration}分钟</div>
          </div>
        </div>

        {/* Controls */}
        <div style={{display:"flex",gap:10,justifyContent:"center",alignItems:"center"}}>
          <button onClick={()=>addTime(5)} style={{padding:"8px 14px",background:dm?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)",border:"none",borderRadius:9,fontSize:13,color:textSub,cursor:"pointer"}}>+5分</button>
          <button onClick={()=>setPaused(p=>!p)} style={{padding:"10px 24px",background:dm?"rgba(255,255,255,.12)":"rgba(0,0,0,.08)",border:"none",borderRadius:9,fontSize:14,color:textMain,cursor:"pointer",fontWeight:500}}>
            {paused?"▶ 继续":"⏸ 暂停"}
          </button>
          <button onClick={skip} style={{padding:"8px 14px",background:dm?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)",border:"none",borderRadius:9,fontSize:13,color:textSub,cursor:"pointer"}}>跳过</button>
          <button onClick={advanceStep} style={{padding:"10px 20px",background:stepColor,border:"none",borderRadius:9,fontSize:14,color:"#1a1a1a",cursor:"pointer",fontWeight:600,boxShadow:`0 4px 16px ${stepColor}88`}}>
            完成 ✓
          </button>
        </div>

        {/* Next step preview */}
        {stepIdx<resolvedSteps.length-1&&(
          <div style={{marginTop:24,fontSize:12,color:textSub}}>
            下一步：{resolvedSteps[stepIdx+1]?.type==="task_slot"
              ?(resolvedSteps[stepIdx+1]?.resolved?.title||resolvedSteps[stepIdx+1]?.label||"任务时间")
              :resolvedSteps[stepIdx+1]?.title}
            <span style={{marginLeft:6,opacity:.6}}>{resolvedSteps[stepIdx+1]?.duration}分钟</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// §APP  主应用 App
// ══════════════════════════════════════════
function App(){
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [darkMode,setDarkMode]=useState(()=>lsGet("zj_dark_mode",false));
  const [showRoutineSelector,setShowRoutineSelector]=useState(false);
  const [showRoutineManager,setShowRoutineManager]=useState(false);
  const [activeRoutine,setActiveRoutine]=useState(null); // routine being executed
  const [showLaunch,setShowLaunch]=useState(()=>{
    const k="launch_"+todayStr();
    if(lsGet(k))return false;
    lsSet(k,true);return true;
  });
  const [habits,setHabits]=useState(()=>lsGet("zj_habits",[]));
  const [pomLog,setPomLog]=useState(()=>lsGet("zj_pom_log",[]));
  const [blockingLayers,setBlockingLayers]=useState(()=>lsGet("zj_blocking_layers",[]));
  const [tasks,setTasks]=useState(()=>lsGet("zj_tasks",SAMPLE_TASKS));
  const [journal,setJournal]=useState(()=>lsGet("zj_journal",{}));
  const [futureLog,setFutureLog]=useState(()=>lsGet("zj_future_log",{}));
  const [courses,setCourses]=useState(()=>lsGet("zj_courses",[]).map(c=>({...BLANK_COURSE,...c})));
  const [nextId,setNextId]=useState(()=>lsGet("zj_next_id",10));
  const [inbox,setInbox]=useState(()=>lsGet("zj_learning_inbox",[]));
  const [syncTick,setSyncTick]=useState(0); // 云端拉取完成后自增，通知子组件刷新本地状态
  const [view,setView]=useState("today");
  const [aiOpen,setAiOpen]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [nTask,setNTask]=useState({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});
  const [quick,setQuick]=useState("");
  const [detail,setDetail]=useState(null);
  const [projView,setProjView]=useState(null);
  const [showMigration,setShowMigration]=useState(false);
  const [showBrainDump,setShowBrainDump]=useState(false);
  const [focusNowOnly,setFocusNowOnly]=useState(true);
  const [timer,setTimer]=useState(null); // {taskId,total,left,running,logged} 当前任务专注计时
  const [showReview,setShowReview]=useState(false);
  const [showMonthlyReview,setShowMonthlyReview]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [ghToken,setGhToken]=useState(()=>lsGet("zj_gh_token",""));
  const [gistId,setGistId]=useState(()=>lsGet("zj_gist_id",""));
  const [geminiKey,setGeminiKey]=useState(()=>lsGet("zj_gemini_key",""));
  // NEW: Block system state
  const [showBlockBreaker,setShowBlockBreaker]=useState(false);
  const [checkInTask,setCheckInTask]=useState(null);
  const aiRef=useRef(null);
  const saveTimer=useRef(null);
  const isFirstLoad=useRef(true);
  // Always-current refs for async save
  const tasksRef=useRef(tasks);
  const journalRef=useRef(journal);
  const futureLogRef=useRef(futureLog);
  const coursesRef=useRef(courses);
  const nextIdRef=useRef(nextId);
  const ghTokenRef=useRef(lsGet("zj_gh_token",""));
  const gistIdRef=useRef(lsGet("zj_gist_id",""));
  const habitsRef=useRef([]);
  const pomLogRef=useRef([]);
  const blockingLayersRef=useRef(lsGet("zj_blocking_layers",[]));
  const inboxRef=useRef(lsGet("zj_learning_inbox",[]));

  // Keep refs in sync with state
  useEffect(()=>{tasksRef.current=tasks;},[tasks]);
  useEffect(()=>{journalRef.current=journal;},[journal]);
  useEffect(()=>{futureLogRef.current=futureLog;},[futureLog]);
  useEffect(()=>{coursesRef.current=courses;},[courses]);
  useEffect(()=>{nextIdRef.current=nextId;},[nextId]);
  useEffect(()=>{ghTokenRef.current=ghToken;},[ghToken]);
  useEffect(()=>{gistIdRef.current=gistId;},[gistId]);
  useEffect(()=>{habitsRef.current=habits;},[habits]);
  useEffect(()=>{pomLogRef.current=pomLog;},[pomLog]);
  useEffect(()=>{blockingLayersRef.current=blockingLayers;},[blockingLayers]);
  useEffect(()=>{inboxRef.current=inbox;},[inbox]);

  // load from gist on mount
  function loadFromGist(){
    const tok=ghTokenRef.current||ghToken;
    const gid=gistIdRef.current||gistId;
    if(!tok||!gid)return;
    setSyncStatus("saving");
    gistLoad(tok,gid).then(rawData=>{
      isFirstLoad.current=false; // Mark load done FIRST before setting state
      const data=rawData?restoreImagesFromLS(rawData):rawData;
      if(data){
        if(data.tasks&&data.tasks.length>0){setTasks(data.tasks.map(t=>({...BLANK_TASK,...t})));lsSet("zj_tasks",data.tasks);}
        if(data.journal&&Object.keys(data.journal).length>0){setJournal(data.journal);lsSet("zj_journal",data.journal);}
        if(data.futureLog&&Object.keys(data.futureLog).length>0){setFutureLog(data.futureLog);lsSet("zj_future_log",data.futureLog);}
        if(data.courses&&data.courses.length>0){const cs=data.courses.map(c=>({...BLANK_COURSE,...c}));setCourses(cs);lsSet("zj_courses",cs);}
        if(data.nextId){setNextId(data.nextId);lsSet("zj_next_id",data.nextId);}
        if(data.blockingLayers&&data.blockingLayers.length>0){setBlockingLayers(data.blockingLayers);lsSet("zj_blocking_layers",data.blockingLayers);}
        if(data.habits&&data.habits.length>0){setHabits(data.habits);lsSet("zj_habits",data.habits);}
        if(data.learningInbox&&data.learningInbox.length>0){setInbox(data.learningInbox);inboxRef.current=data.learningInbox;lsSet("zj_learning_inbox",data.learningInbox);}
        if(data.pomLog&&data.pomLog.length>0){setPomLog(data.pomLog);lsSet("zj_pom_log",data.pomLog);}
        if(data.aiHistory&&data.aiHistory.length>0){saveAIHistory(data.aiHistory);}
        setSyncTick(x=>x+1);
        setSyncStatus("saved");
      } else {
        setSyncStatus("idle");
      }
    }).catch(e=>{
      console.error("Gist load failed:",e);
      // JSON 损坏时给出可操作提示
      if(e instanceof SyntaxError){
        setSyncStatus("error");
        console.warn("Gist JSON 损坏，将在下次保存时覆盖修复。如数据未丢失请继续使用，本地数据仍完整。");
        // 用本地数据强制覆盖修复损坏的 Gist
        setTimeout(()=>{
          const tok=ghTokenRef.current;const gid=gistIdRef.current;
          if(tok&&gid){
            isFirstLoad.current=false;
            triggerSave();
          }
        },2000);
      } else {
        setSyncStatus("error");
      }
      isFirstLoad.current=false;
    });
  }
  useEffect(()=>{
    // Always mark load complete after a short delay
    // so saves work even if no token configured
    const tok=ghTokenRef.current||ghToken;
    const gid=gistIdRef.current||gistId;
    if(tok&&gid){
      loadFromGist();
    } else {
      isFirstLoad.current=false;
    }
    // Safety: ensure isFirstLoad cleared after 5s no matter what
    injectPWA();
    const safety=setTimeout(()=>{isFirstLoad.current=false;},5000);
    return()=>clearTimeout(safety);
  },[]);

  // auto-save to gist (debounced)
  function triggerSave(t,j,fl,nid,cs){
    const tok=ghTokenRef.current;
    const gid=gistIdRef.current;
    if(!tok||!gid){return;}
    // Don't save during initial load
    if(isFirstLoad.current)return;
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    // Capture current refs at call time, use passed values if provided
    const tasksToSave=t!==undefined?t:tasksRef.current;
    const journalToSave=j!==undefined?j:journalRef.current;
    const flToSave=fl!==undefined?fl:futureLogRef.current;
    const nidToSave=nid!==undefined?nid:nextIdRef.current;
    const coursesToSave=cs!==undefined?cs:coursesRef.current;
    saveTimer.current=setTimeout(()=>{
      gistSave(tok,gid,{
        tasks:tasksToSave,
        journal:journalToSave,
        futureLog:flToSave,
        courses:coursesToSave,
        habits:habitsRef.current,
        pomLog:pomLogRef.current,
        nextId:nidToSave,
        blockingLayers:blockingLayersRef.current,
        learningInbox:inboxRef.current,
        aiHistory:loadAIHistory()
      })
        .then(()=>setSyncStatus("saved"))
        .catch(e=>{setSyncStatus("error");console.error("Gist save failed:",e);});
    },1200);
  }

  function setTasksAndSync(fn){setTasks(prev=>{const next=typeof fn==="function"?fn(prev):fn;lsSet("zj_tasks",next);triggerSave(next,undefined,undefined,undefined,undefined);return next;});}
  function setJournalAndSync(j){setJournal(j);lsSet("zj_journal",j);triggerSave(undefined,j,undefined,undefined,undefined);}
  function setFutureLogAndSync(fl){setFutureLog(fl);lsSet("zj_future_log",fl);triggerSave(undefined,undefined,fl,undefined,undefined);}
  function updateCourseNote(courseId,noteId,changes){
    setCourses(cs=>{
      const next=cs.map(c=>{
        if(c.id!==courseId)return c;
        const notes=(c.notes||[]).map(n=>n.id===noteId?{...n,...changes}:n);
        return{...c,notes};
      });
      lsSet("zj_courses",next);
      triggerSave(undefined,undefined,undefined,undefined,next);
      return next;
    });
  }
  function updateCourse(updated){
    setCourses(cs=>{const next=cs.map(c=>c.id===updated.id?updated:c);lsSet("zj_courses",next);triggerSave(undefined,undefined,undefined,undefined,next);return next;});
  }
  function addCourse(c){
    setCourses(cs=>{const next=[...cs,c];lsSet("zj_courses",next);triggerSave(tasks,journal,futureLog,nextId,next);return next;});
  }
  function archiveCourse(id){
    setCourses(cs=>{const next=cs.map(c=>c.id===id?{...c,archived:true,active:false}:c);lsSet("zj_courses",next);triggerSave(tasks,journal,futureLog,nextId,next);return next;});
  }

  function toggleTask(id){
    const cur=tasksRef.current.find(t=>t.id===id);
    // 完成闸门：练习/节点类任务，没打卡不许直接算完成 → 改为弹打卡框
    if(cur&&!cur.done&&needsCheckIn(cur)){setCheckInTask(cur);return;}
    setTasksAndSync(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
    // 同步 episode 状态
    setCourses(cs=>{
      const task=tasksRef.current.find(t=>t.id===id);
      if(!task)return cs;
      const newDone=!task.done;
      const next=cs.map(c=>{
        const eps=c.episodes||[];
        if(!eps.some(e=>e.taskId===id))return c;
        return{...c,episodes:eps.map(e=>e.taskId===id?{...e,status:newDone?"done":"todo"}:e)};
      });
      if(next.some((c,i)=>c!==cs[i]))triggerSave(undefined,undefined,undefined,undefined,next);
      return next;
    });
  }
  function toggleSub(tid,i){
    setTasksAndSync(ts=>ts.map(t=>{if(t.id!==tid)return t;const sd=[...t.subtaskDone];sd[i]=!sd[i];return{...t,subtaskDone:sd};}));
    // 子步骤全部完成时同步 episode 为 done
    setCourses(cs=>{
      const task=tasksRef.current.find(t=>t.id===tid);
      if(!task)return cs;
      const newSd=[...task.subtaskDone];newSd[i]=!newSd[i];
      const allDone=newSd.every(Boolean);
      const next=cs.map(c=>{
        const eps=c.episodes||[];
        if(!eps.some(e=>e.taskId===tid))return c;
        return{...c,episodes:eps.map(e=>e.taskId===tid?{...e,status:allDone?"done":"doing"}:e)};
      });
      if(next.some((c,j)=>c!==cs[j]))triggerSave(undefined,undefined,undefined,undefined,next);
      return next;
    });
  }
  function toggleExpand(id){setTasksAndSync(ts=>ts.map(t=>t.id===id?{...t,expanded:!t.expanded}:t));}
  function saveDetail(u){setTasksAndSync(ts=>ts.map(t=>t.id===u.id?u:t));setDetail(null);}
  function delTask(id){setTasksAndSync(ts=>ts.filter(t=>t.id!==id));setDetail(null);}
  function addSubsFromAI(tid,steps){setTasksAndSync(ts=>ts.map(t=>t.id===tid?{...t,subtasks:steps,subtaskDone:steps.map(()=>false),expanded:true}:t));}
  function aiBreak(id){const t=tasks.find(t=>t.id===id);if(!t)return;setAiOpen(true);setTimeout(()=>{if(aiRef.current)aiRef.current(t);},150);}

  function updateHabits(newHabits){
    setHabits(newHabits);
    habitsRef.current=newHabits;
    lsSet("zj_habits",newHabits);
    triggerSave();
  }
  function addPomEntry(count,minutes){
    const today=todayStr();
    setPomLog(log=>{
      const exists=log.find(l=>l.date===today);
      const next=exists
        ?log.map(l=>l.date===today?{...l,count:(l.count||0)+count,minutes:(l.minutes||0)+minutes}:l)
        :[...log,{date:today,count,minutes}];
      lsSet("zj_pom_log",next);
      pomLogRef.current=next;
      triggerSave();
      return next;
    });
  }
  function addTask(partial){
    const newNid=nextIdRef.current+1;
    const t={...BLANK_TASK,...partial,id:nextIdRef.current};
    setNextId(newNid);
    nextIdRef.current=newNid;
    lsSet("zj_next_id",newNid);
    setTasksAndSync(ts=>{const next=[...ts,t];triggerSave(next,undefined,undefined,newNid,undefined);return next;});
    // 补全对应 episode 的 taskId（episode 里用 taskTitle 做临时 key）
    setCourses(cs=>{
      const next=cs.map(c=>{
        const eps=c.episodes||[];
        const needsPatch=eps.some(e=>e.taskTitle===t.title&&!e.taskId);
        if(!needsPatch)return c;
        return{...c,episodes:eps.map(e=>e.taskTitle===t.title&&!e.taskId?{...e,taskId:t.id}:e)};
      });
      if(next.some((c,i)=>c!==cs[i]))triggerSave(undefined,undefined,undefined,undefined,next);
      return next;
    });
  }
  function addQuick(){if(!quick.trim())return;addTask({title:quick.trim(),project:1,due:"",priority:"normal"});setQuick("");}
  function addModal(){if(!nTask.title.trim())return;addTask(nTask);setShowAdd(false);setNTask({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});}
  function addBrainTasks(items){
    // 先给要同步到课程的任务，在对应课程里建好 episode（taskTitle 做临时索引，addTask 会补 taskId）
    const byCourse={};
    items.forEach(it=>{if(it&&typeof it==="object"&&it.courseId)(byCourse[it.courseId]=byCourse[it.courseId]||[]).push(it);});
    if(Object.keys(byCourse).length){
      setCourses(cs=>{
        const next=cs.map(c=>{
          const lst=byCourse[c.id];if(!lst)return c;
          const newEps=lst.map((it,i)=>({...BLANK_EPISODE,id:Date.now()+i,title:it.title,status:"todo",duration:it.estimate?String(it.estimate):"",taskTitle:it.title,pushedToBoard:true}));
          return{...c,episodes:[...(c.episodes||[]),...newEps]};
        });
        lsSet("zj_courses",next);triggerSave(undefined,undefined,undefined,undefined,next);
        return next;
      });
    }
    items.forEach(it=>{
      if(typeof it==="string"){addTask({title:it,project:1,due:"",priority:"normal"});return;}
      const fs=(it.firstStep||"").trim();
      addTask({
        title:it.title,project:it.courseId?2:1,
        due:it.priority==="today"?todayStr():"",
        priority:it.priority||"normal",
        estimate:it.estimate?String(it.estimate):"",
        notes:fs?("▶ 先做最小一步："+fs):"",
        subtasks:fs?[fs]:[],
        subtaskDone:fs?[false]:[],
        ...(it.courseId?{courseId:it.courseId}:{}),
      });
    });
  }
  function addBrainIdeas(ideas){
    if(!ideas||!ideas.length)return;
    const d=new Date();const nd=new Date(d.getFullYear(),d.getMonth()+1,1);
    const mk=monthKey(nd.getFullYear(),nd.getMonth());
    const fl=futureLogRef.current||{};
    const add=ideas.map((x,i)=>({id:Date.now()+i,text:typeof x==="string"?x:(x.text||x.title||"")})).filter(o=>o.text);
    setFutureLogAndSync({...fl,[mk]:[...(fl[mk]||[]),...add]});
  }
  function saveLearningInbox(items){setInbox(items);inboxRef.current=items;lsSet("zj_learning_inbox",items);triggerSave();}
  function addFutureToTasks(text,mk){
    const [y,m]=mk.split("-").map(Number);
    const due=yyyymmdd(new Date(y,m,1));
    addTask({title:text,project:1,due,priority:"normal"});
  }
  // NEW: save check-in data on a task
  function saveCheckIn(taskId,checkInData){
    setTasksAndSync(ts=>ts.map(t=>t.id===taskId?{...t,...checkInData}:t));
    setCheckInTask(null);
  }
  // Dark mode body class
  useEffect(()=>{
    document.body.classList.toggle("dark-mode",darkMode);
    lsSet("zj_dark_mode",darkMode);
  },[darkMode]);
  // AI 面板关闭后，把对话历史刷上云（aiHistory 现在已进 Gist payload）
  useEffect(()=>{
    if(aiOpen||isFirstLoad.current)return;
    triggerSave();
  },[aiOpen]);
  // 专注计时：每秒递减
  useEffect(()=>{
    if(!timer||!timer.running)return;
    const id=setInterval(()=>{
      setTimer(tm=>{if(!tm||!tm.running)return tm;const left=tm.left-1;return left<=0?{...tm,left:0,running:false}:{...tm,left};});
    },1000);
    return()=>clearInterval(id);
  },[timer?.running,timer?.taskId]);
  // 计时自然结束：响铃 + 记一次番茄
  useEffect(()=>{
    if(timer&&!timer.running&&timer.left===0&&!timer.logged){
      try{SoundEngine.routineDone();}catch(e){}
      addPomEntry(1,Math.round(timer.total/60));
      setTimer(tm=>tm?{...tm,logged:true}:tm);
    }
  },[timer?.left,timer?.running]);
  function startTimer(task){
    const mins=realisticEstimate(parseInt(task.estimate||"0")||0)||25;
    setTimer({taskId:task.id,total:mins*60,left:mins*60,running:true,logged:false});
    try{SoundEngine.stepStart();}catch(e){}
  }
  function toggleTimerRun(){setTimer(tm=>tm?{...tm,running:!tm.running}:tm);}
  function stopTimer(){
    if(timer&&!timer.logged){const elapsed=Math.round((timer.total-timer.left)/60);if(elapsed>=1)addPomEntry(0,elapsed);}
    setTimer(null);
  }
  // Routine task done handler
  function routineTaskDone(taskId,extra={}){
    setTasksAndSync(ts=>ts.map(t=>t.id===taskId?{...t,done:true,...extra}:t));
  }

  function handleMigrate(decisions){
    setTasksAndSync(ts=>ts.map(t=>{
      const d=decisions[t.id];if(!d)return t;
      if(d==="drop")return null;
      const mc=(t.migrateCount||0)+1;
      if(d==="tomorrow")return{...t,due:daysFromNow(1),migrateCount:mc};
      if(d==="nextweek")return{...t,due:daysFromNow(7),migrateCount:mc};
      if(d==="someday")return{...t,due:"",migrateCount:mc};
      return t;
    }).filter(Boolean));
  }

  // check if monthly review should show (first day of month)
  useEffect(()=>{
    const d=new Date();if(d.getDate()!==1)return;
    const key=`review_shown_${monthKey(d.getFullYear(),d.getMonth())}`;
    if(!lsGet(key))setTimeout(()=>{setShowMonthlyReview(true);lsSet(key,true);},2000);
  },[]);

  const focus=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today"||isOverdue(t.due))).slice(0,3);
  const other=tasks.filter(t=>!t.done&&!focus.find(f=>f.id===t.id));
  const done=tasks.filter(t=>t.done);
  const tProps={onToggle:toggleTask,onToggleSub:toggleSub,onExpand:toggleExpand,onAI:aiBreak,onOpen:setDetail,onCheckIn:setCheckInTask};
  const navTop=[{id:"today",l:"今日焦点",i:"☀️"},{id:"all",l:"所有任务",i:"📋"},{id:"calendar",l:"日历",i:"📅"},{id:"blocking",l:"全局框架",i:"🏗"}];

  return<div style={{display:"flex",height:"100vh",background:darkMode?"#1a1728":"#f7f6f3",color:darkMode?"#f0eaff":"#1a1a1a",fontSize:14,overflow:"hidden"}}>
    {/* mobile menu btn */}
    {!sidebarOpen&&<button className="mobile-menu-btn" onClick={()=>setSidebarOpen(true)} style={{position:"fixed",top:12,left:12,zIndex:200,background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"7px 10px",fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>☰</button>}
    {/* sidebar overlay for mobile */}
    {sidebarOpen&&<div className="mobile-menu-btn" onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:49}}/>}
    {/* sidebar */}
    <div className={`sidebar-desktop ${sidebarOpen?"sidebar-mobile-open":""}`} style={{width:190,background:"#fff",borderRight:"0.5px solid #e0ddd6",flexDirection:"column",padding:"16px 0",flexShrink:0,overflowY:"auto",position:"relative",zIndex:50}}>
      <div style={{padding:"0 16px 16px",fontSize:15,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>🧠 专注板</span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setDarkMode(d=>!d)} title={darkMode?"浅色模式":"深色模式"} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:darkMode?"#D4B8FF":"#aaa"}}>{darkMode?"☀️":"🌙"}</button>
          <button onClick={()=>setShowSettings(true)} title="同步设置" style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:ghToken?"#0F6E56":"#bbb"}}>{ghToken?"☁️":"⚙️"}</button>

        <div onClick={()=>{setShowRoutineSelector(true);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:darkMode?"#D4B8FF":"#533AB7",cursor:"pointer",fontWeight:500,background:darkMode?"rgba(212,184,255,.08)":"rgba(83,58,183,.05)"}}>▶ 开始 Routine</div>

        {null/* 笔记复习入口已隐藏 */}
        {(()=>{
          const blockCount=tasks.filter(t=>!t.done&&t.title.startsWith("[Day ")&&t.notes?.includes("📌 今日微任务")&&t.due===todayStr()).length;
          return(
            <div onClick={()=>setShowBlockBreaker(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:blockCount>0?"#854F0B":"#666",cursor:"pointer",fontWeight:blockCount>0?500:400}}>
              🔨 节点拆解{blockCount>0&&<span style={{fontSize:11,background:"#854F0B",color:"#fff",borderRadius:10,padding:"1px 6px",marginLeft:4}}>{blockCount}今日</span>}
            </div>
          );
        })()}
        <div onClick={()=>setShowMigration(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#666",cursor:"pointer"}}>🌙 结束今天</div>
        {null/* 月度回顾入口已隐藏 */}
        <div onClick={()=>setAiOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#185FA5",cursor:"pointer",background:aiOpen?"#EBF3FB":"transparent"}}>✨ AI助手</div>
      </div>
    </div>

    {/* main */}
    <div className="main-area" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",transition:"margin-right .2s",marginRight:aiOpen?580:0}}>
      <div style={{background:"#fff",borderBottom:"0.5px solid #e0ddd6",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16,fontWeight:500}}>{projView?projView.name:navTop.find(n=>n.id===view)?.l||""}</span>
          <SyncBadge status={syncStatus} hasToken={!!ghToken}/>
          {ghToken&&gistId&&(
            <button onClick={loadFromGist} title="重新从Gist拉取数据" style={{fontSize:11,background:"none",border:"0.5px solid #e0ddd6",borderRadius:5,padding:"2px 8px",cursor:"pointer",color:"#888",flexShrink:0}}>
              {syncStatus==="saving"?"⏳":"🔄"}
            </button>
          )}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:13,color:"#aaa"}}>{new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"})}</span>
          <button onClick={()=>setShowAdd(true)} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>+ 添加任务</button>
        </div>
      </div>

      {!ghToken&&(
        <div style={{background:"#EBF3FB",borderBottom:"0.5px solid #B5D4F4",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <span style={{fontSize:12,color:"#185FA5"}}>📱 跨设备同步未开启 — 数据仅存本地浏览器</span>

      )}
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
        {view==="today"&&<>

          {(()=>{
            const stuck=tasks.filter(t=>!t.done&&isPracticeTask(t)&&(t.migrateCount||0)>=2);
            if(!stuck.length)return null;
            return<div style={{background:"#FCEBEB",border:"1.5px solid #e8b4b4",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#A32D2D",marginBottom:8}}>⚠ 你有 {stuck.length} 个练习躲了好几天</div>

                <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.6)",borderRadius:7,padding:"7px 10px",marginBottom:5}}>
                  <div style={{flex:1,fontSize:13,color:"#1a1a1a"}}>{t.title}<span style={{fontSize:11,color:"#A32D2D",marginLeft:6}}>推了{t.migrateCount}次</span></div>
                  <button onClick={()=>setCheckInTask(t)} style={{padding:"4px 10px",background:"#854F0B",color:"#fff",border:"none",borderRadius:5,fontSize:11,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>做最小版·打卡</button>
                  <button onClick={()=>{if(window.confirm("承认今天也不会做它，删掉这个练习？"))delTask(t.id);}} style={{padding:"4px 10px",background:"#fff",color:"#A32D2D",border:"0.5px solid #e8b4b4",borderRadius:5,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>砍掉</button>
                </div>
              ))}
              <div style={{fontSize:11,color:"#A32D2D",opacity:.75,marginTop:2}}>规则：要么现在做最小版本，要么承认不做、删掉。别让它一直挂着。</div>
            </div>;
          })()}
          {/* 现在就做这一件：屏幕上只给一个答案 */}
          {(()=>{
            const fo=coachOrder(focus.filter(t=>!t.done));
            const nowT=fo[0];if(!nowT)return null;
            const rest=fo.slice(1);
            const prac=isPracticeTask(nowT);
            const est=parseInt(nowT.estimate||"0")||0;
            const real=realisticEstimate(est);
            const tm=timer&&timer.taskId===nowT.id?timer:null;
            const mmss=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.max(0,s%60)).padStart(2,"0");
            const pct=tm?Math.round((1-tm.left/tm.total)*100):0;
            return<div style={{background:prac?"linear-gradient(135deg,#FFF5E0,#FAEEDA)":"linear-gradient(135deg,#EBF3FB,#E6F1FB)",border:`1.5px solid ${prac?"#f0c070":"#B5D4F4"}`,borderRadius:14,padding:"16px 18px",marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,.04)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:".06em",color:prac?"#854F0B":"#185FA5"}}>🎯 现在就做这一件</span>
                <button onClick={()=>setFocusNowOnly(v=>!v)} style={{fontSize:11,color:"#888",background:"none",border:"none",cursor:"pointer"}}>{focusNowOnly?"显示全部 ▾":"只看当前 ▴"}</button>
              </div>
              <div onClick={()=>setDetail(nowT)} style={{fontSize:18,fontWeight:600,color:"#1a1a1a",lineHeight:1.35,cursor:"pointer",marginBottom:6}}>{nowT.title}</div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:prac?10:12}}>
                <span style={{fontSize:12,color:getProj(nowT.project).color}}>{getProj(nowT.project).name}</span>
                {est>0&&<span style={{fontSize:12,color:"#854F0B"}}>⏱ 你估{fmtDur(est)} · 按你习惯约{fmtDur(real)}</span>}
                {nowT.subtasks?.length>0&&<span style={{fontSize:12,color:"#185FA5"}}>第一步：{nowT.subtasks.find((s,i)=>!nowT.subtaskDone[i])||nowT.subtasks[0]}</span>}
              </div>
              {prac&&<div style={{fontSize:12,color:"#854F0B",background:"rgba(255,255,255,.55)",borderRadius:8,padding:"8px 10px",marginBottom:10,lineHeight:1.55}}>💪 这是你最容易拖的练习类。规则：先做<b>最小版本</b>，2分钟就行——别想着一次做完。开始本身才是难关。</div>}
              {/* 专注计时进度条 */}
              {tm&&<div style={{background:"rgba(255,255,255,.65)",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:20,fontWeight:700,color:tm.left===0?"#0F6E56":"#1a1a1a",fontVariantNumeric:"tabular-nums"}}>{tm.left===0?"⏰ 时间到！":mmss(tm.left)}</span>
                  <div style={{display:"flex",gap:6}}>
                    {tm.left>0&&<button onClick={toggleTimerRun} style={{padding:"5px 12px",background:tm.running?"#fff":"#185FA5",color:tm.running?"#185FA5":"#fff",border:"0.5px solid #B5D4F4",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:600}}>{tm.running?"⏸ 暂停":"▶ 继续"}</button>}
                    <button onClick={stopTimer} style={{padding:"5px 12px",background:"#fff",color:"#888",border:"0.5px solid #e0ddd6",borderRadius:7,fontSize:12,cursor:"pointer"}}>停止</button>
                  </div>
                </div>
                <div style={{height:6,background:"rgba(0,0,0,.08)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:tm.left===0?"#0F6E56":"#185FA5",borderRadius:3,transition:"width 1s linear"}}/>
                </div>
                <div style={{fontSize:11,color:"#999",marginTop:4}}>{tm.left===0?"这一段完成了，记一次专注。点上面打卡/完成":"专注 "+Math.round(tm.total/60)+" 分钟 · 已过 "+Math.round((tm.total-tm.left)/60)+" 分"}</div>
              </div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {!tm&&<button onClick={()=>startTimer(nowT)} style={{flex:1,minWidth:120,padding:"11px",background:"#185FA5",color:"#fff",border:"none",borderRadius:9,fontSize:14,fontWeight:600,cursor:"pointer"}}>▶ 开始 {fmtDur(real||25)}</button>}
                {needsCheckIn(nowT)
                  ?<button onClick={()=>setCheckInTask(nowT)} style={{flex:1,minWidth:110,padding:"11px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:9,fontSize:14,fontWeight:600,cursor:"pointer"}}>做完了 · 打卡</button>
                  :<button onClick={()=>toggleTask(nowT.id)} style={{flex:1,minWidth:110,padding:"11px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:9,fontSize:14,fontWeight:600,cursor:"pointer"}}>✓ 做完了</button>}
                {!nowT.subtasks?.length&&<button onClick={()=>aiBreak(nowT.id)} style={{padding:"11px 14px",background:"#fff",color:"#185FA5",border:"0.5px solid #B5D4F4",borderRadius:9,fontSize:13,cursor:"pointer"}}>拆成小步</button>}
                {prac&&<button onClick={()=>{if(window.confirm("做不动？承认今天不做它，直接删掉？"))delTask(nowT.id);}} style={{padding:"11px 14px",background:"#fff",color:"#A32D2D",border:"0.5px solid #e8b4b4",borderRadius:9,fontSize:13,cursor:"pointer"}}>做不动·砍掉</button>}
              </div>
              {rest.length>0&&<div style={{fontSize:11,color:"#999",marginTop:10}}>接下来：{rest.map(t=>t.title).join(" → ")}</div>}
            </div>;
          })()}
          {/* Block tasks today banner */}
          {(()=>{
            const blockToday=tasks.filter(t=>!t.done&&t.title.startsWith("[Day ")&&t.notes?.includes("📌 今日微任务")&&t.due===todayStr());
            if(!blockToday.length)return null;
            return<div style={{background:"linear-gradient(135deg,#FAEEDA,#FFF5E0)",border:"1.5px solid #f0c070",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#854F0B"}}>🔨 今日节点任务 · 完成后必须打卡</span>
                <span style={{fontSize:11,color:"#854F0B",opacity:.7}}>{blockToday.length}个</span>
              </div>
              {blockToday.map(t=>{
                const micro=t.notes?.match(/📌 今日微任务：(.+)/)?.[1];
                const output=t.notes?.match(/✅ 产出要求：(.+)/)?.[1];
                return<div key={t.id} style={{background:"rgba(255,255,255,.6)",borderRadius:7,padding:"8px 10px",marginBottom:4,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:"#1a1a1a",marginBottom:2}}>{t.title.replace(/^\[Day \d+\] /,"")}</div>

                    {output&&<div style={{fontSize:11,color:"#0F6E56",marginTop:2}}>📤 {output}</div>}
                  </div>
                  <button onClick={()=>setCheckInTask(t)} style={{padding:"4px 10px",background:"#854F0B",color:"#fff",border:"none",borderRadius:5,fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>打卡</button>
                </div>;
              })}
            </div>;
          })()}
          {/* Status Cat */}
          <StatusCat tasks={tasks} darkMode={darkMode}/>
          {/* Routine quick start */}
          <button onClick={()=>setShowRoutineSelector(true)} style={{width:"100%",padding:"11px 16px",marginBottom:14,background:darkMode?"linear-gradient(135deg,rgba(212,184,255,.2),rgba(168,218,255,.2))":"linear-gradient(135deg,#F5F0FF,#EBF5FF)",border:`1.5px solid ${darkMode?"rgba(212,184,255,.3)":"#D4B8FF"}`,borderRadius:10,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <span style={{fontSize:18}}>▶</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{fontSize:13,fontWeight:600,color:darkMode?"#D4B8FF":"#533AB7"}}>开始 Routine</div>
              <div style={{fontSize:11,color:darkMode?"rgba(212,184,255,.6)":"#9B89C4",marginTop:1}}>进入专注流程，任务自动联动</div>
            </div>
            <span style={{fontSize:12,color:darkMode?"rgba(212,184,255,.5)":"#bbb"}}>→</span>
          </button>
          {/* Energy level indicator */}
          {(()=>{const e=getEnergyLabel();return(
            <div style={{background:e.bg,border:"0.5px solid "+e.color+"44",borderRadius:8,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:e.color,fontWeight:500}}>{e.label}</span>
              <span style={{fontSize:12,color:e.color,opacity:.8}}>{e.tip}</span>
            </div>
          );})()}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[["今日重点",focus.length],["待处理",tasks.filter(t=>!t.done).length],["已完成",done.length]].map(([l,v])=>(
              <div key={l} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:22,fontWeight:500}}>{v}</div><div style={{fontSize:12,color:"#aaa",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          {/* Time estimate warning */}
          {(()=>{const total=getTotalEstimate(focus.filter(t=>!t.done));const real=realisticEstimate(total);return total>0?(
            <div style={{fontSize:12,color:"#854F0B",background:"#FAEEDA",borderRadius:6,padding:"6px 12px",marginBottom:12}}>
              ⏱ 你估了约{fmtDur(total)}，但你几乎总是低估——按 {fmtDur(real)} 来安排今天
            </div>
          ):null;})()}
          {null/* 习惯追踪已隐藏 */}
          {/* Pomodoro stats */}
          {pomLog.length>0&&<PomodoroStats log={pomLog}/>}
          {!focusNowOnly&&<div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontSize:12,fontWeight:500,color:"#185FA5",background:"#E6F1FB",padding:"3px 10px",borderRadius:6}}>⚡ 按顺序做（前面先做）</span>
              <button onClick={()=>setAiOpen(true)} style={{fontSize:12,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>AI重新规划↗</button>
            </div>
            {focus.length?coachOrder(focus).map(t=><TaskRow key={t.id} task={t} {...tProps}/>):<div style={{fontSize:13,color:"#aaa",padding:"8px 0"}}>没有紧急任务，今天很轻松 🎉</div>}
          </div>}
          {other.length>0&&<><div style={{fontSize:13,fontWeight:500,marginBottom:10,color:"#888"}}>其他待办</div>{other.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
          {done.length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"18px 0 10px",color:"#bbb"}}>已完成 ({done.length})</div>{done.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
        </>}
        {view==="all"&&<>
          {tasks.filter(t=>!t.done).map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}
          {done.length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"18px 0 10px",color:"#bbb"}}>已完成</div>{done.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
        </>}
        {view==="calendar"&&<CalendarView tasks={tasks} onAddTask={addTask} journal={journal} onJournalUpdate={setJournalAndSync}/>}
        {view==="future"&&<FutureLog futureLog={futureLog} onUpdate={setFutureLogAndSync} onMoveToTasks={addFutureToTasks}/>}
        {view==="weekly"&&<WeeklyView tasks={tasks} onUpdate={saveDetail} onAddTask={addTask}/>}
        {view==="learning"&&<LearningView courses={courses} onUpdate={updateCourse} onAdd={addCourse} onArchive={archiveCourse} onAddTaskToBoard={addTask} geminiKey={geminiKey} onAddPomEntry={addPomEntry} tasks={tasks} onToggleSub={toggleSub} inbox={inbox} onSaveInbox={saveLearningInbox}/>}
        {view==="blocking"&&<BlockingView tasks={tasks} onUpdate={saveDetail} onAddTask={addTask} geminiKey={geminiKey} onSaveLayers={bl=>{setBlockingLayers(bl);blockingLayersRef.current=bl;triggerSave();}}/>}
        {view==="projects"&&(projView
          ?<ProjectPanel project={projView} tasks={tasks} onOpen={setDetail} onBack={()=>setProjView(null)}/>
          :<>{PROJECTS.map(p=>{const pts=tasks.filter(t=>t.project===p.id);const d=pts.filter(t=>t.done).length;const pct=pts.length?Math.round(d/pts.length*100):0;return<div key={p.id} onClick={()=>setProjView(p)} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px",marginBottom:12,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{width:10,height:10,borderRadius:"50%",background:p.color,flexShrink:0}}/><span style={{fontSize:15,fontWeight:500}}>{p.name}</span><span style={{marginLeft:"auto",fontSize:13,color:"#aaa"}}>{d}/{pts.length} 完成</span></div>
            <div style={{height:4,background:"#f0ede8",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:p.color,borderRadius:2}}/></div>
            <div style={{fontSize:12,color:"#bbb",marginTop:6}}>{pts.filter(t=>!t.done&&t.priority==="urgent").length} 个紧急任务</div>
          </div>;})}
          </>
        )}
      </div>

      <div style={{background:"#fff",borderTop:"0.5px solid #e0ddd6",padding:"12px 24px",display:"flex",gap:10,flexShrink:0}}>
        <input value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuick()} placeholder="快速添加任务…" style={{flex:1,padding:"8px 12px",border:"0.5px solid #ccc",borderRadius:7,fontSize:13}}/>
        <button onClick={addQuick} style={{padding:"8px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>添加↵</button>
        <button onClick={()=>setShowBrainDump(true)} style={{padding:"8px 12px",border:"0.5px solid #e0ddd6",background:"#f7f6f3",borderRadius:7,fontSize:13,cursor:"pointer",color:"#666"}}>🧠</button>
        <button onClick={()=>setAiOpen(true)} style={{padding:"8px 14px",border:"0.5px solid #B5D4F4",background:"#EBF3FB",color:"#185FA5",borderRadius:7,fontSize:13,cursor:"pointer"}}>✨ AI</button>
      </div>
    </div>

    <AIPanel open={aiOpen} onClose={()=>setAiOpen(false)} tasks={tasks} onSubtasksAdded={addSubsFromAI} sendRef={aiRef} apiKey={geminiKey} setApiKey={setGeminiKey} onAddTask={addTask} courses={courses} onUpdateCourse={updateCourse} syncTick={syncTick}/>
    {detail&&<TaskDetail task={detail} onClose={()=>setDetail(null)} onSave={saveDetail} onDelete={delTask}/>}
    {showMigration&&<MigrationPanel tasks={tasks} onMigrate={handleMigrate} onClose={()=>setShowMigration(false)}/>}
    {showBrainDump&&<BrainDump onClose={()=>setShowBrainDump(false)} onAddTasks={addBrainTasks} apiKey={geminiKey} courses={courses} onAddIdeas={addBrainIdeas}/>}
    {showMonthlyReview&&<MonthlyReview tasks={tasks} onClose={()=>setShowMonthlyReview(false)}/>}
    {showLaunch&&<LaunchRitual tasks={tasks} onDismiss={()=>setShowLaunch(false)} geminiKey={geminiKey} onAddTask={addTask}/>}
    {showReview&&<ReviewPanel courses={courses} onUpdateNote={updateCourseNote} onClose={()=>setShowReview(false)}/>}
    {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} onSynced={(t,id)=>{setGhToken(t);setGistId(id);ghTokenRef.current=t;gistIdRef.current=id;isFirstLoad.current=false;setTimeout(loadFromGist,100);}}/>}
    {showBlockBreaker&&<BlockBreaker tasks={tasks} onAddTask={addTask} onUpdateTask={saveDetail} geminiKey={geminiKey} onClose={()=>setShowBlockBreaker(false)}/>}
    {checkInTask&&<DailyCheckIn task={checkInTask} onSave={saveCheckIn} onClose={()=>setCheckInTask(null)}/>}
    {showRoutineSelector&&!activeRoutine&&<RoutineSelector tasks={tasks} darkMode={darkMode} onStart={r=>{setActiveRoutine(r);setShowRoutineSelector(false);SoundEngine.stepStart();}} onClose={()=>setShowRoutineSelector(false)}/>}
    {showRoutineManager&&<RoutineManager onClose={()=>setShowRoutineManager(false)} darkMode={darkMode}/>}
    {activeRoutine&&<RoutineExecutor routine={activeRoutine} tasks={tasks} darkMode={darkMode} onTaskDone={(id,extra)=>routineTaskDone(id,extra)} onComplete={()=>setActiveRoutine(null)} onExit={()=>setActiveRoutine(null)}/>}

    {showAdd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:400,boxShadow:"0 8px 40px rgba(0,0,0,.15)"}} className="fade-in">
        <div style={{fontSize:15,fontWeight:500,marginBottom:16}}>添加任务</div>
        {[["任务名称",<input key="t" value={nTask.title} onChange={e=>setNTask(n=>({...n,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addModal()} placeholder="输入任务名称…" autoFocus style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["所属项目",<select key="p" value={nTask.project} onChange={e=>setNTask(n=>({...n,project:parseInt(e.target.value)}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
          ["开始日期",<input key="s" type="date" value={nTask.startDate} onChange={e=>setNTask(n=>({...n,startDate:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["截止日期",<input key="d" type="date" value={nTask.due} onChange={e=>setNTask(n=>({...n,due:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["优先级",<select key="pr" value={nTask.priority} onChange={e=>setNTask(n=>({...n,priority:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天</option><option value="normal">⚪ 普通</option></select>],
        ].map(([l,el])=><div key={l} style={{marginBottom:12}}><div style={{fontSize:12,color:"#777",marginBottom:4}}>{l}</div>{el}</div>)}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:18}}>
          <button onClick={()=>setShowAdd(false)} style={{padding:"7px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={addModal} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>保存任务</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
