<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 专注板</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f6f3;color:#1a1a1a}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid #185FA5;outline-offset:1px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
@media(max-width:640px){
  .sidebar-desktop{display:none!important}
  .sidebar-mobile-open{display:flex!important}
  .main-area{margin-right:0!important}
  .ai-panel-mobile{width:100vw!important;width:100dvw!important}
}
@media(min-width:641px){
  .mobile-menu-btn{display:none!important}
  .sidebar-desktop{display:flex!important}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const PROJECTS=[
  {id:1,name:"工作",color:"#185FA5"},
  {id:2,name:"个人成长",color:"#0F6E56"},
  {id:3,name:"健康",color:"#993C1D"},
];
const BULLET_TYPES=[
  {sym:"•",label:"任务",color:"#185FA5"},
  {sym:"○",label:"事件",color:"#0F6E56"},
  {sym:"—",label:"笔记",color:"#666"},
  {sym:">",label:"已迁移",color:"#854F0B"},
  {sym:"×",label:"已取消",color:"#A32D2D"},
];
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const BLANK_TASK={notes:"",attachments:[],subtasks:[],subtaskDone:[],expanded:false,startDate:"",done:false,migrateCount:0,fromJournal:false};

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
function todayStr(){return new Date().toISOString().split("T")[0];}
function daysFromNow(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function yyyymmdd(d){return d.toISOString().split("T")[0];}
function addDays(str,n){const d=new Date(str+"T00:00:00");d.setDate(d.getDate()+n);return yyyymmdd(d);}
function daysBetween(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function fmtDate(str){
  if(!str)return"";
  const d=new Date(str+"T00:00:00");
  const diff=Math.round((d-new Date().setHours(0,0,0,0))/86400000);
  if(diff<0)return"已逾期";if(diff===0)return"今天";if(diff===1)return"明天";
  return`${d.getMonth()+1}/${d.getDate()}`;
}
function isOverdue(str){return str?new Date(str+"T00:00:00")<new Date().setHours(0,0,0,0):false;}
function getProj(id){return PROJECTS.find(p=>p.id===id)||{name:"无项目",color:"#888"};}
function monthKey(y,m){return`${y}-${String(m+1).padStart(2,"0")}`;}
function fmtSize(b){return b<1024?b+"B":b<1048576?Math.round(b/1024)+"KB":(b/1048576).toFixed(1)+"MB";}

/* ═══════════════════════════════════════════
   GIST SYNC
═══════════════════════════════════════════ */
const GIST_FILENAME="zhujiao_data.json";

async function gistLoad(token,gistId){
  const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`}});
  if(!res.ok)throw new Error("读取失败");
  const data=await res.json();
  const raw=data.files?.[GIST_FILENAME]?.content;
  return raw?JSON.parse(raw):null;
}

async function gistSave(token,gistId,payload){
  const res=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILENAME]:{content:JSON.stringify(payload,null,2)}}}),
  });
  if(!res.ok)throw new Error("保存失败");
  return res.json();
}

async function gistCreate(token){
  const res=await fetch("https://api.github.com/gists",{
    method:"POST",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({description:"专注板数据",public:false,files:{[GIST_FILENAME]:{content:JSON.stringify({tasks:[],journal:{},futureLog:{},courses:[],nextId:1},null,2)}}}),
  });
  if(!res.ok)throw new Error("创建Gist失败");
  const data=await res.json();
  return data.id;
}

async function gistFindOrCreate(token){
  // Search for existing "专注板数据" gist first
  try{
    const res=await fetch("https://api.github.com/gists?per_page=100",{
      headers:{Authorization:`token ${token}`}
    });
    if(res.ok){
      const list=await res.json();
      const found=list.find(g=>
        g.description==="专注板数据"&&
        g.files&&g.files[GIST_FILENAME]
      );
      if(found)return found.id;
    }
  }catch(e){}
  // Not found, create new
  return await gistCreate(token);
}

/* ═══════════════════════════════════════════
   LOCAL STORAGE (fallback + settings)
═══════════════════════════════════════════ */
function lsGet(k,def=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ═══════════════════════════════════════════
   SAMPLE DATA
═══════════════════════════════════════════ */
const SAMPLE_TASKS=[
  {...BLANK_TASK,id:1,title:"准备季度汇报PPT",project:1,due:daysFromNow(5),startDate:daysFromNow(-2),priority:"urgent",migrateCount:1},
  {...BLANK_TASK,id:2,title:"回复产品经理邮件",project:1,due:daysFromNow(0),startDate:todayStr(),priority:"today"},
  {...BLANK_TASK,id:3,title:"读《深度工作》第三章",project:2,due:daysFromNow(6),startDate:daysFromNow(1),priority:"normal",subtasks:["第一节笔记","第二节笔记","总结"],subtaskDone:[false,false,false]},
  {...BLANK_TASK,id:4,title:"预约牙医",project:3,due:daysFromNow(-1),startDate:daysFromNow(-3),priority:"urgent",migrateCount:2},
];

/* ═══════════════════════════════════════════
   TINY UI COMPONENTS
═══════════════════════════════════════════ */
function Check({checked,onClick,size=18}){
  return<div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",border:checked?"none":"1.5px solid #bbb",background:checked?"#185FA5":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
    {checked&&<span style={{color:"#fff",fontSize:size*.55,fontWeight:700}}>✓</span>}
  </div>;
}
function Tag({type}){
  const S={urgent:{bg:"#FCEBEB",c:"#A32D2D",l:"紧急"},today:{bg:"#FAEEDA",c:"#854F0B",l:"今天"},normal:{bg:"#f0ede8",c:"#777",l:"普通"}};
  const s=S[type]||S.normal;
  return<span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>;
}
function MigrateTag({count}){
  if(!count)return null;
  const color=count>=3?"#A32D2D":count>=2?"#854F0B":"#aaa";
  return<span title={`已迁移${count}次`} style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:count>=3?"#FCEBEB":count>=2?"#FAEEDA":"#f0ede8",color,whiteSpace:"nowrap"}}>迁移×{count}</span>;
}
function SyncBadge({status,hasToken}){
  const S={
    idle:{c:"#bbb",l:hasToken?"":"未连接云同步"},
    saving:{c:"#854F0B",l:"同步中…"},
    saved:{c:"#0F6E56",l:"✓ 已同步"},
    error:{c:"#A32D2D",l:"⚠ 同步失败，点🔄重试"}
  };
  const s=S[status]||S.idle;
  if(!s.l)return null;
  return<span style={{fontSize:11,color:s.c}}>{s.l}</span>;
}

/* ═══════════════════════════════════════════
   TASK ROW
═══════════════════════════════════════════ */
function TaskRow({task,onToggle,onToggleSub,onExpand,onAI,onOpen,onCheckIn}){
  const p=getProj(task.project);
  const ov=isOverdue(task.due)&&!task.done;
  const stale=task.migrateCount>=3;
  const dueToday=task.due===todayStr()&&!task.done;
  const dueTomorrow=task.due===daysFromNow(1)&&!task.done;
  const isBlockTask=task.title.startsWith("[Day ")&&task.notes?.includes("📌 今日微任务");
  const hasCheckIn=task.checkInOutput||task.checkInDate;

  // Urgency border color
  let borderColor="#e0ddd6";
  let bgColor="#fff";
  if(ov){borderColor="#f5a8a8";bgColor="#FFFAFA";}
  else if(dueToday){borderColor="#f0c070";bgColor="#FFFDF5";}
  else if(stale){borderColor="#f0b8b8";}
  else if(task.priority==="urgent"&&!task.done){borderColor="#e8b4b4";}

  return<div style={{marginBottom:5}} className="fade-in">
    <div style={{background:bgColor,border:"0.5px solid "+borderColor,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,opacity:task.done?.5:1,
      outline:ov&&!task.done?"2px solid rgba(163,45,45,.15)":"none",outlineOffset:1}}>
      <Check checked={task.done} onClick={()=>onToggle(task.id)}/>
      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onOpen(task)}>
        <div style={{fontSize:14,color:task.done?"#aaa":"#1a1a1a",textDecoration:task.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
        <div style={{display:"flex",gap:8,marginTop:2,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:p.color}}>{p.name}</span>
          {isBlockTask&&!hasCheckIn&&!task.done&&<span style={{fontSize:11,color:"#854F0B",background:"#FAEEDA",padding:"1px 6px",borderRadius:4,fontWeight:600}}>需打卡</span>}
          {hasCheckIn&&<span style={{fontSize:11,color:"#0F6E56",background:"#E1F5EE",padding:"1px 6px",borderRadius:4}}>✓ 已打卡</span>}
          {task.notes&&<span style={{fontSize:11,color:"#bbb"}}>📝</span>}
          {task.attachments?.length>0&&<span style={{fontSize:11,color:"#bbb"}}>📎{task.attachments.length}</span>}
          {stale&&<span style={{fontSize:11,color:"#A32D2D"}}>已推了{task.migrateCount}次</span>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {task.due&&<span style={{fontSize:11,color:ov?"#A32D2D":dueToday?"#854F0B":"#aaa",fontWeight:ov||dueToday?600:400,whiteSpace:"nowrap",background:ov?"#FCEBEB":dueToday?"#FAEEDA":"transparent",padding:ov||dueToday?"1px 6px":"0",borderRadius:4}}>📅{fmtDate(task.due)}</span>}
        <Tag type={task.priority}/>
        <MigrateTag count={task.migrateCount}/>
        {isBlockTask&&!task.done&&onCheckIn&&(
          <button onClick={e=>{e.stopPropagation();onCheckIn(task);}} style={{fontSize:11,color:"#fff",background:"#854F0B",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>打卡↗</button>
        )}
        {!task.done&&!task.subtasks.length&&!isBlockTask&&<button onClick={()=>onAI(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>拆解↗</button>}
        {task.subtasks.length>0&&<button onClick={()=>onExpand(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>{task.expanded?"▲":"▼"}{task.subtasks.length}步</button>}
      </div>
    </div>
    {task.expanded&&task.subtasks.length>0&&<div style={{paddingLeft:40,marginTop:3,display:"flex",flexDirection:"column",gap:3}}>
      {task.subtasks.map((s,i)=><div key={i} onClick={()=>onToggleSub(task.id,i)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:6,fontSize:13,color:task.subtaskDone[i]?"#aaa":"#555",background:"#f7f6f3",cursor:"pointer",textDecoration:task.subtaskDone[i]?"line-through":"none"}}>
        <Check checked={task.subtaskDone[i]} size={14} onClick={e=>{e.stopPropagation();onToggleSub(task.id,i);}}/>
        {s}
      </div>)}
    </div>}
    {isBlockTask&&task.notes&&!task.done&&(()=>{
      const micro=task.notes.match(/📌 今日微任务：(.+)/)?.[1];
      if(!micro)return null;
      return<div style={{marginLeft:40,marginTop:3,padding:"6px 10px",background:"#FAEEDA",borderRadius:6,fontSize:12,color:"#854F0B",borderLeft:"3px solid #854F0B"}}>
        今天做：{micro}
      </div>;
    })()}
  </div>;
}

/* ═══════════════════════════════════════════
   TASK DETAIL MODAL
═══════════════════════════════════════════ */
function TaskDetail({task,onClose,onSave,onDelete}){
  const [f,setF]=useState({title:task.title,project:task.project,due:task.due||"",startDate:task.startDate||"",priority:task.priority,notes:task.notes||"",attachments:[...(task.attachments||[])],subtasks:[...task.subtasks],subtaskDone:[...task.subtaskDone],estimate:task.estimate||""});
  const [ns,setNs]=useState("");
  const fRef=useRef();
  function up(k,v){setF(x=>({...x,[k]:v}));}
  function addSub(){if(!ns.trim())return;setF(x=>({...x,subtasks:[...x.subtasks,ns.trim()],subtaskDone:[...x.subtaskDone,false]}));setNs("");}
  function rmSub(i){setF(x=>({...x,subtasks:x.subtasks.filter((_,j)=>j!==i),subtaskDone:x.subtaskDone.filter((_,j)=>j!==i)}));}
  function handleFile(e){Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>setF(x=>({...x,attachments:[...x.attachments,{name:file.name,size:file.size,type:file.type,data:ev.target.result}]}));r.readAsDataURL(file);});}
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"40px 16px"}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,boxShadow:"0 12px 48px rgba(0,0,0,.2)",marginBottom:40}} className="fade-in">
      <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"flex-start",gap:12}}>
        <textarea value={f.title} onChange={e=>up("title",e.target.value)} style={{flex:1,fontSize:16,fontWeight:500,border:"none",outline:"none",resize:"none",lineHeight:1.4,background:"transparent",padding:0}} rows={1} onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}/>
        <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer",flexShrink:0}}>✕</button>
      </div>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["所属项目",<select value={f.project} onChange={e=>up("project",parseInt(e.target.value))} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
            ["优先级",<select value={f.priority} onChange={e=>up("priority",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天</option><option value="normal">⚪ 普通</option></select>],
            ["开始日期",<input type="date" value={f.startDate} onChange={e=>up("startDate",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
            ["截止日期",<input type="date" value={f.due} onChange={e=>up("due",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
            ["预计时间",<TimeEstimateSelect value={f.estimate||""} onChange={v=>up("estimate",v)}/>],
          ].map(([l,el])=><div key={l}><div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{l}</div>{el}</div>)}
        </div>
        <div><div style={{fontSize:11,color:"#aaa",marginBottom:4}}>备注</div>
          <textarea value={f.notes} onChange={e=>up("notes",e.target.value)} placeholder="添加任何想记录的内容…" rows={3} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,lineHeight:1.6}}/>
        </div>
        <div><div style={{fontSize:11,color:"#aaa",marginBottom:6}}>子步骤</div>
          {f.subtasks.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,background:"#f7f6f3",marginBottom:4}}>
            <Check checked={f.subtaskDone[i]} size={14} onClick={()=>{const sd=[...f.subtaskDone];sd[i]=!sd[i];up("subtaskDone",sd);}}/>
            <span style={{flex:1,fontSize:13,color:f.subtaskDone[i]?"#aaa":"#444",textDecoration:f.subtaskDone[i]?"line-through":"none"}}>{s}</span>
            <button onClick={()=>rmSub(i)} style={{color:"#ccc",background:"none",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <input value={ns} onChange={e=>setNs(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSub()} placeholder="添加步骤，回车确认" style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
            <button onClick={addSub} style={{padding:"6px 12px",background:"#f0ede8",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,cursor:"pointer"}}>+添加</button>
          </div>
        </div>
        <div><div style={{fontSize:11,color:"#aaa",marginBottom:6}}>附件</div>
          {f.attachments.map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#f7f6f3",borderRadius:6,marginBottom:4}}>
            <span>{a.type?.startsWith("image")?"🖼️":a.type?.includes("pdf")?"📄":"📎"}</span>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div><div style={{fontSize:11,color:"#aaa"}}>{fmtSize(a.size)}</div></div>
            <a href={a.data} download={a.name} style={{fontSize:11,color:"#185FA5",textDecoration:"none"}}>下载</a>
            <button onClick={()=>setF(x=>({...x,attachments:x.attachments.filter((_,j)=>j!==i)}))} style={{color:"#ccc",background:"none",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
          <button onClick={()=>fRef.current.click()} style={{padding:"6px 14px",border:"0.5px dashed #ccc",background:"#fafafa",borderRadius:6,fontSize:13,cursor:"pointer",color:"#666",width:"100%"}}>+ 上传文件</button>
          <input ref={fRef} type="file" multiple style={{display:"none"}} onChange={handleFile}/>
        </div>
      </div>
      <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>onDelete(task.id)} style={{fontSize:13,color:"#A32D2D",background:"none",border:"none",cursor:"pointer"}}>删除任务</button>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{padding:"7px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={()=>{if(f.title.trim())onSave({...task,...f});}} style={{padding:"7px 16px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>保存</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   EVENING MIGRATION PANEL
═══════════════════════════════════════════ */
function MigrationPanel({tasks,onMigrate,onClose}){
  const pending=tasks.filter(t=>!t.done&&t.due<=todayStr());
  const [decisions,setDecisions]=useState(()=>Object.fromEntries(pending.map(t=>[t.id,"tomorrow"])));
  function decide(id,v){setDecisions(d=>({...d,[id]:v}));}
  function confirm(){onMigrate(decisions);onClose();}
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>🌙 结束今天</div>
        <div style={{fontSize:13,color:"#888"}}>今天有 {pending.length} 个未完成任务，每个选一个去向</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 24px",display:"flex",flexDirection:"column",gap:10}}>
        {pending.length===0&&<div style={{fontSize:14,color:"#aaa",textAlign:"center",padding:"32px 0"}}>🎉 今天全部完成了！厉害！</div>}

/* ═══════════════════════════════════════════
   BRAIN DUMP MODAL
═══════════════════════════════════════════ */
function BrainDump({onClose,onAddTasks,apiKey}){
  const [text,setText]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  async function analyze(){
    if(!text.trim())return;
    if(!apiKey){setResult({error:"请先在AI助手里设置 Gemini API Key"});return;}
    setLoading(true);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`用户现在脑子很乱，把以下内容分类整理成JSON。分为：tasks（需要做的事，数组，每项有title字符串）、worries（担忧/焦虑，数组字符串）、ideas（想法/灵感，数组字符串）。只返回JSON，不要其他文字。\n\n用户内容：${text}`}]}]}),
      });
      const data=await res.json();
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      const clean=raw.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
    }catch(e){setResult({error:"分析失败，请重试"});}
    setLoading(false);
  }
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>🧠 脑倾倒</div>
        <div style={{fontSize:13,color:"#888"}}>把脑子里所有东西都倒出来，不用整理，AI帮你分类</div>
      </div>
      <div style={{padding:"16px 24px"}}>
        {!result&&<>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"想到什么写什么，比如：\n- 明天要交报告好像\n- 一直担心那个项目\n- 想学摄影\n- 好像忘了回某人消息\n..."} rows={7} style={{width:"100%",padding:"10px 12px",border:"0.5px solid #ccc",borderRadius:8,fontSize:14,lineHeight:1.7,marginBottom:12}}/>
          <button onClick={analyze} disabled={loading} style={{width:"100%",padding:"10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",opacity:loading?.7:1}}>
            {loading?"分析中…":"🪄 AI帮我整理"}
          </button>
        </>}
        {result&&!result.error&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          {result.tasks?.length>0&&<div>
            <div style={{fontSize:12,color:"#185FA5",fontWeight:600,marginBottom:6}}>✅ 需要做的事 ({result.tasks.length})</div>
            {result.tasks.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:"#EBF3FB",borderRadius:6,marginBottom:3,fontSize:13}}><span style={{color:"#185FA5"}}>•</span>{t.title}</div>)}
          </div>}
          {result.worries?.length>0&&<div>
            <div style={{fontSize:12,color:"#854F0B",fontWeight:600,marginBottom:6}}>😰 担忧/焦虑 ({result.worries.length})</div>
            {result.worries.map((w,i)=><div key={i} style={{padding:"6px 8px",background:"#FAEEDA",borderRadius:6,marginBottom:3,fontSize:13}}>{w}</div>)}
          </div>}
          {result.ideas?.length>0&&<div>
            <div style={{fontSize:12,color:"#0F6E56",fontWeight:600,marginBottom:6}}>💡 想法/灵感 ({result.ideas.length})</div>
            {result.ideas.map((d,i)=><div key={i} style={{padding:"6px 8px",background:"#E1F5EE",borderRadius:6,marginBottom:3,fontSize:13}}>{d}</div>)}

/* ═══════════════════════════════════════════
   FUTURE LOG
═══════════════════════════════════════════ */
function FutureLog({futureLog,onUpdate,onMoveToTasks}){
  const [input,setInput]=useState("");
  const [selMonth,setSelMonth]=useState(()=>{const d=new Date();return monthKey(d.getFullYear(),d.getMonth()+1);});
  const today=new Date();
  const months=Array.from({length:6},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()+1+i,1);return{key:monthKey(d.getFullYear(),d.getMonth()),label:`${d.getFullYear()}年${MONTHS[d.getMonth()]}`,y:d.getFullYear(),m:d.getMonth()};});
  function addItem(){
    if(!input.trim())return;
    const items=[...(futureLog[selMonth]||[]),{id:Date.now(),text:input.trim()}];
    onUpdate({...futureLog,[selMonth]:items});setInput("");
  }
  function removeItem(mk,id){onUpdate({...futureLog,[mk]:(futureLog[mk]||[]).filter(i=>i.id!==id)});}
  function moveToTask(mk,item){onMoveToTasks(item.text,mk);removeItem(mk,item.id);}
  return<div>
    <div style={{fontSize:13,color:"#888",marginBottom:16}}>把"以后想做但不是现在"的事放在这里，清空大脑里的模糊焦虑池</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
      {months.map(({key,label})=>{
        const items=futureLog[key]||[];
        return<div key={key} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,overflow:"hidden"}}>
          <div style={{padding:"10px 14px",borderBottom:"0.5px solid #f0ede8",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:500}}>{label}</span>
            <span style={{fontSize:11,color:"#aaa"}}>{items.length}件事</span>
          </div>
          <div style={{padding:"8px 12px",minHeight:60}}>
            {items.length===0&&<div style={{fontSize:12,color:"#ddd",padding:"8px 0",textAlign:"center"}}>空的，随时可以放东西进来</div>}
            {items.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"0.5px solid #f7f6f3"}}>
              <span style={{flex:1,fontSize:13,color:"#555"}}>{item.text}</span>
              <button onClick={()=>moveToTask(key,item)} title="移入任务列表" style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"1px 4px"}}>→任务</button>
              <button onClick={()=>removeItem(key,item.id)} style={{color:"#ddd",background:"none",border:"none",cursor:"pointer",fontSize:13}}>✕</button>
            </div>)}
          </div>
        </div>;
      })}
    </div>
    <div style={{marginTop:16,display:"flex",gap:8}}>
      <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{padding:"7px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>
        {months.map(({key,label})=><option key={key} value={key}>{label}</option>)}
      </select>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="有什么事以后想做…" style={{flex:1,padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
      <button onClick={addItem} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>放进去</button>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   GANTT
═══════════════════════════════════════════ */
function GanttView({tasks,onOpen}){
  const today=todayStr();
  const active=tasks.filter(t=>t.startDate&&t.due);
  if(!active.length)return<div style={{padding:"40px 0",textAlign:"center",color:"#aaa",fontSize:14}}>在任务详情里添加「开始日期」后会显示在这里</div>;
  const all=[...active.flatMap(t=>[t.startDate,t.due]),today];
  const minD=all.reduce((a,b)=>a<b?a:b);
  const maxD=all.reduce((a,b)=>a>b?a:b);
  const span=Math.max(daysBetween(minD,maxD)+1,14);
  const dates=Array.from({length:span},(_,i)=>addDays(minD,i));
  const COL=36,ROW=38,LEFT=180;
  return<div style={{overflowX:"auto",paddingBottom:8}}>
    <div style={{minWidth:LEFT+span*COL}}>
      <div style={{display:"flex",position:"sticky",top:0,background:"#f7f6f3",zIndex:2,borderBottom:"0.5px solid #e0ddd6",paddingBottom:4}}>
        <div style={{width:LEFT,flexShrink:0,fontSize:12,color:"#aaa",padding:"6px 8px"}}>任务</div>
        {dates.map(d=>{const isT=d===today;const dom=new Date(d+"T00:00:00").getDate();const isMon=new Date(d+"T00:00:00").getDay()===1;return<div key={d} style={{width:COL,flexShrink:0,textAlign:"center",fontSize:10,color:isT?"#185FA5":isMon?"#555":"#bbb",fontWeight:isT?700:isMon?500:400,paddingTop:6}}>{isT?<span style={{background:"#185FA5",color:"#fff",borderRadius:10,padding:"1px 5px"}}>{dom}</span>:dom}</div>;})}
      </div>
      {active.map(t=>{
        const p=getProj(t.project);
        const s=daysBetween(minD,t.startDate);const e=daysBetween(minD,t.due);
        const w=Math.max(e-s+1,1)*COL;const x=s*COL;
        const pct=t.subtasks.length?Math.round(t.subtaskDone.filter(Boolean).length/t.subtasks.length*100):t.done?100:0;
        return<div key={t.id} style={{display:"flex",alignItems:"center",borderBottom:"0.5px solid #f0ede8",height:ROW,position:"relative"}}>
          <div style={{width:LEFT,flexShrink:0,padding:"0 8px",cursor:"pointer",overflow:"hidden"}} onClick={()=>onOpen(t)}>
            <div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.done?"#aaa":"#1a1a1a",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
            <div style={{fontSize:11,color:p.color}}>{p.name}</div>
          </div>
          {dates.map((d,i)=><div key={d} style={{position:"absolute",left:LEFT+i*COL,top:0,width:COL,height:"100%",background:d===today?"rgba(24,95,165,.05)":"transparent",borderRight:i%7===6?"0.5px solid #e0ddd6":"none"}}/>)}
          <div onClick={()=>onOpen(t)} style={{position:"absolute",left:LEFT+x,width:w,height:22,top:(ROW-22)/2,borderRadius:5,background:t.done?"#ddd":p.color,cursor:"pointer",overflow:"hidden",display:"flex",alignItems:"center"}}>
            {pct>0&&!t.done&&<div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,.3)",borderRadius:"5px 0 0 5px"}}/>}
            {w>60&&<span style={{position:"absolute",left:8,fontSize:11,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",maxWidth:w-16}}>{t.title}</span>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   CALENDAR + BULLET JOURNAL
═══════════════════════════════════════════ */
function CalendarView({tasks,onAddTask,journal,onJournalUpdate}){
  const [curMonth,setCurMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selDay,setSelDay]=useState(todayStr());
  const [newEntry,setNewEntry]=useState("");
  const [newType,setNewType]=useState("•");
  const today=todayStr();
  function getDayEntries(d){return journal[d]||[];}
  function saveJ(j){onJournalUpdate(j);}
  function addEntry(){
    if(!newEntry.trim())return;
    const entry={id:Date.now(),sym:newType,text:newEntry.trim(),done:false};
    saveJ({...journal,[selDay]:[...getDayEntries(selDay),entry]});
    if(newType==="•")onAddTask({title:newEntry.trim(),project:1,due:selDay,priority:"normal",fromJournal:true});
    setNewEntry("");
  }
  function toggleEntry(d,id){saveJ({...journal,[d]:getDayEntries(d).map(e=>e.id===id?{...e,done:!e.done}:e)});}
  function deleteEntry(d,id){saveJ({...journal,[d]:getDayEntries(d).filter(e=>e.id!==id)});}
  const firstDay=new Date(curMonth.y,curMonth.m,1);
  const lastDay=new Date(curMonth.y,curMonth.m+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=lastDay.getDate();d++)cells.push(new Date(curMonth.y,curMonth.m,d));
  function hasDot(d){const s=yyyymmdd(d);return tasks.some(t=>t.due===s)||getDayEntries(s).length>0;}
  const selEntries=getDayEntries(selDay);
  const selTasks=tasks.filter(t=>t.due===selDay);
  return<div style={{display:"flex",gap:20,alignItems:"flex-start"}}>

// ── Markdown Renderer ──
function renderMarkdown(text){
  if(!text)return null;
  const lines=text.split("\n");
  const elements=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Blank line
    if(!line.trim()){elements.push(React.createElement("div",{key:i,style:{height:6}}));i++;continue;}
    // HR
    if(/^---+$/.test(line.trim())){elements.push(React.createElement("hr",{key:i,style:{border:"none",borderTop:"0.5px solid #e0ddd6",margin:"8px 0"}}));i++;continue;}
    // H1/H2/H3
    const h3=line.match(/^###\s+(.*)/);
    const h2=line.match(/^##\s+(.*)/);
    const h1=line.match(/^#\s+(.*)/);
    if(h1||h2||h3){
      const txt=(h1||h2||h3)[1];
      const sz=h1?15:h2?14:13;
      elements.push(React.createElement("div",{key:i,style:{fontSize:sz,fontWeight:600,margin:"10px 0 4px",color:"#1a1a1a"}},inlineMarkdown(txt)));
      i++;continue;
    }
    // Bullet list (*, -, •)
    if(/^[\s]*[*\-•]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^[\s]*[*\-•]\s/.test(lines[i])){
        const indent=(lines[i].match(/^(\s*)/)||["",""])[1].length;
        const txt=lines[i].replace(/^[\s]*[*\-•]\s/,"");
        items.push(React.createElement("div",{key:i,style:{display:"flex",gap:6,paddingLeft:indent>0?16:0,marginBottom:2}},
          React.createElement("span",{style:{color:"#888",flexShrink:0,marginTop:1}},"·"),
          React.createElement("span",{style:{flex:1}},inlineMarkdown(txt))
        ));
        i++;
      }
      elements.push(React.createElement("div",{key:"ul"+i,style:{fontSize:13,lineHeight:1.6,color:"#1a1a1a",marginBottom:4}},items));
      continue;
    }
    // Numbered list
    if(/^[\s]*\d+[.)]\s/.test(line)){
      const items=[];
      let num=1;
      while(i<lines.length&&/^[\s]*\d+[.)]\s/.test(lines[i])){
        const txt=lines[i].replace(/^[\s]*\d+[.)]\s/,"");
        items.push(React.createElement("div",{key:i,style:{display:"flex",gap:8,marginBottom:2}},
          React.createElement("span",{style:{color:"#888",flexShrink:0,minWidth:16,textAlign:"right"}},(num++)+"."),
          React.createElement("span",{style:{flex:1}},inlineMarkdown(txt))
        ));
        i++;
      }
      elements.push(React.createElement("div",{key:"ol"+i,style:{fontSize:13,lineHeight:1.6,color:"#1a1a1a",marginBottom:4}},items));
      continue;
    }
    // Normal paragraph
    elements.push(React.createElement("div",{key:i,style:{fontSize:13,lineHeight:1.7,color:"#1a1a1a",marginBottom:3}},inlineMarkdown(line)));
    i++;
  }
  return elements;
}

function inlineMarkdown(text){
  // Parse **bold**, *italic*, `code` inline
  const parts=[];
  const re=/(\*\*([^*]+)\*\*|\*([^*]+)\*|`([^`]+)`)/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    if(m[2])parts.push(React.createElement("strong",{key:m.index,style:{fontWeight:600}},m[2]));
    else if(m[3])parts.push(React.createElement("em",{key:m.index,style:{fontStyle:"italic"}},m[3]));
    else if(m[4])parts.push(React.createElement("code",{key:m.index,style:{fontFamily:"monospace",background:"#f0ede8",padding:"1px 4px",borderRadius:3,fontSize:12}},m[4]));
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return parts.length===1&&typeof parts[0]==="string"?parts[0]:parts;
}

// ── External plan importer ──
// Parses Claude-generated HTML plans (day-card format) or JSON into task arrays
function parseExternalPlan(content){
  // Try JSON first
  try{
    const clean=content.replace(/```json|```/g,"").trim();
    const data=JSON.parse(clean);
    if(Array.isArray(data))return data.map(t=>({
      title:t.title||t.name||"未命名任务",
      priority:t.priority||"normal",
      due:t.due||t.deadline||"",
      estimate:String(t.estimate||t.minutes||t.mins||""),
      notes:t.notes||t.desc||t.description||"",
      subtasks:Array.isArray(t.subtasks)?t.subtasks:Array.isArray(t.steps)?t.steps:[],
      subtaskDone:Array.isArray(t.subtasks)?t.subtasks.map(()=>false):Array.isArray(t.steps)?t.steps.map(()=>false):[],
      project:t.project||2,
    }));
  }catch(e){}

  // Try Claude HTML plan format (day-card structure)
  const tasks=[];
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(content,"text/html");
    const dayCards=doc.querySelectorAll(".day-card");
    if(dayCards.length>0){
      dayCards.forEach((card,i)=>{
        const titleEl=card.querySelector(".day-title");
        const subEl=card.querySelector(".day-sub");
        const badgeEl=card.querySelector(".badge");
        const taskEls=card.querySelectorAll(".tasks li");
        const hwEls=card.querySelectorAll(".hw-tasks li");
        const timeLabelEl=card.querySelector(".time-label");

        const title=(titleEl?.textContent||"Day "+(i+1)).trim();
        const sub=(subEl?.textContent||"").trim();
        const badge=(badgeEl?.textContent||"").trim();
        // Parse estimate from badge like "2h" "2.5h" "3h"
        const estMatch=badge.match(/([\d.]+)h/);
        const estMins=estMatch?Math.round(parseFloat(estMatch[1])*60):"";

        // Reading key points → notes
        const points=Array.from(taskEls).map(el=>el.textContent.trim()).filter(Boolean);
        // Homework tasks → subtasks
        const hw=Array.from(hwEls).map(el=>el.textContent.replace(/^\d+/,"").trim()).filter(Boolean);

        tasks.push({
          title:"Day "+(i+1)+" "+title,
          priority:i===0?"urgent":i<2?"today":"normal",
          due:"",
          estimate:estMins?String(estMins):"",
          notes:points.length?"📖 "+sub+"\n\n阅读重点：\n"+points.map(p=>"• "+p).join("\n"):"",
          subtasks:hw,
          subtaskDone:hw.map(()=>false),
          project:2,
        });
      });
      if(tasks.length>0)return tasks;
    }
  }catch(e){}

  // Fallback: line-by-line heuristic (markdown / plain text)
  const lines=content.split("\n").filter(l=>l.trim());
  const dayBlocks=[];
  let cur=null;
  for(const line of lines){
    const dayMatch=line.match(/^(Day\s*\d+|第\s*[\d一二三四五六七八九十]+\s*[天日])[：:\s—–-]*(.*)/i);
    if(dayMatch){
      if(cur)dayBlocks.push(cur);
      cur={title:dayMatch[0].replace(/^[\*#\s]+/,"").trim(),bullets:[],hw:[]};
    } else if(cur){
      const hw=/作业|homework|练习|output|产出/i.test(line);
      if(/^[\s]*[-•*]\s/.test(line)){
        const text=line.replace(/^[\s]*[-•*]\s/,"").trim();
        hw?cur.hw.push(text):cur.bullets.push(text);
      }
    }
  }
  if(cur)dayBlocks.push(cur);
  if(dayBlocks.length>0){
    return dayBlocks.map((b,i)=>({
      title:b.title,
      priority:i===0?"urgent":i<2?"today":"normal",
      due:"",estimate:"",
      notes:b.bullets.length?"阅读重点：\n"+b.bullets.map(p=>"• "+p).join("\n"):"",
      subtasks:b.hw,subtaskDone:b.hw.map(()=>false),
      project:2,
    }));
  }
  return[];
}

      "    if(ty){ty.id='';ty.className='am';ty.textContent=rep;}",
      "  }catch(e){",
      "    var ty=document.getElementById('ty');",
      "    if(ty){ty.id='';ty.style.color='#A32D2D';ty.textContent='\u9519\u8bef\uff1a'+e.message;}",
      "  }",
      "  el.scrollTop=9999;",
      "}",
      "<\/script></body></html>"
    ].join("");
    var blob=new Blob([htmlContent],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    window.open(url,"aiwin","width=640,height=700,resizable=yes,scrollbars=yes");
  }
  function handleFile(e){
    Array.from(e.target.files).forEach(file=>{
      if(!file.type.startsWith("image/"))return;
      const r=new FileReader();
      r.onload=ev=>{
        const b64=ev.target.result.split(",")[1];
        setPendingImgs(imgs=>[...imgs,{preview:ev.target.result,data:b64,type:file.type,name:file.name}]);
      };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }

  async function callGemini(key,contents){
    const models=["gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];
    for(const model of models){
      try{
        const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents}),
        });
        const data=await res.json();
        if(data.error){
          if(data.error.code===404||data.error.status==="NOT_FOUND")continue;
          throw new Error(data.error.message);
        }
        return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }catch(e){
        if(e.message?.includes("NOT_FOUND")||e.message?.includes("not found"))continue;
        throw e;
      }
    }
    throw new Error("所有模型不可用，请检查Key权限或访问 aistudio.google.com 重新获取");
  }

  function hasTaskContent(text){
    if(!text)return false;
    const lines=text.split("\n");
    const taskLines=lines.filter(l=>
      /^[\s]*[•\-\*\d]+[.)\s]/.test(l.trim())||
      /Day\s*\d+/i.test(l)||
      /第[\d一二三四五六七八九十]+[天周步]/.test(l)||
      /^#{1,3}\s/.test(l)
    );
    return taskLines.length>=2;
  }

  async function extractTasks(msgIndex,text){
    if(!apiKey)return;
    setExtracting(msgIndex);
    const prompt="从以下学习计划中提取任务，返回JSON数组。\n"
      +"每个任务对应一天或一个阶段，格式严格如下：\n"
      +"{\"title\":\"Day 1 标题\",\"priority\":\"urgent|today|normal\",\"due\":\"\","
      +"\"estimate\":\"分钟数字符串，如 120 代表2小时\","
      +"\"notes\":\"当天的阅读重点/学习要点，每条用•开头\","
      +"\"subtasks\":[\"作业1完整描述\",\"作业2完整描述\"]}\n\n"
      +"规则：\n"
      +"1. estimate：从时间标记提取，1h=60，2h=120，2.5h=150，只填数字字符串\n"
      +"2. notes：填该天的阅读重点/学习要点，不是作业\n"
      +"3. subtasks：只填作业/练习/每日产出的内容，每条保留完整描述\n"
      +"4. 第1天priority=urgent，第2-3天today，其余normal\n"
      +"5. 只返回JSON数组，不要其他文字\n\n"
      +"内容：\n"+text;
    try{
      const reply=await callGemini(apiKey,[{parts:[{text:prompt}]}]);
      const clean=reply.replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g,"").trim();
      const parsed=JSON.parse(clean);
      if(Array.isArray(parsed)&&parsed.length>0){
        setTaskPreview({
          msgIndex,
          tasks:parsed.map(t=>({
            title:t.title||"",
            priority:t.priority||"normal",
            due:t.due||"",
            estimate:String(t.estimate||""),
            notes:t.notes||"",
            project:2,
            subtasks:Array.isArray(t.subtasks)?t.subtasks:[],
            subtaskDone:Array.isArray(t.subtasks)?t.subtasks.map(()=>false):[],
          })),
          selected:parsed.map(()=>true)
        });
      }
    }catch(e){console.error("Extract failed:",e);}
    setExtracting(null);
  }

  function confirmAddTasks(){
    if(!taskPreview)return;
    const toAdd=taskPreview.tasks.filter((_,i)=>taskPreview.selected[i]);
    toAdd.forEach(t=>onAddTask(t));
    setTaskPreview(null);
    setMsgs(m=>[...m,{role:"ai",text:"✓ 已将 "+toAdd.length+" 个任务加入专注板",images:[]}]);
  }

  async function doSend(text,btid,imgOverride){
    const imgs=imgOverride!==undefined?imgOverride:pendingImgs;
    if(!text?.trim()&&!imgs.length||loading)return;
    if(!apiKey){setShowKey(true);return;}
    const msg=(text||"").trim();
    setInput("");setPendingImgs([]);
    setMsgs(m=>[...m,{role:"user",text:msg,images:imgs.map(p=>p.preview)}]);
    setLoading(true);
    const ctx=tasks.filter(t=>!t.done).map(t=>"- "+t.title+"（"+getProj(t.project).name+"，"+t.priority+"）").join("\n");
    const sys="你是一个思考深入的学习规划师和效率助手。\n\n"+
    "用户当前任务：\n"+ctx+"\n\n"+
    "回答原则：\n"+
    "- 真正分析内容，不要逐条复述原文\n"+
    "- 做学习规划时：按天/阶段组织，说明每天的学习重点和逻辑，而不是罗列所有子标题\n"+
    "- 任务拆解时：以天或阶段为单位，把具体内容作为子步骤，不要每个小点都变成独立任务\n"+
    "- 给出真实的判断和建议，比如哪些章节更重要、哪些可以快速过\n"+
    "- 直接回答，不用开场白";
    const parts=[{text:sys+"\n\n用户："+msg}];
    imgs.forEach(p=>parts.push({inline_data:{mime_type:p.type,data:p.data}}));
    try{
      const reply=await callGemini(apiKey,[{parts}]);
      setMsgs(m=>[...m,{role:"ai",text:reply,images:[]}]);
      if(btid){
        const steps=reply.split("\n").filter(l=>l.trim().startsWith("•")).map(l=>l.replace(/^•\s*/,"").trim()).filter(Boolean);
        if(steps.length)onSubtasksAdded(btid,steps);
      }
    }catch(e){
      setMsgs(m=>[...m,{role:"ai",text:"错误："+e.message,images:[]}]);
    }
    setLoading(false);
  }

  useEffect(()=>{if(msgRef.current)msgRef.current.scrollTop=9999;},[msgs]);
  useEffect(()=>{
    if(sendRef)sendRef.current=(task)=>doSend("帮我把这个任务拆解成具体可执行的步骤："+task.title,task.id,[]);
  });

  if(!open)return null;

  // ── History sidebar panel ──
  if(showHistory) return(
    <div style={{position:"fixed",right:0,top:0,height:"100%",width:"min(580px,100vw)",background:"#fff",borderLeft:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",zIndex:100,boxShadow:"-4px 0 24px rgba(0,0,0,.1)"}}>
      <div style={{padding:"14px 16px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>

        <span style={{fontSize:14,fontWeight:500,flex:1}}>历史对话</span>

      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>

        {allGroups.map(g=>(
          <div key={g} style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,padding:"0 4px"}}>{g}</div>

              <ConvItem key={c.id} conv={c} active={activeConvId===c.id} onSelect={()=>{setActiveConvId(c.id);setShowHistory(false);}}
                onDelete={()=>deleteConv(c.id)} onRename={(v)=>renameConv(c.id,v)}
                onSetGroup={(gv)=>setConvGroup(c.id,gv)} allGroups={allGroups}/>
            ))}
          </div>
        ))}
        {history.filter(c=>!c.group).length>0&&(
          <div>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,padding:"0 4px"}}>未分组</div>
            {history.filter(c=>!c.group).map(c=>(
              <ConvItem key={c.id} conv={c} active={activeConvId===c.id} onSelect={()=>{setActiveConvId(c.id);setShowHistory(false);}}
                onDelete={()=>deleteConv(c.id)} onRename={(v)=>renameConv(c.id,v)}
                onSetGroup={(gv)=>setConvGroup(c.id,gv)} allGroups={allGroups}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  // ── Import modal ──
  if(showImport) return(
    <ImportPlanModal onClose={()=>setShowImport(false)} onImport={(parsed)=>{
      setTaskPreview({msgIndex:-1,tasks:parsed,selected:parsed.map(()=>true)});
      setShowImport(false);
    }}/>
  );

  return(
    <div style={{position:"fixed",right:0,top:0,height:"100%",width:"min(580px,100vw)",background:"#fff",borderLeft:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",zIndex:100,boxShadow:"-4px 0 24px rgba(0,0,0,.1)"}}>
      {/* Header */}
      <div style={{padding:"12px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
        <span style={{fontSize:14,fontWeight:500,flex:1}}>✨ AI助手</span>
        <button onClick={()=>setShowImport(true)} title="导入外部计划" style={{fontSize:11,border:"0.5px solid #ccc",background:"#f7f6f3",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:"#555"}}>📥 导入计划</button>
        <button onClick={()=>setShowHistory(true)} style={{fontSize:11,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:"#666"}}>🗂 历史{history.length>0?" ("+history.length+")":""}</button>
        <button onClick={newConv} style={{fontSize:11,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:"#666"}}>+ 新对话</button>
        <button onClick={()=>setShowKey(v=>!v)} style={{fontSize:11,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:apiKey?"#0F6E56":"#cc6600"}}>{apiKey?"🔑":"🔑 设置"}</button>
        <button onClick={onClose} style={{fontSize:12,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"4px 9px",cursor:"pointer"}}>✕</button>
      </div>

      {/* Conv name bar */}
      {activeConv&&(
        <div style={{padding:"6px 14px",borderBottom:"0.5px solid #f0ede8",background:"#fafaf8",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <input value={activeConv.name} onChange={e=>renameConv(activeConvId,e.target.value)}
            style={{flex:1,fontSize:12,border:"none",background:"transparent",outline:"none",color:"#555",fontWeight:500}}
            placeholder="对话名称（点击编辑）"/>
          <select value={activeConv.group||""} onChange={e=>setConvGroup(activeConvId,e.target.value)}
            style={{fontSize:11,border:"0.5px solid #e0ddd6",borderRadius:4,padding:"2px 4px",color:"#888",background:"transparent"}}>
            <option value="">无分组</option>
            {allGroups.map(g=><option key={g} value={g}>{g}</option>)}
            <option value="__new__">＋ 新建分组…</option>
          </select>
        </div>
      )}

      {showKey&&(
        <div style={{padding:12,background:"#fffbe6",borderBottom:"0.5px solid #e8e0c0",flexShrink:0}}>
          <div style={{fontSize:12,color:"#666",marginBottom:6}}>Gemini API Key：</div>

            <input defaultValue={apiKey} placeholder="AIza..." id="gkey" type="password" style={{flex:1,fontSize:12,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:5}}/>
            <button onClick={()=>saveKey(document.getElementById("gkey").value.trim())} style={{fontSize:12,padding:"6px 10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:5,cursor:"pointer"}}>保存</button>
          </div>
          <div style={{fontSize:11,color:"#999",marginTop:6,lineHeight:1.7}}>
            免费Key：<a href="https://aistudio.google.com/app/apikey" target="_blank" style={{color:"#185FA5"}}>aistudio.google.com</a> → 选 Gemini 2.5 Flash
          </div>
        </div>
      )}

      {/* Import preview (when coming from import modal) */}
      {taskPreview&&taskPreview.msgIndex===-1&&(
        <div style={{padding:"12px 14px",borderBottom:"0.5px solid #e0ddd6",background:"#EBF3FB",flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:500,color:"#185FA5",marginBottom:8}}>📥 导入预览 — 选择要加入的任务：</div>
          <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto",marginBottom:8}}>
            {taskPreview.tasks.map((t,ti)=>(
              <label key={ti} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 8px",borderRadius:6,background:taskPreview.selected[ti]?"rgba(24,95,165,.1)":"rgba(255,255,255,.6)",cursor:"pointer"}}>
                <input type="checkbox" checked={taskPreview.selected[ti]} onChange={()=>setTaskPreview(p=>({...p,selected:p.selected.map((s,j)=>j===ti?!s:s)}))} style={{marginTop:2,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:500}}>{t.title}</div>
                  <div style={{fontSize:11,color:"#666",marginTop:1}}>
                    {t.estimate&&<span>⏱ {t.estimate}分钟</span>}
                    {t.subtasks?.length>0&&<span style={{marginLeft:8}}>📋 {t.subtasks.length}个作业</span>}
                    {t.notes&&<span style={{marginLeft:8}}>📝 有学习重点</span>}
                  </div>
                </div>
              </label>
            ))}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#185FA5",flex:1}}>{taskPreview.selected.filter(Boolean).length}/{taskPreview.tasks.length} 已选</span>
            <button onClick={()=>setTaskPreview(null)} style={{fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>取消</button>
            <button onClick={confirmAddTasks} disabled={!taskPreview.selected.some(Boolean)} style={{fontSize:12,fontWeight:500,color:"#fff",background:"#185FA5",border:"none",borderRadius:6,padding:"6px 14px",cursor:"pointer"}}>

          <div key={i}>

              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>

                  <div style={{padding:"6px 12px 10px",borderTop:"0.5px solid #e8e5e0"}}>
                    <button onClick={()=>extractTasks(i,m.text)} disabled={extracting===i}
                      style={{fontSize:12,color:"#185FA5",background:"#EBF3FB",border:"0.5px solid #B5D4F4",borderRadius:6,padding:"5px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                      {extracting===i?"⏳ 提取中…":"📋 提取为任务（含时长+重点+作业）"}
                    </button>
                  </div>
                )}
                {m.role==="ai"&&taskPreview?.msgIndex===i&&(
                  <div style={{padding:"10px 12px",borderTop:"0.5px solid #e8e5e0"}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1a1a1a",marginBottom:8}}>选择要加入的任务：</div>

                      {taskPreview.tasks.map((t,ti)=>(
                        <label key={ti} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 6px",borderRadius:5,background:taskPreview.selected[ti]?"#f0f7ff":"#fafafa",cursor:"pointer"}}>
                          <input type="checkbox" checked={taskPreview.selected[ti]} onChange={()=>setTaskPreview(p=>({...p,selected:p.selected.map((s,j)=>j===ti?!s:s)}))} style={{marginTop:2,flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,color:"#1a1a1a",lineHeight:1.4,fontWeight:500}}>{t.title}</div>
                            {t.estimate&&<div style={{fontSize:11,color:"#854F0B",marginTop:1}}>⏱ {t.estimate}分钟</div>}
                            {t.notes&&<div style={{fontSize:11,color:"#0F6E56",marginTop:1}}>📝 有学习重点</div>}
                            {t.subtasks&&t.subtasks.length>0&&(
                              <div style={{fontSize:11,color:"#666",marginTop:2,lineHeight:1.5}}>
                                {t.subtasks.slice(0,2).map((s,si)=>(
                                  <div key={si} style={{paddingLeft:8}}>· {s.length>40?s.slice(0,40)+"…":s}</div>
                                ))}
                                {t.subtasks.length>2&&<div style={{paddingLeft:8,color:"#aaa"}}>+{t.subtasks.length-2}个作业</div>}
                              </div>
                            )}
                          </div>
                        </label>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#aaa",flex:1}}>{taskPreview.selected.filter(Boolean).length}/{taskPreview.tasks.length} 已选</span>
                      <button onClick={()=>setTaskPreview(null)} style={{fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>取消</button>
                      <button onClick={confirmAddTasks} disabled={!taskPreview.selected.some(Boolean)}
                        style={{fontSize:12,fontWeight:500,color:"#fff",background:"#1a1a1a",border:"none",borderRadius:6,padding:"6px 14px",cursor:"pointer"}}>
                        加入专注板 ({taskPreview.selected.filter(Boolean).length})
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
        {loading&&<div style={{fontSize:13,color:"#aaa",fontStyle:"italic"}} className="pulse">思考中…</div>}
      </div>

      {pendingImgs.length>0&&(
        <div style={{padding:"8px 12px",borderTop:"0.5px solid #f0ede8",display:"flex",gap:8,flexWrap:"wrap",flexShrink:0,background:"#fafafa"}}>
          {pendingImgs.map((img,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={img.preview} style={{width:56,height:56,borderRadius:6,objectFit:"cover"}}/>
              <button onClick={()=>setPendingImgs(imgs=>imgs.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,width:18,height:18,borderRadius:"50%",background:"#A32D2D",color:"#fff",border:"none",cursor:"pointer",fontSize:11,lineHeight:"18px",padding:0,textAlign:"center"}}>✕</button>
            </div>
          ))}
        </div>
      )}

      <div style={{padding:"10px 12px",borderTop:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",gap:8,flexShrink:0,background:"#fff"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(input.trim()||pendingImgs.length)doSend(input);}}}
          placeholder="输入消息… (Enter发送，Shift+Enter换行)"
          rows={2}
          style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,resize:"none",lineHeight:1.5,fontFamily:"inherit",outline:"none"}}
        />
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>fileRef.current.click()} style={{padding:"6px 12px",border:"0.5px solid #ccc",background:"#f7f6f3",borderRadius:6,fontSize:12,cursor:"pointer",color:"#555",flexShrink:0}}>📎 图片</button>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFile}/>
          <span style={{flex:1,fontSize:11,color:"#ccc"}}>支持截图分析</span>
          <button onClick={()=>doSend(input)} disabled={loading||(!input.trim()&&!pendingImgs.length)}
            style={{padding:"7px 22px",background:loading?"#ccc":"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:loading?"default":"pointer",fontWeight:500,flexShrink:0}}>发送</button>
        </div>
      </div>
    </div>
  );
}

// ── ConvItem: history list item ──
function ConvItem({conv,active,onSelect,onDelete,onRename,onSetGroup,allGroups}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(conv.name);
  const [showGroup,setShowGroup]=useState(false);
  const [newGrp,setNewGrp]=useState("");
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 8px",borderRadius:7,marginBottom:3,background:active?"#EBF3FB":"transparent",cursor:"pointer"}} onClick={onSelect}>
      {editing?(

function SettingsPanel({onClose,onSynced}){

    if(!token.trim()){setMsg("请输入 Token");return;}
    setStatus("saving");setMsg("查找已有数据…");
    try{
      // Always search for existing gist first - fixes cross-device sync
      const id=await gistFindOrCreate(token.trim());
      lsSet("zj_gh_token",token.trim());

      setGistId(id);
      setStatus("saved");

function daysSince(dateStr){
  if(!dateStr)return 999;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
}

function getLearningLog(courses){
  // returns map of dateStr -> minutes studied
  const log={};
  courses.forEach(c=>{
    (c.studyLog||[]).forEach(({date,minutes})=>{
      log[date]=(log[date]||0)+minutes;
    });
  });
  return log;
}

// ── Heatmap ──
function LearningHeatmap({courses}){
  const log=getLearningLog(courses);
  const today=new Date();
  const cells=[];
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=yyyymmdd(d);
    const mins=log[k]||0;
    cells.push({k,mins,d});
  }
  const weeks=[];
  let week=[];
  cells.forEach((c,i)=>{
    week.push(c);
    if(week.length===7||(i===cells.length-1)){weeks.push(week);week=[];}
  });
  function getColor(mins){
    if(!mins)return"#f0ede8";
    if(mins<20)return"#c6e6c6";
    if(mins<45)return"#74c474";
    return"#2d9c2d";
  }
  const totalDays=cells.filter(c=>c.mins>0).length;
  const totalMins=cells.reduce((a,c)=>a+c.mins,0);
  return<div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontSize:13,fontWeight:500}}>过去90天学习记录</span>
      <span style={{fontSize:12,color:"#888"}}>{totalDays}天有学习 · 共{Math.round(totalMins/60)}小时</span>
    </div>
    <div style={{display:"flex",gap:3}}>
      {weeks.map((w,wi)=><div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
        {w.map(c=><div key={c.k} title={`${c.k}: ${c.mins}分钟`} style={{width:10,height:10,borderRadius:2,background:getColor(c.mins),cursor:"default"}}/>)}
      </div>)}
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8,fontSize:11,color:"#aaa"}}>
      <span>少</span>
      {["#f0ede8","#c6e6c6","#74c474","#2d9c2d"].map(c=><div key={c} style={{width:10,height:10,borderRadius:2,background:c}}/>)}
      <span>多</span>
    </div>
  </div>;
}

// ── Focus Mode ──
function FocusMode({course,episode,onComplete,onExit,onSaveNote,geminiKey}){
  const [minutes,setMinutes]=useState(0);
  const [noteText,setNoteText]=useState("");
  const [done,setDone]=useState(false);
  const [bgUrl,setBgUrl]=useState("");
  const [bgLoading,setBgLoading]=useState(true);
  // Pomodoro
  const MODES={work:{label:"专注",mins:25,color:"#e05c4b"},shortBreak:{label:"短休息",mins:5,color:"#4b9e8a"},longBreak:{label:"长休息",mins:15,color:"#4b6dbf"}};
  const [pomMode,setPomMode]=useState("work");
  const [pomSecs,setPomSecs]=useState(MODES.work.mins*60);
  const [pomRunning,setPomRunning]=useState(false);
  const [pomCount,setPomCount]=useState(0);
  const timerRef=useRef(null);
  const studyTimer=useRef(null);

  // Bing wallpaper
  useEffect(()=>{
    setBgLoading(true);
    // Use a Bing random wallpaper via their API
    const urls=[
      "https://bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN",
    ];
    fetch("https://bing.com/HPImageArchive.aspx?format=js&idx="+Math.floor(Math.random()*7)+"&n=1&mkt=zh-CN")
      .then(r=>r.json())
      .then(data=>{
        const path=data?.images?.[0]?.url;
        if(path){
          setBgUrl("https://bing.com"+path);
        } else {
          // fallback gradient
          setBgUrl("");
        }
        setBgLoading(false);
      })
      .catch(()=>{setBgUrl("");setBgLoading(false);});
  },[]);

  // Study minute counter
  useEffect(()=>{
    studyTimer.current=setInterval(()=>setMinutes(m=>m+1),60000);
    return()=>clearInterval(studyTimer.current);
  },[]);

  // Pomodoro countdown
  useEffect(()=>{
    if(pomRunning){
      timerRef.current=setInterval(()=>{
        setPomSecs(s=>{
          if(s<=1){
            clearInterval(timerRef.current);
            setPomRunning(false);
            // Auto advance
            if(pomMode==="work"){
              const next=pomCount+1;
              setPomCount(next);
              const nextMode=next%4===0?"longBreak":"shortBreak";
              setPomMode(nextMode);
              setPomSecs(MODES[nextMode].mins*60);
            } else {
              setPomMode("work");
              setPomSecs(MODES.work.mins*60);
            }
            return 0;
          }
          return s-1;
        });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return()=>clearInterval(timerRef.current);
  },[pomRunning,pomMode]);

  function switchMode(mode){
    clearInterval(timerRef.current);
    setPomMode(mode);
    setPomSecs(MODES[mode].mins*60);
    setPomRunning(false);
  }

  function fmtTime(s){
    return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
  }

  const pct=pomSecs/(MODES[pomMode].mins*60);
  const radius=54;
  const circ=2*Math.PI*radius;
  const strokeDash=circ*pct;
  const modeColor=MODES[pomMode].color;

  async function finish(){
    if(noteText.trim())await onSaveNote(noteText,episode?.id);
    onComplete(minutes||1,pomCount);
    setDone(true);
  }

  const bgStyle=bgUrl?{
    backgroundImage:"url("+bgUrl+")",
    backgroundSize:"cover",
    backgroundPosition:"center",
  }:{
    background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",...bgStyle}}>
      {/* Dark overlay */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)"}}/>
      {/* Exit button */}
      <button onClick={onExit} style={{position:"absolute",top:20,right:24,background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.7)",fontSize:13,padding:"6px 14px",borderRadius:8,cursor:"pointer",zIndex:1}}>✕ 退出</button>
      {/* Refresh wallpaper */}
      <button onClick={()=>{setBgLoading(true);fetch("https://bing.com/HPImageArchive.aspx?format=js&idx="+Math.floor(Math.random()*7)+"&n=1&mkt=zh-CN").then(r=>r.json()).then(d=>{const p=d?.images?.[0]?.url;setBgUrl(p?"https://bing.com"+p:"");setBgLoading(false);}).catch(()=>{setBgUrl("");setBgLoading(false);});}} style={{position:"absolute",top:20,right:120,background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",fontSize:12,padding:"6px 12px",borderRadius:8,cursor:"pointer",zIndex:1}}>🖼 换壁纸</button>

      {!done?(
        <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",width:"100%",maxWidth:480,padding:"0 20px"}}>
          {/* Course + episode */}
          <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginBottom:4,letterSpacing:".08em",textTransform:"uppercase"}}>{course.title}</div>

          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:20}}>已学习 {minutes} 分钟 · 第 {pomCount+1} 个番茄</div>

          </div>
        </div>
      ):(
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:16}}>🌟</div>
          <div style={{fontSize:22,fontWeight:600,color:"#fff",marginBottom:8}}>完成了！学了 {minutes} 分钟</div>

        </div>
      )}
    </div>
  );
}


// ── Note Card ──
function NoteCard({note,onAISummarize,geminiKey,onDelete}){
  const [expanded,setExpanded]=useState(false);
  const [loading,setLoading]=useState(false);
  async function summarize(){
    if(!geminiKey||!note.content)return;
    setLoading(true);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`你是一个学习助手。从以下笔记中提炼：1）3个核心要点（每点一句话，用"•"开头）2）1个立即可执行的行动项（用"→"开头）。只返回这4行，不要其他内容。\n\n笔记：${note.content}`}]}]}),
      });
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const lines=text.split("\n").filter(l=>l.trim());
      const points=lines.filter(l=>l.trim().startsWith("•")).map(l=>l.replace(/^•\s*/,"").trim());
      const action=lines.find(l=>l.trim().startsWith("→"))?.replace(/^→\s*/,"").trim()||"";
      onAISummarize(note.id,points,action);
    }catch(e){}
    setLoading(false);
  }
  return<div style={{background:"#f7f6f3",borderRadius:8,padding:"12px 14px",marginBottom:8}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:2}}>{note.title||"无标题笔记"}</div>
        <div style={{fontSize:11,color:"#aaa"}}>{note.createdAt?.slice(0,10)}{note.filePath&&<span style={{marginLeft:8}}>📁 {note.filePath.split(/[/\\]/).pop()}</span>}</div>
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        {note.content&&!note.aiSummary&&<button onClick={summarize} disabled={loading} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>{loading?"分析中…":"AI提炼↗"}</button>}
        <button onClick={()=>setExpanded(v=>!v)} style={{fontSize:11,color:"#888",background:"none",border:"none",cursor:"pointer"}}>{expanded?"收起":"展开"}</button>
        <button onClick={()=>onDelete(note.id)} style={{fontSize:12,color:"#ddd",background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>
    </div>
    {note.aiSummary&&note.aiSummary.length>0&&<div style={{marginTop:8,padding:"8px 10px",background:"#EBF3FB",borderRadius:6}}>
      <div style={{fontSize:11,color:"#185FA5",fontWeight:600,marginBottom:4}}>AI提炼</div>
      {note.aiSummary.map((p,i)=><div key={i} style={{fontSize:12,color:"#333",marginBottom:2}}>• {p}</div>)}
      {note.aiAction&&<div style={{fontSize:12,color:"#0F6E56",marginTop:4,fontWeight:500}}>→ {note.aiAction}</div>}
    </div>}
    {expanded&&note.content&&<div style={{marginTop:8,fontSize:13,color:"#555",lineHeight:1.7,whiteSpace:"pre-wrap",borderTop:"0.5px solid #e0ddd6",paddingTop:8}}>{note.content}</div>}
  </div>;
}

// ── Course Detail ──
function CourseDetail({course,onClose,onUpdate,onAddTaskToBoard,geminiKey,onAddPomEntry}){
  const [showEdit,setShowEdit]=useState(false);
  const [editingEp,setEditingEp]=useState(null);
  const [showAddNote,setShowAddNote]=useState(false);
  const [showAddEp,setShowAddEp]=useState(false);
  const [newEpTitle,setNewEpTitle]=useState("");
  const [focusEp,setFocusEp]=useState(null);
  const [showAssign,setShowAssign]=useState(false);
  const [newAssign,setNewAssign]=useState("");
  const donePct=course.episodes.length?Math.round(course.episodes.filter(e=>e.status==="done").length/course.episodes.length*100):0;
  const nextEp=course.episodes.find(e=>e.status==="todo"||e.status==="doing");
  const daysSinceStudy=daysSince(course.lastStudied);

  function updateEp(epId,changes){
    const episodes=course.episodes.map(e=>e.id===epId?{...e,...changes}:e);
    onUpdate({...course,episodes});
  }
  function addEp(){
    if(!newEpTitle.trim())return;
    const ep={...BLANK_EPISODE,id:Date.now(),title:newEpTitle.trim()};
    onUpdate({...course,episodes:[...course.episodes,ep]});
    setNewEpTitle("");setShowAddEp(false);
  }
  function addNote(noteData){
    const note={...BLANK_NOTE,...noteData,id:Date.now(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    onUpdate({...course,notes:[...(course.notes||[]),note]});
  }
  function deleteNote(noteId){onUpdate({...course,notes:(course.notes||[]).filter(n=>n.id!==noteId)});}
  function aiSummarize(noteId,points,action){
    const notes=(course.notes||[]).map(n=>n.id===noteId?{...n,aiSummary:points,aiAction:action}:n);
    onUpdate({...course,notes});
  }
  function addAssignment(){
    if(!newAssign.trim())return;
    const a={id:Date.now(),title:newAssign.trim(),status:"todo",due:""};
    onUpdate({...course,assignments:[...(course.assignments||[]),a]});
    setNewAssign("");
  }
  function pushAssignToBoard(a){
    onAddTaskToBoard({title:`[${course.title}] ${a.title}`,project:2,priority:"normal",due:a.due||""});
    const assignments=(course.assignments||[]).map(x=>x.id===a.id?{...x,pushed:true}:x);
    onUpdate({...course,assignments});
  }

  if(focusEp!==null){
    const ep=course.episodes[focusEp];
    return<FocusMode course={course} episode={ep}
      onComplete={(mins,poms)=>{
        updateEp(ep.id,{status:"done"});
        const log=[...(course.studyLog||[]),{date:todayStr(),minutes:mins}];
        const nextIdx=course.episodes.findIndex((e,i)=>i>focusEp&&e.status==="todo");
        if(nextIdx>-1)updateEp(course.episodes[nextIdx].id,{status:"doing"});
        onUpdate({...course,studyLog:log,lastStudied:todayStr()});
        if(onAddPomEntry&&poms>0)onAddPomEntry(poms,mins);
        setFocusEp(null);
      }}
      onSaveNote={(text,epId)=>addNote({title:`${ep?.title||""}笔记`,content:text,episodeId:epId,courseId:course.id})}
      onExit={()=>setFocusEp(null)}
      geminiKey={geminiKey}/>;
  }

  const STATUS_MAP={todo:{l:"未开始",c:"#bbb"},doing:{l:"进行中",c:"#854F0B"},done:{l:"✓",c:"#0F6E56"},review:{l:"★复习",c:"#185FA5"}};

  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:640,boxShadow:"0 12px 48px rgba(0,0,0,.2)",marginBottom:40}}>
      {/* header */}
      <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{course.title}</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,padding:"2px 8px",borderRadius:10,background:PLATFORMS.find(p=>p.id===course.platform)?.color+"22",color:PLATFORMS.find(p=>p.id===course.platform)?.color}}>{PLATFORMS.find(p=>p.id===course.platform)?.name}</span>
              {course.link&&<a href={course.link} target="_blank" style={{fontSize:12,color:"#185FA5"}}>打开课程↗</a>}
              {daysSinceStudy>14&&course.lastStudied&&<span style={{fontSize:11,color:"#854F0B",background:"#FAEEDA",padding:"2px 8px",borderRadius:10}}>⚠ {daysSinceStudy}天没学了</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setShowEdit(true)} style={{fontSize:12,color:"#666",background:"none",border:"0.5px solid #e0ddd6",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>编辑</button>
            <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
          </div>
        </div>
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:4}}>
            <span>进度 {donePct}%</span>
            <span>{course.episodes.filter(e=>e.status==="done").length}/{course.episodes.length} 集完成</span>
          </div>
          <div style={{height:6,background:"#f0ede8",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${donePct}%`,background:course.color||"#185FA5",borderRadius:3,transition:"width .3s"}}/>
          </div>
        </div>
        {nextEp&&<div style={{marginTop:10,display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#EBF3FB",borderRadius:8}}>
          <span style={{fontSize:12,color:"#185FA5",fontWeight:500}}>▶ 下一集：{nextEp.title||"第"+(course.episodes.indexOf(nextEp)+1)+"集"}</span>
          <button onClick={()=>setFocusEp(course.episodes.indexOf(nextEp))} style={{marginLeft:"auto",padding:"4px 14px",background:"#185FA5",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:500}}>开始学习</button>
        </div>}
      </div>

      {/* episodes */}
      <div style={{padding:"14px 20px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:500}}>章节列表</span>
          <button onClick={()=>setShowAddEp(v=>!v)} style={{fontSize:12,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>+ 添加</button>
        </div>
        {showAddEp&&<div style={{display:"flex",gap:6,marginBottom:10}}>
          <input value={newEpTitle} onChange={e=>setNewEpTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEp()} placeholder="集/章节名称" autoFocus style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>

            const s=STATUS_MAP[ep.status]||STATUS_MAP.todo;

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

          <input value={newAssign} onChange={e=>setNewAssign(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAssignment()} placeholder="作业/练习名称" autoFocus style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
          <button onClick={addAssignment} style={{padding:"6px 12px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>添加</button>
        </div>}
        {(course.assignments||[]).map(a=><div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,background:"#f7f6f3",marginBottom:4}}>

// ── Course Card ──
function CourseCard({course,onOpen,onToggleActive,onArchive}){
  const p=PLATFORMS.find(x=>x.id===course.platform)||PLATFORMS[4];
  const donePct=course.episodes.length?Math.round(course.episodes.filter(e=>e.status==="done").length/course.episodes.length*100):0;
  const nextEp=course.episodes.find(e=>e.status==="todo"||e.status==="doing");
  const stale=course.lastStudied&&daysSince(course.lastStudied)>14&&course.active;
  return<div style={{background:"#fff",border:`0.5px solid ${stale?"#f0b8b8":"#e0ddd6"}`,borderRadius:12,padding:"16px 18px",cursor:"pointer"}} onClick={()=>onOpen(course)}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{width:10,height:10,borderRadius:3,background:course.color||"#185FA5",flexShrink:0}}/>
          <span style={{fontSize:15,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{course.title}</span>
        </div>
        <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:p.color+"22",color:p.color}}>{p.name}</span>
      </div>
      <div style={{fontSize:16,fontWeight:600,color:donePct===100?"#0F6E56":"#1a1a1a",flexShrink:0,marginLeft:8}}>{donePct}%</div>
    </div>
    <div style={{height:5,background:"#f0ede8",borderRadius:3,overflow:"hidden",marginBottom:8}}>
      <div style={{height:"100%",width:`${donePct}%`,background:course.color||"#185FA5",borderRadius:3,transition:"width .3s"}}/>
    </div>
    {nextEp&&<div style={{fontSize:12,color:"#555",marginBottom:6}}>▶ 下一集：<span style={{color:"#185FA5"}}>{nextEp.title||"第"+(course.episodes.indexOf(nextEp)+1)+"集"}</span></div>}
