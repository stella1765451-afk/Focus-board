function SettingsPanel({onClose,onSynced}){
  const [token,setToken]=useState(()=>lsGet("zj_gh_token",""));
  const [gistId,setGistId]=useState(()=>lsGet("zj_gist_id",""));
  const [status,setStatus]=useState("idle");
  const [msg,setMsg]=useState("");
  async function connect(){
    if(!token.trim()){setMsg("请输入 Token");return;}
    setStatus("saving");setMsg("查找已有数据…");
    try{
      // Always search for existing gist first - fixes cross-device sync
      const id=await gistFindOrCreate(token.trim());
      lsSet("zj_gh_token",token.trim());
      lsSet("zj_gist_id",id);
      setGistId(id);
      setStatus("saved");
      setMsg("✓ 连接成功！Gist ID: "+id.slice(0,8)+"…");
      onSynced(token.trim(),id);
    }catch(e){setStatus("error");setMsg("连接失败："+e.message);}
  }
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:440,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:15,fontWeight:600}}>⚙️ 数据同步设置</span>
        <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>
        <div style={{background:"#EBF3FB",borderRadius:8,padding:"12px 14px",fontSize:13,color:"#185FA5",lineHeight:1.6}}>
          数据存在你的 GitHub Gist（私有）。每台设备第一次使用：输入同一个 Token → 点连接 → 自动找到已有数据。Token 只存本地浏览器。
        </div>
        <div>
          <div style={{fontSize:12,color:"#666",marginBottom:6}}>GitHub Personal Access Token（gist 权限）</div>
          <input type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_..." style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
          <div style={{fontSize:11,color:"#aaa",marginTop:4}}>没有 Token？→ GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → 只勾 gist 权限</div>
        </div>
        {gistId&&(
          <div style={{background:"#f7f6f3",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:12,color:"#0F6E56",marginBottom:4}}>✓ 已绑定 Gist</div>
            <div style={{fontSize:11,color:"#666",fontFamily:"monospace",wordBreak:"break-all"}}>{gistId}</div>
            <div style={{fontSize:11,color:"#aaa",marginTop:4}}>换设备时：输入同一个 Token 点连接，会自动找到这个 Gist</div>
          </div>
        )}
        {msg&&<div style={{fontSize:13,color:status==="saved"?"#0F6E56":status==="saving"?"#854F0B":"#A32D2D",lineHeight:1.5}}>{msg}</div>}
        <button onClick={connect} style={{padding:"10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",fontWeight:500}}>
          {status==="saving"?"连接中…":gistId?"重新搜索并连接":"连接 GitHub Gist"}
        </button>
      </div>
    </div>
  </div>;
}

// ← BLANK_COURSE / BLANK_EPISODE / BLANK_NOTE 已移至顶部 §DATA 区
function daysSince(dateStr){
  if(!dateStr)return 999;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
}

function getLearningLog(courses){
  // returns map of dateStr -> {mins, sketches, copies}
  const log={};
  function ensure(d){if(!log[d])log[d]={mins:0,sketches:0,copies:0};return log[d];}
  courses.forEach(c=>{
    // Study sessions
    (c.studyLog||[]).forEach(({date,minutes})=>{ensure(date).mins+=minutes||0;});
    // Sketch & copy submissions
    (c.assignments||[]).forEach(a=>{
      (a.submissions||[]).forEach(s=>{
        const d=s.date||todayStr();
        if(a.type==="sketch"){ensure(d).sketches+=(s.count||1);}
        else if(a.type==="copy_study"){ensure(d).copies+=1;}
      });
    });
  });
  return log;
}

// ── Heatmap ──
function LearningHeatmap({courses}){
  const log=getLearningLog(courses);
  const today=new Date();
  const cells=[];
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=yyyymmdd(d);
    cells.push({k,d});
  }
  const weeks=[];
  let week=[];
  cells.forEach((c,i)=>{
    week.push(c);
    if(week.length===7||(i===cells.length-1)){weeks.push(week);week=[];}
  });
  function getColor(cell){
    const d=log[cell.k]||{mins:0,sketches:0,copies:0};
    const hasPractice=d.sketches>0||d.copies>0;
    const mins=d.mins||0;
    if(!mins&&!hasPractice)return"#f0ede8";
    // Practice only (no study time): warm amber
    if(!mins&&hasPractice)return"#F5C842";
    // Study + practice: deeper green with tint
    if(mins<20)return hasPractice?"#a8d8a8":"#c6e6c6";
    if(mins<60)return hasPractice?"#4caf7d":"#74c474";
    return hasPractice?"#1a7a3a":"#2d9c2d";
  }
  const totalDays=cells.filter(c=>log[c.k]&&(log[c.k].mins>0||log[c.k].sketches>0||log[c.k].copies>0)).length;
  const totalMins=cells.reduce((a,c)=>a+(log[c.k]?.mins||0),0);
  const totalSketches=cells.reduce((a,c)=>a+(log[c.k]?.sketches||0),0);
  const totalCopies=cells.reduce((a,c)=>a+(log[c.k]?.copies||0),0);
  return<div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:13,fontWeight:500}}>过去90天学习记录</span>
      <span style={{fontSize:12,color:"#888"}}>{totalDays}天</span>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>
      {[["📚",Math.round(totalMins/60)+"h","学习"],["✏️",totalSketches+"张","速写"],["🎨",totalCopies+"次","临摹"]].map(([icon,val,label])=>(
        <div key={label} style={{fontSize:12,color:"#666"}}><span style={{fontWeight:600,color:"#1a1a1a"}}>{icon} {val}</span> {label}</div>
      ))}
    </div>
    <div style={{display:"flex",gap:3}}>
      {weeks.map((w,wi)=><div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
        {w.map(c=>{
          const d=log[c.k]||{};
          const tip=`${c.k}${d.mins?": "+d.mins+"分钟学习":""}${d.sketches?" · "+d.sketches+"张速写":""}${d.copies?" · "+d.copies+"次临摹":""}`;
          return<div key={c.k} title={tip} style={{width:10,height:10,borderRadius:2,background:getColor(c),cursor:"default"}}/>;
        })}
      </div>)}
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:8,fontSize:11,color:"#aaa",flexWrap:"wrap"}}>
      <span style={{marginRight:2}}>学习时间：</span>
      {["#f0ede8","#c6e6c6","#74c474","#2d9c2d"].map(c=><div key={c} style={{width:9,height:9,borderRadius:2,background:c}}/>)}
      <span style={{margin:"0 8px 0 2px"}}>少→多</span>
      <div style={{width:9,height:9,borderRadius:2,background:"#F5C842"}}/>
      <span>练习</span>
    </div>
  </div>;
}

// ── Focus Mode ──
function FocusMode({course,episode,onComplete,onExit,onSaveNote,geminiKey}){
  const [minutes,setMinutes]=useState(0);
  const [noteText,setNoteText]=useState("");
  const [done,setDone]=useState(false);
  const [bgUrl,setBgUrl]=useState("");
  const [bgLoading,setBgLoading]=useState(true);
  // Pomodoro
  const MODES={work:{label:"专注",mins:25,color:"#e05c4b"},shortBreak:{label:"短休息",mins:5,color:"#4b9e8a"},longBreak:{label:"长休息",mins:15,color:"#4b6dbf"}};
  const [pomMode,setPomMode]=useState("work");
  const [pomSecs,setPomSecs]=useState(MODES.work.mins*60);
  const [pomRunning,setPomRunning]=useState(false);
  const [pomCount,setPomCount]=useState(0);
  const timerRef=useRef(null);
  const studyTimer=useRef(null);

  // Wallpaper — Unsplash Source (no CORS, direct img URL)
  const WALL_TOPICS=["nature","forest","ocean","mountain","minimal","architecture","abstract","landscape"];
  function getWallUrl(){
    const topic=WALL_TOPICS[Math.floor(Math.random()*WALL_TOPICS.length)];
    return"https://source.unsplash.com/1600x900/?" +topic+"&sig="+Date.now();
  }
  useEffect(()=>{
    setBgLoading(true);
    setBgUrl(getWallUrl());
    setBgLoading(false);
  },[]);

  // Study minute counter
  useEffect(()=>{
    studyTimer.current=setInterval(()=>setMinutes(m=>m+1),60000);
    return()=>clearInterval(studyTimer.current);
  },[]);

  // Pomodoro countdown
  useEffect(()=>{
    if(pomRunning){
      timerRef.current=setInterval(()=>{
        setPomSecs(s=>{
          if(s<=1){
            clearInterval(timerRef.current);
            setPomRunning(false);
            // Notification
            const msg=pomMode==="work"?"⏰ 25分钟到了！休息一下":"☕ 休息结束，开始下一个番茄";
            document.title="⏰ 番茄结束 — 专注板";
            if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
              try{new Notification(msg,{icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🍅</text></svg>"});}catch(e){}
            }
            // Auto advance
            if(pomMode==="work"){
              const next=pomCount+1;
              setPomCount(next);
              const nextMode=next%4===0?"longBreak":"shortBreak";
              setPomMode(nextMode);
              setPomSecs(MODES[nextMode].mins*60);
            } else {
              setPomMode("work");
              setPomSecs(MODES.work.mins*60);
            }
            return 0;
          }
          // Update tab title
          const mm=String(Math.floor((s-1)/60)).padStart(2,"0");
          const ss2=String((s-1)%60).padStart(2,"0");
          document.title=`${mm}:${ss2} ${pomMode==="work"?"🍅":"☕"} — 专注板`;
          return s-1;
        });
      },1000);
    } else {
      clearInterval(timerRef.current);
    }
    return()=>{clearInterval(timerRef.current);document.title="专注板";};
  },[pomRunning,pomMode]);

  function switchMode(mode){
    clearInterval(timerRef.current);
    setPomMode(mode);
    setPomSecs(MODES[mode].mins*60);
    setPomRunning(false);
  }

  function fmtTime(s){
    return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
  }

  const pct=pomSecs/(MODES[pomMode].mins*60);
  const radius=54;
  const circ=2*Math.PI*radius;
  const strokeDash=circ*pct;
  const modeColor=MODES[pomMode].color;

  async function finish(){
    if(noteText.trim())await onSaveNote(noteText,episode?.id);
    onComplete(minutes||1,pomCount);
    setDone(true);
  }

  const bgStyle=bgUrl?{
    backgroundImage:"url("+bgUrl+")",
    backgroundSize:"cover",
    backgroundPosition:"center",
  }:{
    background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",...bgStyle}}>
      {/* Dark overlay */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)"}}/>
      {/* Exit button */}
      <button onClick={onExit} style={{position:"absolute",top:20,right:24,background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.7)",fontSize:13,padding:"6px 14px",borderRadius:8,cursor:"pointer",zIndex:1}}>✕ 退出</button>
      {/* Refresh wallpaper */}
      <button onClick={()=>{setBgUrl(getWallUrl());}} style={{position:"absolute",top:20,right:120,background:"rgba(255,255,255,.12)",border:"0.5px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.6)",fontSize:12,padding:"6px 12px",borderRadius:8,cursor:"pointer",zIndex:1}}>🖼 换壁纸</button>

      {!done?(
        <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",width:"100%",maxWidth:480,padding:"0 20px"}}>
          {/* Course + episode */}
          <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginBottom:4,letterSpacing:".08em",textTransform:"uppercase"}}>{course.title}</div>
          <div style={{fontSize:18,fontWeight:600,color:"#fff",marginBottom:32,textAlign:"center",lineHeight:1.3}}>{episode?.title||"学习中"}</div>

          {/* Pomodoro circle */}
          <div style={{marginBottom:24,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width={130} height={130} style={{transform:"rotate(-90deg)"}}>
              <circle cx={65} cy={65} r={radius} fill="none" stroke="rgba(255,255,255,.1)" strokeWidth={6}/>
              <circle cx={65} cy={65} r={radius} fill="none" stroke={modeColor} strokeWidth={6}
                strokeDasharray={circ} strokeDashoffset={circ-strokeDash}
                strokeLinecap="round" style={{transition:"stroke-dashoffset .5s"}}/>
            </svg>
            <div style={{position:"absolute",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:"#fff",letterSpacing:2,fontFamily:"monospace"}}>{fmtTime(pomSecs)}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{MODES[pomMode].label}</div>
            </div>
          </div>

          {/* Mode tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {Object.entries(MODES).map(([k,v])=>(
              <button key={k} onClick={()=>switchMode(k)} style={{padding:"4px 12px",borderRadius:20,border:"0.5px solid rgba(255,255,255,.2)",background:pomMode===k?"rgba(255,255,255,.2)":"transparent",color:pomMode===k?"#fff":"rgba(255,255,255,.5)",fontSize:11,cursor:"pointer"}}>{v.label}</button>
            ))}
          </div>

          {/* Controls */}
          <div style={{display:"flex",gap:10,marginBottom:28}}>
            <button onClick={()=>{if(!pomRunning&&typeof Notification!=="undefined"&&Notification.permission==="default")Notification.requestPermission();setPomRunning(r=>!r);}} style={{padding:"10px 28px",borderRadius:8,border:"none",background:pomRunning?"rgba(255,255,255,.2)":modeColor,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",minWidth:100}}>
              {pomRunning?"⏸ 暂停":"▶ 开始"}
            </button>
            <button onClick={()=>{setPomRunning(false);setPomSecs(MODES[pomMode].mins*60);}} style={{padding:"10px 16px",borderRadius:8,border:"0.5px solid rgba(255,255,255,.2)",background:"transparent",color:"rgba(255,255,255,.6)",fontSize:13,cursor:"pointer"}}>↺ 重置</button>
          </div>

          {/* Study time */}
          <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:20}}>已学习 {minutes} 分钟 · 第 {pomCount+1} 个番茄</div>

          {/* Note */}
          <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
            placeholder={"随手记下想法、重点、疑问…"}
            rows={3}
            style={{width:"100%",background:"rgba(255,255,255,.08)",border:"0.5px solid rgba(255,255,255,.15)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,lineHeight:1.6,outline:"none",resize:"none",marginBottom:16}}/>

          {/* Actions */}
          <div style={{display:"flex",gap:10,width:"100%"}}>
            <button onClick={onExit} style={{flex:1,padding:"10px",background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.7)",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>暂停，下次继续</button>
            <button onClick={finish} style={{flex:1,padding:"10px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",fontWeight:500}}>✓ 完成这一集</button>
          </div>
        </div>
      ):(
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div style={{fontSize:56,marginBottom:16}}>🌟</div>
          <div style={{fontSize:22,fontWeight:600,color:"#fff",marginBottom:8}}>完成了！学了 {minutes} 分钟</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.6)",marginBottom:32}}>你比昨天的自己又进了一步</div>
          <button onClick={onExit} style={{padding:"10px 32px",background:"#185FA5",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer"}}>回到课程</button>
        </div>
      )}
    </div>
  );
}


// ── Note Card ──
function NoteCard({note,onAISummarize,geminiKey,onDelete}){
  const [expanded,setExpanded]=useState(false);
  const [loading,setLoading]=useState(false);
  async function summarize(){
    if(!geminiKey||!note.content)return;
    setLoading(true);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`你是一个学习助手。从以下笔记中提炼：1）3个核心要点（每点一句话，用"•"开头）2）1个立即可执行的行动项（用"→"开头）。只返回这4行，不要其他内容。\n\n笔记：${note.content}`}]}]}),
      });
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const lines=text.split("\n").filter(l=>l.trim());
      const points=lines.filter(l=>l.trim().startsWith("•")).map(l=>l.replace(/^•\s*/,"").trim());
      const action=lines.find(l=>l.trim().startsWith("→"))?.replace(/^→\s*/,"").trim()||"";
      onAISummarize(note.id,points,action);
    }catch(e){}
    setLoading(false);
  }
  return<div style={{background:"#f7f6f3",borderRadius:8,padding:"12px 14px",marginBottom:8}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:2}}>{note.title||"无标题笔记"}</div>
        <div style={{fontSize:11,color:"#aaa"}}>{note.createdAt?.slice(0,10)}{note.filePath&&<span style={{marginLeft:8}}>📁 {note.filePath.split(/[/\\]/).pop()}</span>}</div>
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        {note.content&&!note.aiSummary&&<button onClick={summarize} disabled={loading} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}}>{loading?"分析中…":"AI提炼↗"}</button>}
        <button onClick={()=>setExpanded(v=>!v)} style={{fontSize:11,color:"#888",background:"none",border:"none",cursor:"pointer"}}>{expanded?"收起":"展开"}</button>
        <button onClick={()=>onDelete(note.id)} style={{fontSize:12,color:"#ddd",background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>
    </div>
    {note.aiSummary&&note.aiSummary.length>0&&<div style={{marginTop:8,padding:"8px 10px",background:"#EBF3FB",borderRadius:6}}>
      <div style={{fontSize:11,color:"#185FA5",fontWeight:600,marginBottom:4}}>AI提炼</div>
      {note.aiSummary.map((p,i)=><div key={i} style={{fontSize:12,color:"#333",marginBottom:2}}>• {p}</div>)}
      {note.aiAction&&<div style={{fontSize:12,color:"#0F6E56",marginTop:4,fontWeight:500}}>→ {note.aiAction}</div>}
    </div>}
    {expanded&&note.content&&<div style={{marginTop:8,fontSize:13,color:"#555",lineHeight:1.7,whiteSpace:"pre-wrap",borderTop:"0.5px solid #e0ddd6",paddingTop:8}}>{note.content}</div>}
  </div>;
}

// ── Course Detail ──
function CourseDetail({course,onClose,onUpdate,onAddTaskToBoard,geminiKey,onAddPomEntry,tasks,onToggleSub}){
  const [showEdit,setShowEdit]=useState(false);
  const [editingEp,setEditingEp]=useState(null);
  const [showAddNote,setShowAddNote]=useState(false);
  const [showAddEp,setShowAddEp]=useState(false);
  const [newEpTitle,setNewEpTitle]=useState("");
  const [focusEp,setFocusEp]=useState(null);
  const [showAssign,setShowAssign]=useState(false);
  const [newAssign,setNewAssign]=useState("");
  const [newAssignType,setNewAssignType]=useState("normal"); // normal | copy_study | sketch
  const [newAssignTarget,setNewAssignTarget]=useState(10);
  const [showPracticeCheckIn,setShowPracticeCheckIn]=useState(null); // assignment object
  const [expandedEp,setExpandedEp]=useState(null); // episode id
  const donePct=course.episodes.length?Math.round(course.episodes.filter(e=>e.status==="done").length/course.episodes.length*100):0;
  const nextEp=course.episodes.find(e=>e.status==="todo"||e.status==="doing");
  const daysSinceStudy=daysSince(course.lastStudied);

  function updateEp(epId,changes){
    const episodes=course.episodes.map(e=>e.id===epId?{...e,...changes}:e);
    onUpdate({...course,episodes});
  }
  function addEp(){
    if(!newEpTitle.trim())return;
    const ep={...BLANK_EPISODE,id:Date.now(),title:newEpTitle.trim()};
    onUpdate({...course,episodes:[...course.episodes,ep]});
    setNewEpTitle("");setShowAddEp(false);
  }
  function addNote(noteData){
    const note={...BLANK_NOTE,...noteData,id:Date.now(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    onUpdate({...course,notes:[...(course.notes||[]),note]});
  }
  function deleteNote(noteId){onUpdate({...course,notes:(course.notes||[]).filter(n=>n.id!==noteId)});}
  function aiSummarize(noteId,points,action){
    const notes=(course.notes||[]).map(n=>n.id===noteId?{...n,aiSummary:points,aiAction:action}:n);
    onUpdate({...course,notes});
  }
  function addAssignment(){
    if(!newAssign.trim())return;
    const a={id:Date.now(),title:newAssign.trim(),status:"todo",due:"",type:newAssignType,
      ...(newAssignType==="sketch"?{targetCount:newAssignTarget,submissions:[]}:{}),
      ...(newAssignType==="copy_study"?{refImage:null,submissions:[]}:{})
    };
    onUpdate({...course,assignments:[...(course.assignments||[]),a]});
    setNewAssign("");setNewAssignType("normal");setNewAssignTarget(10);
  }
  function submitPractice(assignId,submission){
    const assignments=(course.assignments||[]).map(a=>{
      if(a.id!==assignId)return a;
      const subs=[...(a.submissions||[]),submission];
      const done=a.type==="sketch"?subs.reduce((n,s)=>n+(s.count||1),0)>=( a.targetCount||10):subs.length>=1;
      return{...a,submissions:subs,status:done?"done":"todo"};
    });
    onUpdate({...course,assignments});
    setShowPracticeCheckIn(null);
  }
  function uploadRefImage(assignId,imgData){
    const assignments=(course.assignments||[]).map(a=>a.id===assignId?{...a,refImage:imgData}:a);
    onUpdate({...course,assignments});
  }
  function deleteAssignment(assignId){
    if(!confirm("删除这个练习？"))return;
    onUpdate({...course,assignments:(course.assignments||[]).filter(a=>a.id!==assignId)});
  }
  function pushAssignToBoard(a){
    onAddTaskToBoard({title:`[${course.title}] ${a.title}`,project:2,priority:"normal",due:a.due||""});
    const assignments=(course.assignments||[]).map(x=>x.id===a.id?{...x,pushed:true}:x);
    onUpdate({...course,assignments});
  }

  if(focusEp!==null){
    const ep=course.episodes[focusEp];
    return<FocusMode course={course} episode={ep}
      onComplete={(mins,poms)=>{
        updateEp(ep.id,{status:"done"});
        const log=[...(course.studyLog||[]),{date:todayStr(),minutes:mins}];
        const nextIdx=course.episodes.findIndex((e,i)=>i>focusEp&&e.status==="todo");
        if(nextIdx>-1)updateEp(course.episodes[nextIdx].id,{status:"doing"});
        onUpdate({...course,studyLog:log,lastStudied:todayStr()});
        if(onAddPomEntry&&poms>0)onAddPomEntry(poms,mins);
        setFocusEp(null);
      }}
      onSaveNote={(text,epId)=>addNote({title:`${ep?.title||""}笔记`,content:text,episodeId:epId,courseId:course.id})}
      onExit={()=>setFocusEp(null)}
      geminiKey={geminiKey}/>;
  }

  const STATUS_MAP={todo:{l:"未开始",c:"#bbb"},doing:{l:"进行中",c:"#854F0B"},done:{l:"✓",c:"#0F6E56"},review:{l:"★复习",c:"#185FA5"}};

  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:640,boxShadow:"0 12px 48px rgba(0,0,0,.2)",marginBottom:40}}>
      {/* header */}
      <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{course.title}</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,padding:"2px 8px",borderRadius:10,background:PLATFORMS.find(p=>p.id===course.platform)?.color+"22",color:PLATFORMS.find(p=>p.id===course.platform)?.color}}>{PLATFORMS.find(p=>p.id===course.platform)?.name}</span>
              {course.link&&<a href={course.link} target="_blank" style={{fontSize:12,color:"#185FA5"}}>打开课程↗</a>}
              {daysSinceStudy>14&&course.lastStudied&&<span style={{fontSize:11,color:"#854F0B",background:"#FAEEDA",padding:"2px 8px",borderRadius:10}}>⚠ {daysSinceStudy}天没学了</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setShowEdit(true)} style={{fontSize:12,color:"#666",background:"none",border:"0.5px solid #e0ddd6",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>编辑</button>
            <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
          </div>
        </div>
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:4}}>
            <span>进度 {donePct}%</span>
            <span>{course.episodes.filter(e=>e.status==="done").length}/{course.episodes.length} 集完成</span>
          </div>
          <div style={{height:6,background:"#f0ede8",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${donePct}%`,background:course.color||"#185FA5",borderRadius:3,transition:"width .3s"}}/>
          </div>
        </div>
        {nextEp&&<div style={{marginTop:10,display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#EBF3FB",borderRadius:8}}>
          <span style={{fontSize:12,color:"#185FA5",fontWeight:500}}>▶ 下一集：{nextEp.title||"第"+(course.episodes.indexOf(nextEp)+1)+"集"}</span>
          <button onClick={()=>setFocusEp(course.episodes.indexOf(nextEp))} style={{marginLeft:"auto",padding:"4px 14px",background:"#185FA5",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:500}}>开始学习</button>
        </div>}
      </div>

      {/* episodes */}
      <div style={{padding:"14px 20px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:500}}>章节列表</span>
          <button onClick={()=>setShowAddEp(v=>!v)} style={{fontSize:12,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>+ 添加</button>
        </div>
        {showAddEp&&<div style={{display:"flex",gap:6,marginBottom:10}}>
          <input value={newEpTitle} onChange={e=>setNewEpTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEp()} placeholder="集/章节名称" autoFocus style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
          <button onClick={addEp} style={{padding:"6px 12px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>添加</button>
        </div>}
        <div style={{maxHeight:240,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
          {course.episodes.length===0&&<div style={{fontSize:13,color:"#ccc",padding:"16px 0",textAlign:"center"}}>还没有章节，点上面「+添加」</div>}
          {course.episodes.map((ep,i)=>{
            const s=STATUS_MAP[ep.status]||STATUS_MAP.todo;
            const isCurrent=ep.status==="doing";
            return<div key={ep.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:6,background:isCurrent?"#EBF3FB":"transparent",border:isCurrent?"0.5px solid #B5D4F4":"0.5px solid transparent"}}>
              <select value={ep.status} onChange={e=>updateEp(ep.id,{status:e.target.value})} style={{fontSize:11,padding:"2px 4px",border:"0.5px solid #e0ddd6",borderRadius:4,color:s.c,background:"#fff",cursor:"pointer",flexShrink:0}}>
                <option value="todo">未开始</option>
                <option value="doing">进行中</option>
                <option value="done">✓ 完成</option>
                <option value="review">★ 复习</option>
              </select>
              {editingEp===ep.id?(
                <input autoFocus value={ep.title} onChange={e=>updateEp(ep.id,{title:e.target.value})}
                  onBlur={()=>setEditingEp(null)} onKeyDown={e=>e.key==="Enter"&&setEditingEp(null)}
                  style={{flex:1,fontSize:13,padding:"2px 4px",border:"0.5px solid #185FA5",borderRadius:4,outline:"none"}}/>
              ):(
                <span onClick={()=>{if(ep.taskId)setExpandedEp(expandedEp===ep.id?null:ep.id);else setEditingEp(ep.id);}}
                  style={{flex:1,fontSize:13,color:ep.status==="done"?"#aaa":"#1a1a1a",textDecoration:ep.status==="done"?"line-through":"none",cursor:ep.taskId?"pointer":"text",display:"flex",alignItems:"center",gap:4}}
                  title={ep.taskId?"点击展开步骤":"点击编辑"}>
                  {ep.taskId&&<span style={{fontSize:10,color:"#185FA5",flexShrink:0}}>{expandedEp===ep.id?"▼":"▶"}</span>}
                  <span style={{flex:1}}>{i+1}. {ep.title||"第"+(i+1)+"集"}</span>
                  {ep.taskId&&(()=>{const t=(tasks||[]).find(x=>x.id===ep.taskId);return t&&t.subtasks?.length?<span style={{fontSize:10,color:"#aaa",flexShrink:0}}>{t.subtaskDone?.filter(Boolean).length||0}/{t.subtasks.length}</span>:null;})()}
                </span>
              )}
              <button onClick={()=>setFocusEp(i)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"1px 5px",flexShrink:0}}>▶</button>
              {!ep.pushedToBoard&&ep.status!=="done"&&<button onClick={()=>{onAddTaskToBoard({title:`[${course.title}] ${ep.title||"第"+(i+1)+"集"}`,project:2,priority:"normal",due:"",estimate:ep.duration||"",notes:`章节学习\n课程：${course.title}`});const eps=course.episodes.map((e,j)=>j===i?{...e,pushedToBoard:true}:e);onUpdate({...course,episodes:eps});}} style={{fontSize:10,color:"#0F6E56",background:"none",border:"0.5px solid #0F6E56",borderRadius:4,padding:"1px 6px",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>→板</button>}
              {ep.pushedToBoard&&ep.status!=="done"&&<span style={{fontSize:10,color:"#bbb",flexShrink:0}}>✓板</span>}
              <button onClick={()=>{const eps=course.episodes.filter((_,j)=>j!==i);onUpdate({...course,episodes:eps});}} style={{fontSize:12,color:"#ddd",background:"none",border:"none",cursor:"pointer",padding:"1px 4px",flexShrink:0}} title="删除">✕</button>
            </div>
            {expandedEp===ep.id&&ep.taskId&&(()=>{
              const t=(tasks||[]).find(x=>x.id===ep.taskId);
              if(!t)return null;
              return(
                <div style={{padding:"8px 12px 10px",background:"#F5F8FF",borderTop:"0.5px solid #e0e8f0"}}>
                  <div style={{fontSize:11,color:"#185FA5",fontWeight:600,marginBottom:6}}>📋 子步骤</div>
                  {(t.subtasks||[]).map((s,si)=>(
                    <div key={si} onClick={()=>onToggleSub&&onToggleSub(t.id,si)}

// 季度信息：当前是第几季、剩几周
function quarterInfo(){
  const now=new Date();
  const qStartMonth=Math.floor(now.getMonth()/3)*3;
  const start=new Date(now.getFullYear(),qStartMonth,1);
  const end=new Date(now.getFullYear(),qStartMonth+3,0);
  const msW=7*24*3600*1000;
  const today0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const totalWeeks=Math.round((end-start)/msW)||13;
  const weeksLeft=Math.max(0,Math.ceil((end-today0)/msW));
  const weekNo=Math.min(totalWeeks,Math.max(1,Math.floor((today0-start)/msW)+1));
  return{q:Math.floor(qStartMonth/3)+1,year:now.getFullYear(),start,end,totalWeeks,weeksLeft,weekNo};
}
function courseAvgMin(c){
  if(c.avgMinOverride>0)return c.avgMinOverride;
  const ds=(c.episodes||[]).map(e=>parseInt(e.duration)).filter(n=>n>0);
  return ds.length?Math.round(ds.reduce((a,b)=>a+b,0)/ds.length):30;
}

// 季度课表：每周节奏 + 容量是否装得下（6-7门并行也能管）
function QuarterPlanner({courses,onUpdate,onClose,onAddTaskToBoard,onOpenCourse}){
  const qi=quarterInfo();
  const [budget,setBudget]=useState(()=>lsGet("zj_week_study_budget",10));
  const [editAvg,setEditAvg]=useState(null);
  const [tab,setTab]=useState("capacity");
  const setBud=v=>{const n=Math.max(1,v);setBudget(n);lsSet("zj_week_study_budget",n);};
  const list=courses.filter(c=>!c.archived);
  const setWeekly=(c,v)=>onUpdate({...c,weeklyTarget:Math.max(0,v)});

  let totalWeeklyMin=0;
  const rows=list.map(c=>{
    const eps=c.episodes||[];
    const doneN=eps.filter(e=>e.status==="done").length;
    const totalN=Math.max(c.totalEpisodes||0,eps.length);
    const remaining=Math.max(0,totalN-doneN);
    const wt=c.weeklyTarget||0;
    const avg=courseAvgMin(c);
    const weeklyMin=wt*avg;
    if(wt>0)totalWeeklyMin+=weeklyMin;
    const weeksToFinish=wt>0?Math.ceil(remaining/wt):null;
    const finishable=weeksToFinish!==null&&weeksToFinish<=qi.weeksLeft;
    return{c,doneN,totalN,remaining,wt,avg,weeklyMin,weeksToFinish,finishable};
  });
  const realWeekly=realisticEstimate(totalWeeklyMin);
  const budgetMin=budget*60;
  const over=realWeekly>budgetMin;
  const plannedCount=rows.filter(r=>r.wt>0).length;

  return<div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <div>
        <div style={{fontSize:16,fontWeight:600}}>📅 季度课表 · {qi.year} Q{qi.q}</div>
        <div style={{fontSize:12,color:"#aaa",marginTop:2}}>第 {qi.weekNo}/{qi.totalWeeks} 周 · 本季还剩 {qi.weeksLeft} 周 · {list.length} 门课</div>
      </div>
      <button onClick={onClose} style={{fontSize:13,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>← 返回课程</button>
    </div>

    {/* 视图切换：节奏容量 / 周课表 / 月历 */}
    <div style={{display:"flex",gap:0,background:"#f0eee9",borderRadius:9,padding:3,marginBottom:16,width:"fit-content"}}>
      {[["capacity","📊 节奏容量"],["timetable","🗓 周课表"],["month","📅 月历"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontWeight:tab===k?600:400,background:tab===k?"#fff":"transparent",color:tab===k?"#1a1a1a":"#888",boxShadow:tab===k?"0 1px 3px rgba(0,0,0,.08)":"none"}}>{l}</button>
      ))}
    </div>

    {tab==="timetable"?<WeekTimetable courses={list} onUpdate={onUpdate} onOpenCourse={onOpenCourse} onAddTaskToBoard={onAddTaskToBoard}/>:
     tab==="month"?<MonthTimetable courses={list} onOpenCourse={onOpenCourse}/>:<>
    {/* 容量表：这季每周排了多少、装不装得下 */}
    <div style={{background:over?"#FCEBEB":"#EAF6EF",border:`1.5px solid ${over?"#e8b4b4":"#bfe3cd"}`,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,color:"#1a1a1a"}}>
          {plannedCount} 门已排节奏，每周共 <b>{fmtDur(totalWeeklyMin)||"0分钟"}</b>
          <span style={{color:"#854F0B"}}>（按你习惯约 {fmtDur(realWeekly)||"0分钟"}）</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:"#888"}}>每周可学</span>
          <button onClick={()=>setBud(budget-1)} style={{width:24,height:24,borderRadius:6,border:"0.5px solid #ccc",background:"#fff",cursor:"pointer"}}>−</button>
          <span style={{fontSize:14,fontWeight:600,minWidth:34,textAlign:"center"}}>{budget}h</span>
          <button onClick={()=>setBud(budget+1)} style={{width:24,height:24,borderRadius:6,border:"0.5px solid #ccc",background:"#fff",cursor:"pointer"}}>+</button>
        </div>
      </div>
      <div style={{fontSize:12.5,color:over?"#A32D2D":"#0F6E56",marginTop:8,fontWeight:500,lineHeight:1.5}}>
        {over?`⚠ 排太满了：约 ${fmtDur(realWeekly)} 超过你每周 ${budget} 小时的真实容量。砍掉一两门的节奏，或先把几门转候补——同时学不完会全卡住。`:plannedCount===0?"还没给任何课排节奏。给下面的课点 + 设个每周集数，下方会算出本季能不能学完。":`✓ 装得下：约 ${fmtDur(realWeekly)} 在你每周 ${budget} 小时之内。`}
      </div>
    </div>

    {/* 每门课的节奏 + 本季能否学完 */}
    {list.length===0&&<div style={{background:"#fff",border:"0.5px dashed #e0ddd6",borderRadius:12,padding:"28px",textAlign:"center",color:"#aaa",fontSize:14}}>还没有课程，先去课程页添加</div>}
    {rows.map(({c,doneN,totalN,remaining,wt,avg,weeksToFinish,finishable})=>{
      const pct=totalN?Math.round(doneN/totalN*100):0;
      return<div key={c.id} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"14px 16px",marginBottom:10,opacity:c.active?1:.7}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{width:10,height:10,borderRadius:"50%",background:c.color,flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:500,flex:1}}>{c.title||"未命名课程"}</span>
          {!c.active&&<span style={{fontSize:11,color:"#aaa",background:"#f0f0f0",padding:"1px 6px",borderRadius:4}}>候补</span>}
          <span style={{fontSize:12,color:"#aaa"}}>{doneN}/{totalN} 集</span>
        </div>
        <div style={{height:5,background:"#f0eee9",borderRadius:3,overflow:"hidden",marginBottom:10}}>
          <div style={{height:"100%",width:pct+"%",background:c.color,borderRadius:3}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"#888"}}>每周</span>
            <button onClick={()=>setWeekly(c,wt-1)} style={{width:26,height:26,borderRadius:6,border:"0.5px solid #ccc",background:"#fff",cursor:"pointer",fontSize:15}}>−</button>
            <span style={{fontSize:14,fontWeight:600,minWidth:42,textAlign:"center"}}>{wt} 集</span>
            <button onClick={()=>setWeekly(c,wt+1)} style={{width:26,height:26,borderRadius:6,border:"0.5px solid #ccc",background:"#fff",cursor:"pointer",fontSize:15}}>+</button>
            <span style={{display:"inline-flex",alignItems:"center",gap:5,marginLeft:2}}>
              {editAvg===c.id?(
                <span style={{display:"inline-flex",alignItems:"center",gap:3}}>
                  <input type="number" autoFocus defaultValue={avg}
                    onBlur={e=>{const n=parseInt(e.target.value);onUpdate({...c,avgMinOverride:n>0?n:0});setEditAvg(null);}}
                    onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                    style={{width:50,fontSize:11,padding:"2px 4px",border:"1px solid #185FA5",borderRadius:4,outline:"none"}}/>
                  <span style={{fontSize:11,color:"#bbb"}}>分/集</span>
                </span>
              ):(
                <span onClick={()=>setEditAvg(c.id)} title={'点这里手动调整每集估时'} style={{fontSize:11,color:c.avgMinOverride>0?"#185FA5":"#bbb",cursor:"pointer",borderBottom:"1px dashed "+(c.avgMinOverride>0?"#185FA5":"#ccc")}}>~{avg}分/集{c.avgMinOverride>0?" ✎":""}</span>
              )}
              {c.avgMinOverride>0&&editAvg!==c.id&&<button onClick={()=>onUpdate({...c,avgMinOverride:0})} title={'恢复按章节时长自动计算'} style={{fontSize:10,color:"#aaa",background:"none",border:"none",cursor:"pointer",padding:0}}>↺自动</button>}
            </span>
          </div>
          <button onClick={()=>onUpdate({...c,active:!c.active})} style={{fontSize:12,color:c.active?"#854F0B":"#185FA5",background:"none",border:"none",cursor:"pointer"}}>{c.active?"转候补":"设为在学"}</button>
        </div>
        <div style={{fontSize:12,marginTop:8,color:wt===0?"#bbb":finishable?"#0F6E56":"#A32D2D"}}>
          {remaining===0?"🎉 已全部学完":wt===0?"未排节奏（每周 0 集，不会推进）":finishable?`按此节奏 ${weeksToFinish} 周学完 · 本季能学完（剩 ${qi.weeksLeft} 周）`:`按此节奏要 ${weeksToFinish} 周 · 本季学不完（只剩 ${qi.weeksLeft} 周）——加快节奏或下季继续`}
          {wt>0&&remaining>0&&onAddTaskToBoard&&<button onClick={()=>onAddTaskToBoard({title:`${c.title}：学 ${wt} 集`,project:1,priority:"today",due:todayStr(),estimate:String(wt*avg)})} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",marginLeft:8}}>+ 推一周量到任务板</button>}
        </div>
      </div>;
    })}
    </>}
  </div>;
}

// 周课表：大学课表式网格，可手动加/删上课时段
const WEEK_DAYS=["周一","周二","周三","周四","周五","周六","周日"];
function parseHM(s){const m=/^(\d{1,2}):(\d{2})$/.exec(s||"");if(!m)return null;return (+m[1])*60+(+m[2]);}
function fmtHM(min){const h=Math.floor(min/60),m=min%60;return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}
function todayWeekIdx(){return (new Date().getDay()+6)%7;} // 周一=0 … 周日=6
function WeekTimetable({courses,onUpdate,onOpenCourse,onAddTaskToBoard}){
  const list=courses.filter(c=>!c.archived);
  const [form,setForm]=useState(()=>({courseId:list[0]?.id||0,day:0,start:"09:00",dur:90}));
  const [pushed,setPushed]=useState(false);
  const tIdx=todayWeekIdx();
  // 收集所有时段
  const allSlots=[];
  list.forEach(c=>(c.slots||[]).forEach(s=>{const st=parseHM(s.start);if(st!=null)allSlots.push({...s,courseId:c.id,color:c.color,title:c.title,st,en:st+(s.dur||60)});}));
  const todaySlots=allSlots.filter(s=>s.day===tIdx).sort((a,b)=>a.st-b.st);
  // 可见时间范围（按已有时段动态收缩，默认 8:00–22:00）
  let minH=8,maxH=22;
  if(allSlots.length){
    minH=Math.min(8,Math.floor(Math.min(...allSlots.map(s=>s.st))/60));
    maxH=Math.max(22,Math.ceil(Math.max(...allSlots.map(s=>s.en))/60));
  }
  const PXH=46;
  const totalH=maxH-minH;
  function addSlot(){
    const c=list.find(x=>x.id===form.courseId);if(!c)return;
    if(parseHM(form.start)==null)return;
    const slot={id:Date.now(),day:+form.day,start:form.start,dur:Math.max(15,+form.dur||60)};
    onUpdate({...c,slots:[...(c.slots||[]),slot]});
  }
  function delSlot(courseId,slotId){
    const c=list.find(x=>x.id===courseId);if(!c)return;
    onUpdate({...c,slots:(c.slots||[]).filter(s=>s.id!==slotId)});
  }
  function pushTodayToBoard(){
    if(!onAddTaskToBoard||!todaySlots.length)return;
    todaySlots.forEach(s=>onAddTaskToBoard({
      title:s.title||"上课",project:2,priority:"today",due:todayStr(),
      estimate:String(s.dur||60),
      notes:`🗓 ${WEEK_DAYS[s.day]} ${fmtHM(s.st)}–${fmtHM(s.en)} 课表时段`,
      ...(s.courseId?{courseId:s.courseId}:{}),
    }));
    setPushed(true);
  }
  const hours=Array.from({length:totalH},(_,i)=>minH+i);
  return<div>
    <div style={{fontSize:12.5,color:"#888",marginBottom:12,lineHeight:1.5}}>把每门课固定排进一周里，像大学课表一样看到什么时候上什么。点课程块可跳到那门课。{list.length===0&&" 先去课程页加课程。"}</div>

    {/* 添加时段 */}
    {list.length>0&&<div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8,background:"#f7f6f3",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
      <select value={form.courseId} onChange={e=>setForm({...form,courseId:+e.target.value})} style={{padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,maxWidth:150}}>
        {list.map(c=><option key={c.id} value={c.id}>{c.title||"未命名"}</option>)}
      </select>
      <select value={form.day} onChange={e=>setForm({...form,day:+e.target.value})} style={{padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>
        {WEEK_DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
      </select>
      <input type="time" value={form.start} onChange={e=>setForm({...form,start:e.target.value})} style={{padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
      <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:12,color:"#888"}}>时长
        <input type="number" value={form.dur} onChange={e=>setForm({...form,dur:e.target.value})} style={{width:56,padding:"6px 6px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>分
      </span>
      <button onClick={addSlot} style={{padding:"6px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>+ 排进课表</button>
    </div>}

    {/* 一键把今天的课变成任务 */}
    {todaySlots.length>0&&onAddTaskToBoard&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,background:"#EAF2FB",border:"0.5px solid #cfe0f3",borderRadius:9,padding:"9px 12px",marginBottom:14}}>
      <span style={{fontSize:12.5,color:"#185FA5"}}>今天（{WEEK_DAYS[tIdx]}）排了 {todaySlots.length} 节课</span>
      {pushed?<span style={{fontSize:12,color:"#0F6E56"}}>✓ 已加进任务板</span>
        :<button onClick={pushTodayToBoard} style={{padding:"5px 12px",background:"#185FA5",color:"#fff",border:"none",borderRadius:7,fontSize:12.5,cursor:"pointer"}}>▶ 把今天的课排进任务板</button>}
    </div>}

    {/* 网格 */}
    <div style={{overflowX:"auto",border:"0.5px solid #e0ddd6",borderRadius:10,background:"#fff"}}>
      <div style={{minWidth:560}}>
        <div style={{display:"grid",gridTemplateColumns:"44px repeat(7,1fr)",borderBottom:"0.5px solid #eee"}}>
          <div/>
          {WEEK_DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:12,fontWeight:i===tIdx?700:600,color:i===tIdx?"#185FA5":"#666",padding:"8px 0",borderLeft:"0.5px solid #f2f0eb",background:i===tIdx?"#F4F9FE":"transparent"}}>{d}{i===tIdx?" ·今":""}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"44px repeat(7,1fr)"}}>
          <div style={{position:"relative",height:totalH*PXH}}>
            {hours.map(h=><div key={h} style={{position:"absolute",top:(h-minH)*PXH-6,right:6,fontSize:10,color:"#bbb"}}>{h}:00</div>)}
          </div>
          {WEEK_DAYS.map((_,di)=>(
            <div key={di} style={{position:"relative",height:totalH*PXH,borderLeft:"0.5px solid #f2f0eb",background:di===tIdx?"rgba(24,95,165,.03)":"transparent"}}>
              {hours.map((h,hi)=>hi>0&&<div key={h} style={{position:"absolute",top:hi*PXH,left:0,right:0,borderTop:"0.5px solid #f5f3ee"}}/>)}
              {allSlots.filter(s=>s.day===di).map(s=>{
                const top=(s.st-minH*60)/60*PXH;
                const height=Math.max(20,(s.dur||60)/60*PXH-2);
                return<div key={s.id} onClick={()=>onOpenCourse&&onOpenCourse(s.courseId)} title={'点击打开这门课'} style={{position:"absolute",top,left:2,right:2,height,background:s.color,borderRadius:6,padding:"3px 5px",color:"#fff",fontSize:10.5,overflow:"hidden",boxShadow:"0 1px 2px rgba(0,0,0,.12)",cursor:onOpenCourse?"pointer":"default"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:2}}>
                    <span style={{fontWeight:600,lineHeight:1.2,flex:1,overflow:"hidden",textOverflow:"ellipsis"}}>{s.title||"课程"}</span>
                    <button onClick={e=>{e.stopPropagation();delSlot(s.courseId,s.id);}} style={{background:"rgba(255,255,255,.25)",border:"none",color:"#fff",borderRadius:3,cursor:"pointer",fontSize:10,lineHeight:1,padding:"1px 3px",flexShrink:0}}>✕</button>
                  </div>
                  {height>32&&<div style={{opacity:.85,fontSize:9.5,marginTop:1}}>{fmtHM(s.st)}–{fmtHM(s.en)}</div>}
                </div>;
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
    {allSlots.length===0&&list.length>0&&<div style={{fontSize:12,color:"#bbb",textAlign:"center",marginTop:12}}>还没排课。上面选课程、星期、时间，点「排进课表」试试。</div>}
  </div>;
}

// 月历课表：一个月一眼看到每天排了哪些课（按周几循环）
function MonthTimetable({courses,onOpenCourse}){
  const list=courses.filter(c=>!c.archived);
  const [off,setOff]=useState(0);
  const base=new Date();
  const view=new Date(base.getFullYear(),base.getMonth()+off,1);
  const y=view.getFullYear(),mo=view.getMonth();
  const daysIn=new Date(y,mo+1,0).getDate();
  const firstWd=(new Date(y,mo,1).getDay()+6)%7; // 周一=0
  const today=new Date();const isThisMonth=today.getFullYear()===y&&today.getMonth()===mo;
  // 按周几归类时段
  const byDay={};
  list.forEach(c=>(c.slots||[]).forEach(s=>{const st=parseHM(s.start);if(st==null)return;(byDay[s.day]=byDay[s.day]||[]).push({courseId:c.id,color:c.color,title:c.title,st,start:s.start,dur:s.dur});}));
  Object.keys(byDay).forEach(k=>byDay[k].sort((a,b)=>a.st-b.st));
  const cells=[];
  for(let i=0;i<firstWd;i++)cells.push(null);
  for(let d=1;d<=daysIn;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const MN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  return<div>
    {/* 月份导航 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(135deg,#A8DAFF33,#D4B8FF33)",borderRadius:12,padding:"12px 16px",marginBottom:12}}>
      <button onClick={()=>setOff(off-1)} style={{width:30,height:30,borderRadius:8,border:"none",background:"#fff",cursor:"pointer",fontSize:15,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>‹</button>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{y} 年 {MN[mo]}</div>
        {off!==0&&<button onClick={()=>setOff(0)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",marginTop:2}}>回到本月</button>}
      </div>
      <button onClick={()=>setOff(off+1)} style={{width:30,height:30,borderRadius:8,border:"none",background:"#fff",cursor:"pointer",fontSize:15,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>›</button>
    </div>
    {list.length===0&&<div style={{background:"#fff",border:"0.5px dashed #e0ddd6",borderRadius:12,padding:"28px",textAlign:"center",color:"#aaa",fontSize:14}}>还没有课程，先去课程页添加，再到「周课表」排时段</div>}
    {list.length>0&&<div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,overflow:"hidden"}}>
      {/* 周几表头 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"0.5px solid #f0ede8"}}>
        {WEEK_DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:600,color:i>=5?"#bba":"#888",padding:"8px 0"}}>{d.replace("周","")}</div>)}
      </div>
      {/* 日期网格 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {cells.map((d,i)=>{
          if(d===null)return<div key={i} style={{minHeight:78,borderRight:(i%7!==6)?"0.5px solid #f5f3ee":"none",borderBottom:"0.5px solid #f5f3ee",background:"#fbfaf8"}}/>;
          const wd=(new Date(y,mo,d).getDay()+6)%7;
          const slots=byDay[wd]||[];
          const isToday=isThisMonth&&today.getDate()===d;
          const show=slots.slice(0,3);const extra=slots.length-show.length;
          return<div key={i} style={{minHeight:78,padding:"4px 5px",borderRight:(i%7!==6)?"0.5px solid #f5f3ee":"none",borderBottom:"0.5px solid #f5f3ee",background:wd>=5?"#fcfbf9":"#fff"}}>
            <div style={{textAlign:"right",marginBottom:3}}>
              <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,borderRadius:"50%",fontSize:11,fontWeight:isToday?700:500,color:isToday?"#fff":"#888",background:isToday?"#185FA5":"transparent",padding:isToday?"0 5px":0}}>{d}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              {show.map((s,j)=><div key={j} onClick={()=>onOpenCourse&&onOpenCourse(s.courseId)} title={`${s.title||"课程"} ${s.start}`} style={{display:"flex",alignItems:"center",gap:3,fontSize:9.5,color:"#444",background:s.color+"22",borderLeft:`2px solid ${s.color}`,borderRadius:3,padding:"1px 4px",cursor:onOpenCourse?"pointer":"default",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                <span style={{flexShrink:0,color:s.color,fontWeight:600}}>{s.start}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{s.title||"课程"}</span>
              </div>)}
              {extra>0&&<div style={{fontSize:9,color:"#bbb",paddingLeft:2}}>+{extra}</div>}
            </div>
          </div>;
        })}
      </div>
    </div>}
    {list.length>0&&Object.keys(byDay).length===0&&<div style={{fontSize:12,color:"#bbb",textAlign:"center",marginTop:12}}>这些课还没排时段。去「周课表」给它们排上课时间，这里就会按周几铺满整月。</div>}
  </div>;
}
// ══════════════════════════════════════════
function LearningView({courses,onUpdate,onAdd,onArchive,onAddTaskToBoard,geminiKey,onAddPomEntry,tasks,onToggleSub,inbox=[],onSaveInbox}){
  const [detail,setDetail]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showInbox,setShowInbox]=useState(false);
  const [inboxText,setInboxText]=useState("");
  const [showStandby,setShowStandby]=useState(false);
  const [showPlanner,setShowPlanner]=useState(false);

  const active=courses.filter(c=>c.active&&!c.archived);
  const standby=courses.filter(c=>!c.active&&!c.archived);
  const current=active.slice(0,3);
  const overflow=active.slice(3);

  function saveInbox(items){if(onSaveInbox)onSaveInbox(items);}
  function addToInbox(){
    if(!inboxText.trim())return;
    saveInbox([...inbox,{id:Date.now(),text:inboxText.trim(),date:todayStr()}]);
    setInboxText("");
  }
  function promoteFromInbox(item){
    setShowAdd(true);
    saveInbox(inbox.filter(x=>x.id!==item.id));
  }

  if(detail){
    const course=courses.find(c=>c.id===detail);
    if(course)return<CourseDetail course={course} onClose={()=>setDetail(null)} onUpdate={onUpdate} onAddTaskToBoard={onAddTaskToBoard} geminiKey={geminiKey} onAddPomEntry={onAddPomEntry} tasks={tasks} onToggleSub={onToggleSub}/>;
  }
  if(showPlanner)return<QuarterPlanner courses={courses} onUpdate={onUpdate} onClose={()=>setShowPlanner(false)} onAddTaskToBoard={onAddTaskToBoard} onOpenCourse={id=>{setShowPlanner(false);setDetail(id);}}/>;

  return<div>
    <LearningHeatmap courses={courses}/>

    {/* current: max 3 */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div>
        <span style={{fontSize:14,fontWeight:500}}>当前学习</span>
        <span style={{fontSize:12,color:"#aaa",marginLeft:8}}>{current.length}/3</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <button onClick={()=>setShowPlanner(true)} style={{fontSize:13,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>📅 季度课表</button>
        <button onClick={()=>setShowAdd(true)} style={{fontSize:13,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>+ 添加课程</button>
      </div>
    </div>
    {current.length===0&&<div style={{background:"#fff",border:"0.5px dashed #e0ddd6",borderRadius:12,padding:"32px",textAlign:"center",marginBottom:16}}>
      <div style={{fontSize:32,marginBottom:8}}>📚</div>
      <div style={{fontSize:14,color:"#aaa",marginBottom:12}}>还没有正在学的课程</div>
      <button onClick={()=>setShowAdd(true)} style={{padding:"8px 20px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>添加第一门课</button>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,marginBottom:20}}>
      {current.map(c=><CourseCard key={c.id} course={c} onOpen={c=>setDetail(c.id)} onToggleActive={id=>onUpdate({...courses.find(x=>x.id===id),active:!courses.find(x=>x.id===id).active})} onArchive={onArchive}/>)}
    </div>
    {current.length>=3&&<div style={{fontSize:12,color:"#854F0B",background:"#FAEEDA",borderRadius:8,padding:"8px 14px",marginBottom:16}}>💡 建议同时学习不超过3门，先完成一门再开始新的</div>}

    {/* standby */}
    <div style={{marginBottom:20}}>
      <button onClick={()=>setShowStandby(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#888",background:"none",border:"none",cursor:"pointer",marginBottom:8}}>
        {showStandby?"▼":"▶"} 候补课程 ({standby.length + overflow.length})
        <span style={{fontSize:11,color:"#bbb"}}>— 点击展开，完成一门再开始</span>
      </button>
      {showStandby&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
        {[...overflow,...standby].map(c=><div key={c.id} onClick={()=>setDetail(c.id)} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:8,height:8,borderRadius:2,background:c.color||"#ccc",flexShrink:0}}/>
          <span style={{fontSize:13,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title}</span>
          <span style={{fontSize:11,color:"#aaa"}}>{PLATFORMS.find(p=>p.id===c.platform)?.name}</span>
        </div>)}
      </div>}
    </div>

    {/* inbox */}
    <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,fontWeight:500}}>📥 想学的 Inbox <span style={{fontSize:11,color:"#aaa",fontWeight:400}}>— 随手记，不用管理</span></span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:inbox.length?10:0}}>
        <input value={inboxText} onChange={e=>setInboxText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addToInbox()} placeholder="突然想学什么？先记在这里…" style={{flex:1,padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
        <button onClick={addToInbox} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>记下</button>
      </div>
      {inbox.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"0.5px solid #f0ede8"}}>
        <span style={{flex:1,fontSize:13,color:"#555"}}>{item.text}</span>
        <span style={{fontSize:11,color:"#bbb"}}>{item.date}</span>
        <button onClick={()=>promoteFromInbox(item)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>→ 变成课程</button>
        <button onClick={()=>saveInbox(inbox.filter(x=>x.id!==item.id))} style={{fontSize:12,color:"#ddd",background:"none",border:"none",cursor:"pointer"}}>✕</button>
      </div>)}
    </div>

    {showAdd&&<AddCourseModal onSave={c=>{onAdd(c);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
  </div>;
}

// ═══════════════════════════════════════════
// FEATURE 1: TODAY LAUNCH RITUAL (ADHD CONTRACT MODE)
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §LAUNCH  启动仪式 LaunchRitual
// ══════════════════════════════════════════
function LaunchRitual({tasks,onDismiss,geminiKey,onAddTask}){
  const [step,setStep]=useState(0); // 0=greeting 1=pick-tasks 2=confirm
  const [weather,setWeather]=useState(null);
  const [greeting,setGreeting]=useState("");
  const [aiSuggestion,setAiSuggestion]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [selected,setSelected]=useState([]); // selected task ids
  const [newTaskInput,setNewTaskInput]=useState("");
  const [dumpOpen,setDumpOpen]=useState(false);
  const [dumpText,setDumpText]=useState("");
  const [dumpResult,setDumpResult]=useState(null);
  const [dumpLoading,setDumpLoading]=useState(false);
  const [addedTitles,setAddedTitles]=useState([]);
  const hour=new Date().getHours();

  useEffect(()=>{
    if(hour<6)setGreeting("深夜了");
    else if(hour<11)setGreeting("早上好");
    else if(hour<13)setGreeting("上午好");
    else if(hour<18)setGreeting("下午好");
    else if(hour<21)setGreeting("傍晚了");
    else setGreeting("晚上好");
    navigator.geolocation?.getCurrentPosition(pos=>{
      fetch("https://api.open-meteo.com/v1/forecast?latitude="+pos.coords.latitude+"&longitude="+pos.coords.longitude+"&current_weather=true")
        .then(r=>r.json()).then(d=>{
          const code=d?.current_weather?.weathercode;
          const temp=d?.current_weather?.temperature;
          const icons={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",51:"🌦",61:"🌧",71:"🌨",80:"🌦",95:"⛈"};
          setWeather((icons[code]||"🌡")+" "+Math.round(temp)+"°C");
        }).catch(()=>{});
    });
  },[]);

  // 脑倾倒加入的任务一出现在清单里，就自动勾选（最多3件）
  useEffect(()=>{
    if(!addedTitles.length)return;
    const ids=tasks.filter(t=>addedTitles.includes(t.title)&&!t.done).map(t=>t.id);
    if(ids.length){setSelected(s=>[...new Set([...s,...ids])].slice(0,3));setAddedTitles([]);}
  },[tasks,addedTitles]);

  const normalTasks=tasks.filter(t=>!t.done&&t.priority==="normal"&&!isOverdue(t.due));
  const allPickable=[...urgentTasks,...normalTasks].slice(0,8);

  function toggleSel(id){
    setSelected(s=>s.includes(id)?s.filter(x=>x!==id):(s.length<3?[...s,id]:s));
  }

  async function getAISuggestion(){
    if(!geminiKey||aiLoading)return;
    setAiLoading(true);
    const ctx=allPickable.map(t=>"- "+t.title+"（"+t.priority+(t.due?"，截止"+fmtDate(t.due):"")+(isPracticeTask(t)?"，练习类":"")+")").join("\n");
    try{
      const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+geminiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:"你是强势直接的ADHD效率教练。从下面任务里替用户做决定：给出今天该做的1-3件，并排出明确的先后顺序（练习/最抵触的事放第一个做，因为他一拖就会忘）。直接下命令，别问他。格式：每行一件，'1. 任务 — 一句理由'。总共不超过60字。\n\n任务:\n"+ctx}]}]})
      });
      const data=await res.json();
      setAiSuggestion(data.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||"");
    }catch(e){}
    setAiLoading(false);
  }

  // 脑倾倒：把"模糊的一团"理成 今天/这周/以后 三档结构化任务
  async function analyzeDump(){
    if(!dumpText.trim()||dumpLoading)return;
    if(!geminiKey){setDumpResult({error:"请先在AI助手里设置 Gemini API Key"});return;}
    setDumpLoading(true);
    try{
      const prompt="用户脑子里有一团模糊的事，下面是他倒出来的原文。请替他理清，并按时间紧迫度分成三档。只返回JSON，不要任何其他文字：\n"
        +'{"today":[{"title":"具体到能动手的一句话","priority":"urgent|today|normal","estimate":"预计分钟数字符串"}],"thisweek":[{"title":"..."}],"someday":["想法/以后再说的事字符串"]}\n'
        +"规则：today 只放今天真的必须做的，最多3件；估时往多了估，因为用户总低估；把模糊的愿望（如'想学X'）放进 someday。\n\n用户原文：\n"+dumpText;
      const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+geminiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const data=await res.json();
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      setDumpResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    }catch(e){setDumpResult({error:"理不清，再试一次"});}
    setDumpLoading(false);
  }
  // 把今天档加入清单（priority/estimate 一起带上），记下标题供快捷勾选
  function addDumpToday(){
    const items=dumpResult?.today||[];
    items.forEach(it=>{if(onAddTask)onAddTask({title:it.title,priority:it.priority||"today",due:todayStr(),project:1,estimate:it.estimate||""});});
    setAddedTitles(items.map(it=>it.title));
    setDumpResult(null);setDumpText("");setDumpOpen(false);
  }

  const selTasks=tasks.filter(t=>selected.includes(t.id));
  const totalEst=selTasks.reduce((a,t)=>a+(parseInt(t.estimate)||0),0);
  const dateStr=new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"long"});

  // Step 0: greeting + proceed
  if(step===0) return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,#0f0c29,#1a1744,#0f3460)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",maxWidth:380,width:"100%"}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginBottom:8,letterSpacing:".12em",textTransform:"uppercase"}}>{dateStr}</div>
        {weather&&<div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginBottom:20}}>{weather}</div>}
        <div style={{fontSize:36,fontWeight:700,color:"#fff",marginBottom:12,letterSpacing:"-.02em"}}>{greeting}</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,.45)",marginBottom:48,lineHeight:1.6}}>
          今天，你只需要做好<span style={{color:"rgba(255,200,100,.8)",fontWeight:600}}> 1–3 件事</span>。<br/>先花30秒，把它们定下来。
        </div>
        <button onClick={()=>{setStep(1);getAISuggestion();}} style={{width:"100%",padding:"15px",background:"#185FA5",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer",letterSpacing:".04em"}}>
          定下今天的任务 →
        </button>
        <button onClick={onDismiss} style={{marginTop:14,background:"none",border:"none",color:"rgba(255,255,255,.25)",fontSize:12,cursor:"pointer"}}>跳过（不推荐）</button>
      </div>
    </div>
  );

  // Step 1: pick tasks
  if(step===1) return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,#0f0c29,#1a1744,#0f3460)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"32px 16px",overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:460}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,.4)",marginBottom:6,letterSpacing:".08em"}}>{dateStr}</div>
        <div style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:6}}>今天做哪几件事？</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.45)",marginBottom:16}}>最多选3个。选完就是今天的合同，不能随意加。</div>

        {/* 脑倾倒：模糊→具体的入口，就在选之前 */}
        <div style={{marginBottom:16,border:"0.5px solid rgba(255,255,255,.12)",borderRadius:10,overflow:"hidden",background:"rgba(255,255,255,.04)"}}>
          {!dumpOpen&&!dumpResult&&(
            <button onClick={()=>setDumpOpen(true)} style={{width:"100%",padding:"11px 14px",background:"none",border:"none",color:"rgba(180,210,255,.85)",fontSize:13,cursor:"pointer",textAlign:"left"}}>
              🧠 脑子里很乱、只有模糊的感觉？先把它倒出来 →
            </button>
          )}
          {dumpOpen&&!dumpResult&&(
            <div style={{padding:"12px 14px"}}>
              <textarea value={dumpText} onChange={e=>setDumpText(e.target.value)} rows={5}
                placeholder={'想到什么写什么，不用整理。试着回答：\n· 有什么一直在脑子里转？\n· 这周有截止的是什么？\n· 昨天没做完的是什么？\n· 做成哪一件，今天就值了？'}
                style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"0.5px solid rgba(255,255,255,.15)",background:"rgba(0,0,0,.2)",color:"#fff",fontSize:13,lineHeight:1.7,outline:"none",resize:"none"}}/>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button onClick={()=>{setDumpOpen(false);setDumpText("");}} style={{padding:"8px 12px",background:"none",border:"0.5px solid rgba(255,255,255,.15)",borderRadius:8,color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer"}}>收起</button>
                <button onClick={analyzeDump} disabled={dumpLoading} style={{flex:1,padding:"8px",background:"rgba(24,95,165,.7)",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer",opacity:dumpLoading?.6:1}}>{dumpLoading?"理清中…":"🪄 帮我理清，分出今天该做的"}</button>
              </div>
            </div>
          )}
          {dumpResult&&!dumpResult.error&&(
            <div style={{padding:"12px 14px"}}>
              {dumpResult.today?.length>0&&<div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"rgba(255,200,100,.9)",fontWeight:600,marginBottom:5}}>🎯 今天该做（{dumpResult.today.length}）</div>
                {dumpResult.today.map((it,i)=><div key={i} style={{fontSize:13,color:"#fff",padding:"5px 8px",background:"rgba(255,200,80,.12)",borderRadius:6,marginBottom:3}}>{it.title}{it.estimate?<span style={{color:"rgba(255,255,255,.4)",marginLeft:6}}>~{it.estimate}分</span>:null}</div>)}
              </div>}
              {dumpResult.thisweek?.length>0&&<div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"rgba(180,210,255,.8)",fontWeight:600,marginBottom:5}}>📅 这周（先别急）</div>
                {dumpResult.thisweek.map((it,i)=><div key={i} style={{fontSize:12,color:"rgba(255,255,255,.6)",padding:"3px 8px"}}>· {typeof it==="string"?it:it.title}</div>)}
              </div>}
              {dumpResult.someday?.length>0&&<div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"rgba(180,255,210,.7)",fontWeight:600,marginBottom:5}}>💭 以后再说</div>
                {dumpResult.someday.map((it,i)=><div key={i} style={{fontSize:12,color:"rgba(255,255,255,.45)",padding:"3px 8px"}}>· {typeof it==="string"?it:it.title}</div>)}
              </div>}
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <button onClick={()=>{setDumpResult(null);setDumpOpen(true);}} style={{padding:"8px 12px",background:"none",border:"0.5px solid rgba(255,255,255,.15)",borderRadius:8,color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer"}}>重写</button>
                <button onClick={addDumpToday} disabled={!dumpResult.today?.length} style={{flex:1,padding:"8px",background:dumpResult.today?.length?"rgba(15,110,86,.8)":"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer"}}>把"今天该做"加进来，去勾选 ↓</button>
              </div>
            </div>
          )}
          {dumpResult?.error&&<div style={{padding:"12px 14px",fontSize:12,color:"rgba(255,150,150,.9)"}}>{dumpResult.error} <button onClick={()=>setDumpResult(null)} style={{color:"rgba(180,210,255,.8)",background:"none",border:"none",cursor:"pointer"}}>返回</button></div>}
        </div>

        {aiSuggestion&&(
          <div style={{background:"rgba(255,200,80,.12)",border:"0.5px solid rgba(255,200,80,.3)",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",gap:8,alignItems:"flex-start"}}>
            <span style={{fontSize:14,flexShrink:0}}>✨</span>
            <span style={{fontSize:12,color:"rgba(255,220,100,.85)",lineHeight:1.6}}>{aiSuggestion}</span>
          </div>
        )}
        {aiLoading&&!aiSuggestion&&(
          <div style={{background:"rgba(255,255,255,.05)",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,.3)",fontStyle:"italic"}} className="pulse">AI分析任务中…</span>
          </div>
        )}

        {urgentTasks.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"rgba(255,100,100,.7)",marginBottom:6,letterSpacing:".06em",textTransform:"uppercase"}}>🔴 紧急 / 今天</div>
            {urgentTasks.slice(0,5).map(t=>{
              const sel=selected.includes(t.id);
              return<div key={t.id} onClick={()=>toggleSel(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,marginBottom:4,cursor:"pointer",background:sel?"rgba(24,95,165,.4)":"rgba(255,255,255,.05)",border:sel?"0.5px solid rgba(100,160,255,.5)":"0.5px solid rgba(255,255,255,.08)",transition:"all .15s"}}>
                <div style={{width:18,height:18,borderRadius:"50%",border:sel?"none":"1.5px solid rgba(255,255,255,.3)",background:sel?"#185FA5":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:sel?"#fff":"rgba(255,255,255,.75)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                  {t.due&&<div style={{fontSize:11,color:isOverdue(t.due)?"rgba(255,100,100,.8)":"rgba(255,255,255,.35)",marginTop:1}}>📅 {fmtDate(t.due)}{t.estimate&&" · "+t.estimate+"分钟"}</div>}
                </div>
                {getProj(t.project)&&<span style={{fontSize:10,color:"rgba(255,255,255,.3)",flexShrink:0}}>{getProj(t.project).name}</span>}
              </div>;
            })}
          </div>
        )}

        {normalTasks.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginBottom:6,letterSpacing:".06em",textTransform:"uppercase"}}>其他待办</div>
            {normalTasks.slice(0,4).map(t=>{
              const sel=selected.includes(t.id);
              return<div key={t.id} onClick={()=>toggleSel(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,marginBottom:4,cursor:"pointer",background:sel?"rgba(24,95,165,.35)":"rgba(255,255,255,.04)",border:sel?"0.5px solid rgba(100,160,255,.4)":"0.5px solid rgba(255,255,255,.06)",transition:"all .15s"}}>
                <div style={{width:18,height:18,borderRadius:"50%",border:sel?"none":"1.5px solid rgba(255,255,255,.2)",background:sel?"#185FA5":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div style={{fontSize:13,color:sel?"#fff":"rgba(255,255,255,.5)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
              </div>;
            })}
          </div>
        )}

        {allPickable.length===0&&(
          <div style={{textAlign:"center",padding:"20px 0",color:"rgba(255,255,255,.35)",fontSize:14}}>
            任务列表是空的，先新建一个吧
          </div>
        )}

        {/* 快速新建任务 */}
        {onAddTask&&selected.length<3&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.25)",marginBottom:6,letterSpacing:".06em",textTransform:"uppercase"}}>+ 新建今日任务</div>
            <div style={{display:"flex",gap:8}}>
              <input value={newTaskInput} onChange={e=>setNewTaskInput(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==="Enter"&&newTaskInput.trim()&&onAddTask){
                    const t={title:newTaskInput.trim(),priority:"today",due:todayStr(),project:1,estimate:""};
                    onAddTask(t);
                    setNewTaskInput("");
                  }
                }}
                placeholder="写下任务名，回车添加"
                style={{flex:1,padding:"10px 12px",borderRadius:8,border:"0.5px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.07)",color:"#fff",fontSize:13,outline:"none"}}/>
              <button
                onClick={()=>{
                  if(newTaskInput.trim()&&onAddTask){
                    const t={title:newTaskInput.trim(),priority:"today",due:todayStr(),project:1,estimate:""};
                    onAddTask(t);
                    setNewTaskInput("");
                  }
                }}
                style={{padding:"10px 14px",borderRadius:8,border:"none",background:"rgba(24,95,165,.6)",color:"#fff",fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
                添加
              </button>
            </div>
          </div>
        )}

        <div style={{position:"sticky",bottom:0,paddingTop:12,paddingBottom:8,background:"linear-gradient(transparent,rgba(15,12,41,.95))"}}>
          {selected.length>0&&(
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:10,textAlign:"center"}}>
              已选 {selected.length}/3 件事{totalEst>0?" · 预计"+totalEst+"分钟":""}
            </div>
          )}
          <button
            onClick={()=>{if(selected.length>0)setStep(2);else onDismiss();}}
            style={{width:"100%",padding:"14px",background:selected.length>0?"#185FA5":"rgba(255,255,255,.1)",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:600,cursor:"pointer",letterSpacing:".03em",transition:"background .2s"}}
          >
            {selected.length>0?"确认，开始今天 →":"没有紧急任务，直接开始 →"}
          </button>
        </div>
      </div>
    </div>
  );

  // Step 2: confirm contract
  return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,#0f0c29,#1a1744,#0f3460)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginBottom:16,textAlign:"center",letterSpacing:".08em"}}>今日合同 · 按这个顺序做</div>
        <div style={{background:"rgba(255,255,255,.06)",border:"0.5px solid rgba(255,255,255,.12)",borderRadius:14,padding:"20px",marginBottom:16}}>
          {coachOrder(selTasks).map((t,i)=>(
            <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:i<selTasks.length-1?"0.5px solid rgba(255,255,255,.08)":"none"}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:i===0?"rgba(255,180,60,.85)":"rgba(24,95,165,.6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{i+1}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:"#fff",fontWeight:500,lineHeight:1.4}}>{t.title}
                  {i===0&&<span style={{fontSize:10,color:"#1a1a1a",background:"rgba(255,200,100,.95)",padding:"1px 6px",borderRadius:4,marginLeft:6,fontWeight:700}}>先做这个</span>}
                  {isPracticeTask(t)&&<span style={{fontSize:10,color:"rgba(255,200,100,.9)",marginLeft:6}}>练习·易拖</span>}
                </div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:3}}>
                  {getProj(t.project).name}
                  {t.due&&<span style={{marginLeft:8}}>📅 {fmtDate(t.due)}</span>}
                  {t.estimate&&<span style={{marginLeft:8}}>⏱ 约{fmtDur(realisticEstimate(parseInt(t.estimate)||0))}</span>}
                </div>
                {t.subtasks&&t.subtasks.length>0&&(
                  <div style={{marginTop:6,fontSize:11,color:"rgba(255,255,255,.4)"}}>
                    第一步：{t.subtasks[0]}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
        {/* 容量闸门：按现实时长算，装不下就逼着砍 */}
        {totalEst>0&&(()=>{
          const real=realisticEstimate(totalEst);
          const tooMuch=real>240||(selected.length>=3&&real>180);
          return<div style={{marginBottom:20}}>
            <div style={{fontSize:13,color:"rgba(255,200,100,.7)",textAlign:"center",marginBottom:tooMuch?8:0}}>
              你估了{fmtDur(totalEst)}，按你的习惯真实约 {fmtDur(real)}
            </div>
            {tooMuch&&<div style={{background:"rgba(255,120,120,.12)",border:"0.5px solid rgba(255,120,120,.3)",borderRadius:10,padding:"10px 14px"}}>
              <div style={{fontSize:12,color:"rgba(255,170,170,.95)",lineHeight:1.6,marginBottom:8}}>这几乎装不进一天。你一向低估，硬塞只会又一次没做完。砍掉最不重要的那件，今天反而能真的完成。</div>
              <button onClick={()=>{const cut=coachOrder(selTasks).slice(-1)[0];if(cut)setSelected(s=>s.filter(id=>id!==cut.id));}} style={{width:"100%",padding:"8px",background:"rgba(163,45,45,.5)",border:"none",borderRadius:8,color:"#fff",fontSize:13,cursor:"pointer"}}>砍掉最后一件（{coachOrder(selTasks).slice(-1)[0]?.title?.slice(0,12)}…）</button>
            </div>}
          </div>;
        })()}
        <button onClick={onDismiss} style={{width:"100%",padding:"15px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer",letterSpacing:".04em"}}>
          ✓ 签下合同，开始专注
        </button>
        <button onClick={()=>setStep(1)} style={{marginTop:10,width:"100%",background:"none",border:"0.5px solid rgba(255,255,255,.15)",borderRadius:10,padding:"10px",color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer"}}>← 重新选择</button>
      </div>
    </div>
  );
}
