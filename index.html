// FEATURE 8: POMODORO HISTORY
// ═══════════════════════════════════════════
function PomodoroStats({log}){
  // log: [{date, count, minutes}]
  const today=todayStr();
  const todayLog=log.find(l=>l.date===today)||{count:0,minutes:0};
  const weekTotal=log.filter(l=>daysBetween(l.date,today)<=7).reduce((s,l)=>s+(l.count||0),0);

  return(
    <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>🍅 番茄统计</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[["今日番茄",todayLog.count+"个"],["今日专注",Math.round((todayLog.minutes||0))+"分钟"],["本周番茄",weekTotal+"个"]].map(([l,v])=>(
          <div key={l} style={{textAlign:"center",padding:"8px 4px",background:"#f7f6f3",borderRadius:6}}>
            <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>{v}</div>
            <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showLaunch,setShowLaunch]=useState(()=>{
    const k="launch_"+todayStr();
    if(lsGet(k))return false;
    lsSet(k,true);return true;
  });
  const [habits,setHabits]=useState([]);
  const [pomLog,setPomLog]=useState([]);
  const [tasks,setTasks]=useState(SAMPLE_TASKS);
  const [journal,setJournal]=useState({});
  const [futureLog,setFutureLog]=useState({});
  const [courses,setCourses]=useState([]);
  const [nextId,setNextId]=useState(10);
  const [view,setView]=useState("today");
  const [aiOpen,setAiOpen]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [nTask,setNTask]=useState({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});
  const [quick,setQuick]=useState("");
  const [detail,setDetail]=useState(null);
  const [projView,setProjView]=useState(null);
  const [showMigration,setShowMigration]=useState(false);
  const [showBrainDump,setShowBrainDump]=useState(false);
  const [showReview,setShowReview]=useState(false);
  const [showMonthlyReview,setShowMonthlyReview]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [ghToken,setGhToken]=useState(()=>lsGet("zj_gh_token",""));
  const [gistId,setGistId]=useState(()=>lsGet("zj_gist_id",""));
  const [geminiKey,setGeminiKey]=useState(()=>lsGet("zj_gemini_key",""));
  // NEW: Block system state
  const [showBlockBreaker,setShowBlockBreaker]=useState(false);
  const [checkInTask,setCheckInTask]=useState(null);
  const aiRef=useRef(null);
  const saveTimer=useRef(null);
  const isFirstLoad=useRef(true);
  // Always-current refs for async save
  const tasksRef=useRef(tasks);
  const journalRef=useRef(journal);
  const futureLogRef=useRef(futureLog);
  const coursesRef=useRef(courses);
  const nextIdRef=useRef(nextId);
  const ghTokenRef=useRef(lsGet("zj_gh_token",""));
  const gistIdRef=useRef(lsGet("zj_gist_id",""));
  const habitsRef=useRef([]);
  const pomLogRef=useRef([]);

  // Keep refs in sync with state
  useEffect(()=>{tasksRef.current=tasks;},[tasks]);
  useEffect(()=>{journalRef.current=journal;},[journal]);
  useEffect(()=>{futureLogRef.current=futureLog;},[futureLog]);
  useEffect(()=>{coursesRef.current=courses;},[courses]);
  useEffect(()=>{nextIdRef.current=nextId;},[nextId]);
  useEffect(()=>{ghTokenRef.current=ghToken;},[ghToken]);
  useEffect(()=>{gistIdRef.current=gistId;},[gistId]);
  useEffect(()=>{habitsRef.current=habits;},[habits]);
  useEffect(()=>{pomLogRef.current=pomLog;},[pomLog]);

  // load from gist on mount
  function loadFromGist(){
    const tok=ghTokenRef.current||ghToken;
    const gid=gistIdRef.current||gistId;
    if(!tok||!gid)return;
    setSyncStatus("saving");
    gistLoad(tok,gid).then(data=>{
      isFirstLoad.current=false; // Mark load done FIRST before setting state
      if(data){
        if(data.tasks&&data.tasks.length>0)setTasks(data.tasks.map(t=>({...BLANK_TASK,...t})));
        if(data.journal&&Object.keys(data.journal).length>0)setJournal(data.journal);
        if(data.futureLog)setFutureLog(data.futureLog);
        if(data.courses&&data.courses.length>0)setCourses(data.courses.map(c=>({...BLANK_COURSE,...c})));
        if(data.nextId)setNextId(data.nextId);
        setSyncStatus("saved");
      } else {
        setSyncStatus("idle");
      }
    }).catch(e=>{
      console.error("Gist load failed:",e);
      setSyncStatus("error");
      isFirstLoad.current=false;
    });
  }
  useEffect(()=>{
    // Always mark load complete after a short delay
    // so saves work even if no token configured
    const tok=ghTokenRef.current||ghToken;
    const gid=gistIdRef.current||gistId;
    if(tok&&gid){
      loadFromGist();
    } else {
      isFirstLoad.current=false;
    }
    // Safety: ensure isFirstLoad cleared after 5s no matter what
    injectPWA();
    const safety=setTimeout(()=>{isFirstLoad.current=false;},5000);
    return()=>clearTimeout(safety);
  },[]);

  // auto-save to gist (debounced)
  function triggerSave(t,j,fl,nid,cs){
    const tok=ghTokenRef.current;
    const gid=gistIdRef.current;
    if(!tok||!gid){return;}
    // Don't save during initial load
    if(isFirstLoad.current)return;
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    // Capture current refs at call time, use passed values if provided
    const tasksToSave=t!==undefined?t:tasksRef.current;
    const journalToSave=j!==undefined?j:journalRef.current;
    const flToSave=fl!==undefined?fl:futureLogRef.current;
    const nidToSave=nid!==undefined?nid:nextIdRef.current;
    const coursesToSave=cs!==undefined?cs:coursesRef.current;
    saveTimer.current=setTimeout(()=>{
      gistSave(tok,gid,{
        tasks:tasksToSave,
        journal:journalToSave,
        futureLog:flToSave,
        courses:coursesToSave,
        habits:habitsRef.current,
        pomLog:pomLogRef.current,
        nextId:nidToSave
      })
        .then(()=>setSyncStatus("saved"))
        .catch(e=>{setSyncStatus("error");console.error("Gist save failed:",e);});
    },1200);
  }

  function setTasksAndSync(fn){setTasks(prev=>{const next=typeof fn==="function"?fn(prev):fn;triggerSave(next,undefined,undefined,undefined,undefined);return next;});}
  function setJournalAndSync(j){setJournal(j);triggerSave(undefined,j,undefined,undefined,undefined);}
  function setFutureLogAndSync(fl){setFutureLog(fl);triggerSave(undefined,undefined,fl,undefined,undefined);}
  function updateCourseNote(courseId,noteId,changes){
    setCourses(cs=>{
      const next=cs.map(c=>{
        if(c.id!==courseId)return c;
        const notes=(c.notes||[]).map(n=>n.id===noteId?{...n,...changes}:n);
        return{...c,notes};
      });
      triggerSave(undefined,undefined,undefined,undefined,next);
      return next;
    });
  }
  function updateCourse(updated){
    setCourses(cs=>{const next=cs.map(c=>c.id===updated.id?updated:c);triggerSave(undefined,undefined,undefined,undefined,next);return next;});
  }
  function addCourse(c){
    setCourses(cs=>{const next=[...cs,c];triggerSave(tasks,journal,futureLog,nextId,next);return next;});
  }
  function archiveCourse(id){
    setCourses(cs=>{const next=cs.map(c=>c.id===id?{...c,archived:true,active:false}:c);triggerSave(tasks,journal,futureLog,nextId,next);return next;});
  }

  function toggleTask(id){setTasksAndSync(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));}
  function toggleSub(tid,i){setTasksAndSync(ts=>ts.map(t=>{if(t.id!==tid)return t;const sd=[...t.subtaskDone];sd[i]=!sd[i];return{...t,subtaskDone:sd};}));}
  function toggleExpand(id){setTasksAndSync(ts=>ts.map(t=>t.id===id?{...t,expanded:!t.expanded}:t));}
  function saveDetail(u){setTasksAndSync(ts=>ts.map(t=>t.id===u.id?u:t));setDetail(null);}
  function delTask(id){setTasksAndSync(ts=>ts.filter(t=>t.id!==id));setDetail(null);}
  function addSubsFromAI(tid,steps){setTasksAndSync(ts=>ts.map(t=>t.id===tid?{...t,subtasks:steps,subtaskDone:steps.map(()=>false),expanded:true}:t));}
  function aiBreak(id){const t=tasks.find(t=>t.id===id);if(!t)return;setAiOpen(true);setTimeout(()=>{if(aiRef.current)aiRef.current(t);},150);}

  function updateHabits(newHabits){
    setHabits(newHabits);
    habitsRef.current=newHabits;
    triggerSave();
  }
  function addPomEntry(count,minutes){
    const today=todayStr();
    setPomLog(log=>{
      const exists=log.find(l=>l.date===today);
      const next=exists
        ?log.map(l=>l.date===today?{...l,count:(l.count||0)+count,minutes:(l.minutes||0)+minutes}:l)
        :[...log,{date:today,count,minutes}];
      pomLogRef.current=next;
      triggerSave();
      return next;
    });
  }
  function addTask(partial){
    const newNid=nextIdRef.current+1;
    const t={...BLANK_TASK,...partial,id:nextIdRef.current};
    setNextId(newNid);
    nextIdRef.current=newNid;
    setTasksAndSync(ts=>{const next=[...ts,t];triggerSave(next,undefined,undefined,newNid,undefined);return next;});
  }
  function addQuick(){if(!quick.trim())return;addTask({title:quick.trim(),project:1,due:"",priority:"normal"});setQuick("");}
  function addModal(){if(!nTask.title.trim())return;addTask(nTask);setShowAdd(false);setNTask({title:"",project:1,due:todayStr(),startDate:"",priority:"today"});}
  function addBrainTasks(titles){titles.forEach(title=>addTask({title,project:1,due:"",priority:"normal"}));}
  function addFutureToTasks(text,mk){
    const [y,m]=mk.split("-").map(Number);
    const due=yyyymmdd(new Date(y,m,1));
    addTask({title:text,project:1,due,priority:"normal"});
  }
  // NEW: save check-in data on a task
  function saveCheckIn(taskId,checkInData){
    setTasksAndSync(ts=>ts.map(t=>t.id===taskId?{...t,...checkInData}:t));
    setCheckInTask(null);
  }

  function handleMigrate(decisions){
    setTasksAndSync(ts=>ts.map(t=>{
      const d=decisions[t.id];if(!d)return t;
      if(d==="drop")return null;
      const mc=(t.migrateCount||0)+1;
      if(d==="tomorrow")return{...t,due:daysFromNow(1),migrateCount:mc};
      if(d==="nextweek")return{...t,due:daysFromNow(7),migrateCount:mc};
      if(d==="someday")return{...t,due:"",migrateCount:mc};
      return t;
    }).filter(Boolean));
  }

  // check if monthly review should show (first day of month)
  useEffect(()=>{
    const d=new Date();if(d.getDate()!==1)return;
    const key=`review_shown_${monthKey(d.getFullYear(),d.getMonth())}`;
    if(!lsGet(key))setTimeout(()=>{setShowMonthlyReview(true);lsSet(key,true);},2000);
  },[]);

  const focus=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today"||isOverdue(t.due))).slice(0,3);
  const other=tasks.filter(t=>!t.done&&!focus.find(f=>f.id===t.id));
  const done=tasks.filter(t=>t.done);
  const tProps={onToggle:toggleTask,onToggleSub:toggleSub,onExpand:toggleExpand,onAI:aiBreak,onOpen:setDetail,onCheckIn:setCheckInTask};
  const navTop=[{id:"today",l:"今日焦点",i:"☀️"},{id:"all",l:"所有任务",i:"📋"},{id:"weekly",l:"本周计划",i:"📆"},{id:"calendar",l:"日历",i:"📅"},{id:"future",l:"未来清单",i:"🔭"},{id:"learning",l:"学习",i:"📚"},{id:"projects",l:"项目",i:"📁"},{id:"blocking",l:"全局框架",i:"🏗"}];

  return<div style={{display:"flex",height:"100vh",background:"#f7f6f3",fontSize:14,overflow:"hidden"}}>
    {/* mobile menu btn */}
    {!sidebarOpen&&<button className="mobile-menu-btn" onClick={()=>setSidebarOpen(true)} style={{position:"fixed",top:12,left:12,zIndex:200,background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"7px 10px",fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>☰</button>}
    {/* sidebar overlay for mobile */}
    {sidebarOpen&&<div className="mobile-menu-btn" onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:49}}/>}
    {/* sidebar */}
    <div className={`sidebar-desktop ${sidebarOpen?"sidebar-mobile-open":""}`} style={{width:190,background:"#fff",borderRight:"0.5px solid #e0ddd6",flexDirection:"column",padding:"16px 0",flexShrink:0,overflowY:"auto",position:"relative",zIndex:50}}>
      <div style={{padding:"0 16px 16px",fontSize:15,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>🧠 专注板</span>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowSettings(true)} title="同步设置" style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:ghToken?"#0F6E56":"#bbb"}}>{ghToken?"☁️":"⚙️"}</button>
          <button className="mobile-menu-btn" onClick={()=>setSidebarOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#aaa"}}>✕</button>
        </div>
      </div>
      {navTop.map(n=><div key={n.id} onClick={()=>{setView(n.id);setProjView(null);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:view===n.id&&!projView?"#1a1a1a":"#666",fontWeight:view===n.id&&!projView?500:400,background:view===n.id&&!projView?"#f0ede8":"transparent",cursor:"pointer"}}>{n.i} {n.l}</div>)}
      <div style={{fontSize:11,color:"#bbb",padding:"14px 16px 4px",textTransform:"uppercase",letterSpacing:".06em"}}>项目</div>
      {PROJECTS.map(p=><div key={p.id} onClick={()=>{setView("projects");setProjView(p);}} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 16px",fontSize:13,color:projView?.id===p.id?"#1a1a1a":"#666",background:projView?.id===p.id?"#f0ede8":"transparent",cursor:"pointer"}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}/>{p.name}
      </div>)}
      <div style={{flex:1}}/>
      <div style={{borderTop:"0.5px solid #e0ddd6",padding:"8px 0"}}>
        <div onClick={()=>setShowBrainDump(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#666",cursor:"pointer"}}>🧠 脑倾倒</div>
        {(()=>{
          const today=todayStr();
          const dueCount=courses.reduce((sum,c)=>{
            return sum+(c.notes||[]).filter(n=>n.aiSummary&&(!n.nextReview||n.nextReview<=today)).length;
          },0);
          return(
            <div onClick={()=>setShowReview(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:dueCount>0?"#185FA5":"#666",cursor:"pointer"}}>
              🔁 笔记复习{dueCount>0&&<span style={{fontSize:11,background:"#185FA5",color:"#fff",borderRadius:10,padding:"1px 6px",marginLeft:4}}>{dueCount}</span>}
            </div>
          );
        })()}
        {(()=>{
          const blockCount=tasks.filter(t=>!t.done&&t.title.startsWith("[Day ")&&t.notes?.includes("📌 今日微任务")&&t.due===todayStr()).length;
          return(
            <div onClick={()=>setShowBlockBreaker(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:blockCount>0?"#854F0B":"#666",cursor:"pointer",fontWeight:blockCount>0?500:400}}>
              🔨 节点拆解{blockCount>0&&<span style={{fontSize:11,background:"#854F0B",color:"#fff",borderRadius:10,padding:"1px 6px",marginLeft:4}}>{blockCount}今日</span>}
            </div>
          );
        })()}
        <div onClick={()=>setShowMigration(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#666",cursor:"pointer"}}>🌙 结束今天</div>
        <div onClick={()=>setShowMonthlyReview(true)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#666",cursor:"pointer"}}>📅 月度回顾</div>
        <div onClick={()=>setAiOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",fontSize:13,color:"#185FA5",cursor:"pointer",background:aiOpen?"#EBF3FB":"transparent"}}>✨ AI助手</div>
      </div>
    </div>

    {/* main */}
    <div className="main-area" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",transition:"margin-right .2s",marginRight:aiOpen?580:0}}>
      <div style={{background:"#fff",borderBottom:"0.5px solid #e0ddd6",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16,fontWeight:500}}>{projView?projView.name:navTop.find(n=>n.id===view)?.l||""}</span>
          <SyncBadge status={syncStatus} hasToken={!!ghToken}/>
          {ghToken&&gistId&&(
            <button onClick={loadFromGist} title="重新从Gist拉取数据" style={{fontSize:11,background:"none",border:"0.5px solid #e0ddd6",borderRadius:5,padding:"2px 8px",cursor:"pointer",color:"#888",flexShrink:0}}>
              {syncStatus==="saving"?"⏳":"🔄"}
            </button>
          )}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:13,color:"#aaa"}}>{new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"})}</span>
          <button onClick={()=>setShowAdd(true)} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>+ 添加任务</button>
        </div>
      </div>

      {!ghToken&&(
        <div style={{background:"#EBF3FB",borderBottom:"0.5px solid #B5D4F4",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <span style={{fontSize:12,color:"#185FA5"}}>📱 跨设备同步未开启 — 数据仅存本地浏览器</span>
          <button onClick={()=>setShowSettings(true)} style={{fontSize:12,color:"#185FA5",background:"none",border:"0.5px solid #185FA5",borderRadius:5,padding:"2px 10px",cursor:"pointer"}}>开启同步</button>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
        {view==="today"&&<>
          {/* Block tasks today banner */}
          {(()=>{
            const blockToday=tasks.filter(t=>!t.done&&t.title.startsWith("[Day ")&&t.notes?.includes("📌 今日微任务")&&t.due===todayStr());
            if(!blockToday.length)return null;
            return<div style={{background:"linear-gradient(135deg,#FAEEDA,#FFF5E0)",border:"1.5px solid #f0c070",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#854F0B"}}>🔨 今日节点任务 · 完成后必须打卡</span>
                <span style={{fontSize:11,color:"#854F0B",opacity:.7}}>{blockToday.length}个</span>
              </div>
              {blockToday.map(t=>{
                const micro=t.notes?.match(/📌 今日微任务：(.+)/)?.[1];
                const output=t.notes?.match(/✅ 产出要求：(.+)/)?.[1];
                return<div key={t.id} style={{background:"rgba(255,255,255,.6)",borderRadius:7,padding:"8px 10px",marginBottom:4,display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:"#1a1a1a",marginBottom:2}}>{t.title.replace(/^\[Day \d+\] /,"")}</div>
                    {micro&&<div style={{fontSize:11,color:"#854F0B"}}>📌 {micro}</div>}
                    {output&&<div style={{fontSize:11,color:"#0F6E56",marginTop:2}}>📤 {output}</div>}
                  </div>
                  <button onClick={()=>setCheckInTask(t)} style={{padding:"4px 10px",background:"#854F0B",color:"#fff",border:"none",borderRadius:5,fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>打卡</button>
                </div>;
              })}
            </div>;
          })()}
          {/* Energy level indicator */}
          {(()=>{const e=getEnergyLabel();return(
            <div style={{background:e.bg,border:"0.5px solid "+e.color+"44",borderRadius:8,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:e.color,fontWeight:500}}>{e.label}</span>
              <span style={{fontSize:12,color:e.color,opacity:.8}}>{e.tip}</span>
            </div>
          );})()}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[["今日重点",focus.length],["待处理",tasks.filter(t=>!t.done).length],["已完成",done.length]].map(([l,v])=>(
              <div key={l} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:22,fontWeight:500}}>{v}</div><div style={{fontSize:12,color:"#aaa",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          {/* Time estimate warning */}
          {(()=>{const total=getTotalEstimate(focus.filter(t=>!t.done));return total>0?(
            <div style={{fontSize:12,color:"#854F0B",background:"#FAEEDA",borderRadius:6,padding:"6px 12px",marginBottom:12}}>
              ⏱ 今日重点预计需要约 {total>=60?Math.round(total/60)+"小时":total+"分钟"}
            </div>
          ):null;})()}
          {/* Habit tracker */}
          <HabitTracker habits={habits} onUpdateHabits={updateHabits}/>
          {/* Pomodoro stats */}
          {pomLog.length>0&&<PomodoroStats log={pomLog}/>}
          <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <span style={{fontSize:12,fontWeight:500,color:"#185FA5",background:"#E6F1FB",padding:"3px 10px",borderRadius:6}}>⚡ 现在专注这里</span>
              <button onClick={()=>setAiOpen(true)} style={{fontSize:12,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>AI重新规划↗</button>
            </div>
            {focus.length?focus.map(t=><TaskRow key={t.id} task={t} {...tProps}/>):<div style={{fontSize:13,color:"#aaa",padding:"8px 0"}}>没有紧急任务，今天很轻松 🎉</div>}
          </div>
          {other.length>0&&<><div style={{fontSize:13,fontWeight:500,marginBottom:10,color:"#888"}}>其他待办</div>{other.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
          {done.length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"18px 0 10px",color:"#bbb"}}>已完成 ({done.length})</div>{done.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
        </>}
        {view==="all"&&<>
          {tasks.filter(t=>!t.done).map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}
          {done.length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"18px 0 10px",color:"#bbb"}}>已完成</div>{done.map(t=><TaskRow key={t.id} task={t} {...tProps}/>)}</>}
        </>}
        {view==="calendar"&&<CalendarView tasks={tasks} onAddTask={addTask} journal={journal} onJournalUpdate={setJournalAndSync}/>}
        {view==="future"&&<FutureLog futureLog={futureLog} onUpdate={setFutureLogAndSync} onMoveToTasks={addFutureToTasks}/>}
        {view==="weekly"&&<WeeklyView tasks={tasks} onUpdate={saveDetail} onAddTask={addTask}/>}
        {view==="learning"&&<LearningView courses={courses} onUpdate={updateCourse} onAdd={addCourse} onArchive={archiveCourse} onAddTaskToBoard={addTask} geminiKey={geminiKey} onAddPomEntry={addPomEntry}/>}
        {view==="blocking"&&<BlockingView tasks={tasks} onUpdate={saveDetail} onAddTask={addTask} geminiKey={geminiKey}/>}
        {view==="projects"&&(projView
          ?<ProjectPanel project={projView} tasks={tasks} onOpen={setDetail} onBack={()=>setProjView(null)}/>
          :<>{PROJECTS.map(p=>{const pts=tasks.filter(t=>t.project===p.id);const d=pts.filter(t=>t.done).length;const pct=pts.length?Math.round(d/pts.length*100):0;return<div key={p.id} onClick={()=>setProjView(p)} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:12,padding:"16px 20px",marginBottom:12,cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{width:10,height:10,borderRadius:"50%",background:p.color,flexShrink:0}}/><span style={{fontSize:15,fontWeight:500}}>{p.name}</span><span style={{marginLeft:"auto",fontSize:13,color:"#aaa"}}>{d}/{pts.length} 完成</span></div>
            <div style={{height:4,background:"#f0ede8",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:p.color,borderRadius:2}}/></div>
            <div style={{fontSize:12,color:"#bbb",marginTop:6}}>{pts.filter(t=>!t.done&&t.priority==="urgent").length} 个紧急任务</div>
          </div>;})}
          </>
        )}
      </div>

      <div style={{background:"#fff",borderTop:"0.5px solid #e0ddd6",padding:"12px 24px",display:"flex",gap:10,flexShrink:0}}>
        <input value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQuick()} placeholder="快速添加任务…" style={{flex:1,padding:"8px 12px",border:"0.5px solid #ccc",borderRadius:7,fontSize:13}}/>
        <button onClick={addQuick} style={{padding:"8px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>添加↵</button>
        <button onClick={()=>setShowBrainDump(true)} style={{padding:"8px 12px",border:"0.5px solid #e0ddd6",background:"#f7f6f3",borderRadius:7,fontSize:13,cursor:"pointer",color:"#666"}}>🧠</button>
        <button onClick={()=>setAiOpen(true)} style={{padding:"8px 14px",border:"0.5px solid #B5D4F4",background:"#EBF3FB",color:"#185FA5",borderRadius:7,fontSize:13,cursor:"pointer"}}>✨ AI</button>
      </div>
    </div>

    <AIPanel open={aiOpen} onClose={()=>setAiOpen(false)} tasks={tasks} onSubtasksAdded={addSubsFromAI} sendRef={aiRef} apiKey={geminiKey} setApiKey={setGeminiKey} onAddTask={addTask}/>
    {detail&&<TaskDetail task={detail} onClose={()=>setDetail(null)} onSave={saveDetail} onDelete={delTask}/>}
    {showMigration&&<MigrationPanel tasks={tasks} onMigrate={handleMigrate} onClose={()=>setShowMigration(false)}/>}
    {showBrainDump&&<BrainDump onClose={()=>setShowBrainDump(false)} onAddTasks={addBrainTasks} apiKey={geminiKey}/>}
    {showMonthlyReview&&<MonthlyReview tasks={tasks} onClose={()=>setShowMonthlyReview(false)}/>}
    {showLaunch&&<LaunchRitual tasks={tasks} onDismiss={()=>setShowLaunch(false)} geminiKey={geminiKey}/>}
    {showReview&&<ReviewPanel courses={courses} onUpdateNote={updateCourseNote} onClose={()=>setShowReview(false)}/>}
    {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} onSynced={(t,id)=>{setGhToken(t);setGistId(id);ghTokenRef.current=t;gistIdRef.current=id;isFirstLoad.current=false;setTimeout(loadFromGist,100);}}/>}
    {showBlockBreaker&&<BlockBreaker tasks={tasks} onAddTask={addTask} onUpdateTask={saveDetail} geminiKey={geminiKey} onClose={()=>setShowBlockBreaker(false)}/>}
    {checkInTask&&<DailyCheckIn task={checkInTask} onSave={saveCheckIn} onClose={()=>setCheckInTask(null)}/>}

    {showAdd&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:400,boxShadow:"0 8px 40px rgba(0,0,0,.15)"}} className="fade-in">
        <div style={{fontSize:15,fontWeight:500,marginBottom:16}}>添加任务</div>
        {[["任务名称",<input key="t" value={nTask.title} onChange={e=>setNTask(n=>({...n,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addModal()} placeholder="输入任务名称…" autoFocus style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["所属项目",<select key="p" value={nTask.project} onChange={e=>setNTask(n=>({...n,project:parseInt(e.target.value)}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
          ["开始日期",<input key="s" type="date" value={nTask.startDate} onChange={e=>setNTask(n=>({...n,startDate:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["截止日期",<input key="d" type="date" value={nTask.due} onChange={e=>setNTask(n=>({...n,due:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],
          ["优先级",<select key="pr" value={nTask.priority} onChange={e=>setNTask(n=>({...n,priority:e.target.value}))} style={{width:"100%",padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天</option><option value="normal">⚪ 普通</option></select>],
        ].map(([l,el])=><div key={l} style={{marginBottom:12}}><div style={{fontSize:12,color:"#777",marginBottom:4}}>{l}</div>{el}</div>)}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:18}}>
          <button onClick={()=>setShowAdd(false)} style={{padding:"7px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={addModal} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>保存任务</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
