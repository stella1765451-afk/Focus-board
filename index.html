// ══════════════════════════════════════════
// §UTILS  工具函数 日期/LS/格式化
// ══════════════════════════════════════════
function todayStr(){return new Date().toISOString().split("T")[0];}
function daysFromNow(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function yyyymmdd(d){return d.toISOString().split("T")[0];}
function addDays(str,n){const d=new Date(str+"T00:00:00");d.setDate(d.getDate()+n);return yyyymmdd(d);}
function daysBetween(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function fmtDate(str){
  if(!str)return"";
  const d=new Date(str+"T00:00:00");
  const diff=Math.round((d-new Date().setHours(0,0,0,0))/86400000);
  if(diff<0)return"已逾期";if(diff===0)return"今天";if(diff===1)return"明天";
  return`${d.getMonth()+1}/${d.getDate()}`;
}
function isOverdue(str){return str?new Date(str+"T00:00:00")<new Date().setHours(0,0,0,0):false;}
function getProj(id){return PROJECTS.find(p=>p.id===id)||{name:"无项目",color:"#888"};}
function monthKey(y,m){return`${y}-${String(m+1).padStart(2,"0")}`;}
function fmtSize(b){return b<1024?b+"B":b<1048576?Math.round(b/1024)+"KB":(b/1048576).toFixed(1)+"MB";}
// ── 教练逻辑工具（v4）──────────────────────
// 练习/抵触类关键词：用于自动识别"最容易拖"的任务
const PRACTICE_KW=["练习","临摹","速写","作业","刷题","习题","做题","训练","实操","实战","coding","代码题","leetcode","背","默写","复盘"];
function isBlockTask(t){return t.title?.startsWith("[Day ")&&t.notes?.includes("📌 今日微任务");}
function isPracticeTask(t){
  if(t.isPractice===true)return true;
  const s=(t.title||"")+" "+(t.notes||"");
  return PRACTICE_KW.some(k=>s.toLowerCase().includes(k.toLowerCase()));
}
function hasCheckedIn(t){return!!(t.checkInOutput||t.checkInDate);}
// 完成前是否必须打卡（节点任务 / 练习类 / 显式要求）
function needsCheckIn(t){return(isBlockTask(t)||isPracticeTask(t)||t.requireCheckIn===true)&&!hasCheckedIn(t);}
// 你几乎总是低估——把估时乘以"现实系数"（默认 1.5）
const FUDGE=1.5;
function realisticEstimate(mins){return Math.round((mins||0)*FUDGE);}
function fmtDur(mins){if(!mins)return"";return mins>=60?(mins%60?Math.floor(mins/60)+"小时"+(mins%60)+"分":Math.floor(mins/60)+"小时"):mins+"分钟";}
// 执行顺序：先吃最抵触的青蛙（练习类）→ 逾期 → 截止近 → 优先级
function coachOrder(list){
  const prW={urgent:0,today:1,normal:2};
  return[...list].sort((a,b)=>{
    const ap=isPracticeTask(a)?0:1,bp=isPracticeTask(b)?0:1;
    if(ap!==bp)return ap-bp;
    const ao=isOverdue(a.due)?0:1,bo=isOverdue(b.due)?0:1;
    if(ao!==bo)return ao-bo;
    const ad=a.due||"9999",bd=b.due||"9999";
    if(ad!==bd)return ad<bd?-1:1;
    return(prW[a.priority]??3)-(prW[b.priority]??3);
  });
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
const GIST_FILENAME="zhujiao_data.json";

async function gistLoad(token,gistId){
  const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`}});
  if(!res.ok)throw new Error("读取失败");
  const data=await res.json();
  const raw=data.files?.[GIST_FILENAME]?.content;
  return raw?JSON.parse(raw):null;
}

// 剥离 base64 图片，只存 key 引用；图片持久化在 localStorage
function stripImagesForGist(payload){
  // 处理 tasks 里的 checkInPreview 和 attachments.data
  const tasks=(payload.tasks||[]).map(t=>{
    const out={...t};
    if(out.checkInPreview&&out.checkInPreview.startsWith("data:")){      const k="zj_img_ci_"+t.id;      try{localStorage.setItem(k,out.checkInPreview);}catch(e){}      out.checkInPreview="__ls:"+k;    }
    if(out.attachments&&out.attachments.length){      out.attachments=out.attachments.map(a=>{        if(a.data&&a.data.startsWith("data:")){          const k="zj_img_att_"+t.id+"_"+a.name;          try{localStorage.setItem(k,a.data);}catch(e){}          return{...a,data:"__ls:"+k};        }        return a;      });    }
    return out;
  });
  // 处理 courses 里的 assignments.refImage 和 submissions.images
  const courses=(payload.courses||[]).map(c=>{
    const assignments=(c.assignments||[]).map(a=>{
      const out={...a};
      if(out.refImage&&out.refImage.startsWith("data:")){        const k="zj_img_ref_"+c.id+"_"+a.id;        try{localStorage.setItem(k,out.refImage);}catch(e){}        out.refImage="__ls:"+k;      }
      if(out.submissions){        out.submissions=out.submissions.map(s=>{          const ss={...s};          if(ss.image&&ss.image.startsWith("data:")){            const k="zj_img_sub_"+a.id+"_"+s.id;            try{localStorage.setItem(k,ss.image);}catch(e){}            ss.image="__ls:"+k;          }          if(ss.images&&ss.images.length){            ss.images=ss.images.map((img,i)=>{              if(img&&img.startsWith("data:")){                const k="zj_img_subi_"+a.id+"_"+s.id+"_"+i;                try{localStorage.setItem(k,img);}catch(e){}                return"__ls:"+k;              }              return img;            });          }          return ss;        });      }
      return out;
    });
    return{...c,assignments};
  });
  // AI 对话里的图片消息也剥离
  const aiHistory=(payload.aiHistory||[]).map(conv=>({
    ...conv,
    msgs:(conv.msgs||[]).map(m=>{
      if(!m.images||!m.images.length)return m;
      const images=m.images.map((img,i)=>{
        if(img&&img.startsWith("data:")){
          const k="zj_img_ai_"+conv.id+"_"+i+"_"+(m.role||"u");
          try{localStorage.setItem(k,img);}catch(e){}
          return"__ls:"+k;
        }
        return img;
      });
      return{...m,images};
    })
  }));
  return{...payload,tasks,courses,aiHistory};
}

// 加载时恢复 __ls: 引用为实际 base64
function restoreImagesFromLS(payload){
  function res(v){if(typeof v==="string"&&v.startsWith("__ls:")){    try{return localStorage.getItem(v.slice(5))||v;}catch(e){return v;}  }return v;}
  const tasks=(payload.tasks||[]).map(t=>({...t,    checkInPreview:res(t.checkInPreview),    attachments:(t.attachments||[]).map(a=>({...a,data:res(a.data)}))  }));
  const courses=(payload.courses||[]).map(c=>({...c,    assignments:(c.assignments||[]).map(a=>({...a,      refImage:res(a.refImage),      submissions:(a.submissions||[]).map(s=>({...s,        image:res(s.image),        images:(s.images||[]).map(img=>res(img))      }))    }))  }));
  const aiHistory=(payload.aiHistory||[]).map(conv=>({
    ...conv,
    msgs:(conv.msgs||[]).map(m=>({...m,images:(m.images||[]).map(img=>res(img))}))
  }));
  return{...payload,tasks,courses,aiHistory};
}

async function gistSave(token,gistId,payload){
  const stripped=stripImagesForGist(payload);
  const res=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:"PATCH",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({files:{[GIST_FILENAME]:{content:JSON.stringify(stripped,null,2)}}}),
  });
  if(!res.ok)throw new Error("保存失败");
  return res.json();
}

async function gistCreate(token){
  const res=await fetch("https://api.github.com/gists",{
    method:"POST",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({description:"专注板数据",public:false,files:{[GIST_FILENAME]:{content:JSON.stringify({tasks:[],journal:{},futureLog:{},courses:[],nextId:1},null,2)}}}),
  });
  if(!res.ok)throw new Error("创建Gist失败");
  const data=await res.json();
  return data.id;
}

async function gistFindOrCreate(token){
  // Search for existing "专注板数据" gist first
  try{
    const res=await fetch("https://api.github.com/gists?per_page=100",{
      headers:{Authorization:`token ${token}`}
    });
    if(res.ok){
      const list=await res.json();
      const found=list.find(g=>
        g.description==="专注板数据"&&
        g.files&&g.files[GIST_FILENAME]
      );
      if(found)return found.id;
    }
  }catch(e){}
  // Not found, create new
  return await gistCreate(token);
}

// 临摹打卡弹窗：上传参考图 + 作品，并排对比
function CopyStudyCheckIn({assignment,onSave,onClose}){
  const [workImg,setWorkImg]=useState(null);
  const [note,setNote]=useState("");
  const fileRef=useRef();
  function readImg(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);}
  function handleWork(e){const f=e.target.files[0];if(f)readImg(f,d=>setWorkImg(d));e.target.value="";}
  function save(){
    if(!workImg){alert("请上传临摹作品");return;}
    const sub={id:Date.now(),date:todayStr(),image:workImg,note:note.trim()};
    onSave(sub);
    onClose();
  }
  const refImg=assignment.refImage||null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 12px 48px rgba(0,0,0,.25)"}}>
        <div style={{padding:"16px 20px 12px",borderBottom:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:600}}>🎨 临摹打卡</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>{assignment.title}</div>
          </div>
          <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
          {/* 对比区 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {/* 参考图 */}
            <div>
              <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:".04em"}}>参考图</div>
              {refImg?(
                <img src={refImg} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:8,border:"0.5px solid #e0ddd6"}}/>
              ):(

// 速写打卡弹窗：快速计次 + 可选上传
function SketchCheckIn({assignment,onSave,onClose}){
  const [duration,setDuration]=useState(10);
  const [imgs,setImgs]=useState([]);
  const [note,setNote]=useState("");
  const fileRef=useRef();
  const done=(assignment.submissions||[]).length;
  const target=assignment.targetCount||10;
  function readImg(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);}
  function handleFiles(e){
    Array.from(e.target.files).forEach(f=>readImg(f,d=>setImgs(prev=>[...prev,{id:Date.now()+Math.random(),data:d}])));
    e.target.value="";
  }
  function save(){
    const sub={id:Date.now(),date:todayStr(),duration:duration,images:imgs.map(i=>i.data),note:note.trim(),count:Math.max(1,imgs.length)};
    onSave(sub);
    onClose();
  }
  const DURATIONS=[2,5,10,15,30];
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 12px 48px rgba(0,0,0,.25)"}}>
        <div style={{padding:"16px 20px 12px",borderBottom:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:600}}>✏️ 速写打卡</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>{assignment.title}</div>
          </div>
          <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
          {/* 进度环 */}
          <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"#F5F8FF",borderRadius:10}}>
            <div style={{position:"relative",width:56,height:56,flexShrink:0}}>
              <svg width="56" height="56" style={{transform:"rotate(-90deg)"}}>
                <circle cx="28" cy="28" r="22" fill="none" stroke="#E0E8FF" strokeWidth="5"/>
                <circle cx="28" cy="28" r="22" fill="none" stroke="#185FA5" strokeWidth="5"
                  strokeDasharray={`${Math.min((done+1)/target,1)*138.2} 138.2`} strokeLinecap="round"/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#185FA5"}}>{done+1}</div>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>第 {done+1} 张</div>
              <div style={{fontSize:12,color:"#888"}}>目标：{target} 张，已完成 {done} 张</div>
            </div>
          </div>
          {/* 每张时长 */}
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:8,fontWeight:500}}>这次每张用时</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {DURATIONS.map(d=>(
                <button key={d} onClick={()=>setDuration(d)}
                  style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${duration===d?"#185FA5":"#e0ddd6"}`,background:duration===d?"#185FA5":"transparent",color:duration===d?"#fff":"#555",fontSize:13,cursor:"pointer",fontWeight:duration===d?600:400}}>
                  {d}分钟
                </button>
              ))}
            </div>
          </div>
          {/* 上传速写（可选） */}
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:8,fontWeight:500}}>上传速写（可选，可多张）</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
              {imgs.map((img,i)=>(
                <div key={img.id} style={{position:"relative",width:60}}>
                  <img src={img.data} style={{width:60,height:60,objectFit:"cover",borderRadius:6,border:"0.5px solid #e0ddd6"}}/>
                  <button onClick={()=>setImgs(prev=>prev.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#A32D2D",color:"#fff",border:"none",cursor:"pointer",fontSize:10,lineHeight:"16px",textAlign:"center"}}>✕</button>
                </div>
              ))}
              <div onClick={()=>fileRef.current.click()} style={{width:60,height:60,borderRadius:6,border:"1.5px dashed #ccc",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#ccc",fontSize:22,background:"#fafafa"}}>+</div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFiles} style={{display:"none"}}/>
          </div>
          {/* 备注 */}
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>备注（可选）</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2}
              placeholder={"今天画的主题、遇到的问题…"}
              style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,resize:"none"}}/>
          </div>
          <button onClick={save} style={{width:"100%",padding:"12px",background:"#185FA5",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"}}>
            ✓ 完成 {imgs.length>1?imgs.length+"张速写":"这张速写"}
          </button>
        </div>
      </div>
    </div>
  );
}

// §BASE_UI  基础UI组件 Check/Tag/TaskRow/TaskDetail
// ══════════════════════════════════════════
function Check({checked,onClick,size=18}){
  return<div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",border:checked?"none":"1.5px solid #bbb",background:checked?"#185FA5":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
    {checked&&<span style={{color:"#fff",fontSize:size*.55,fontWeight:700}}>✓</span>}
  </div>;
}
function Tag({type}){
  const S={urgent:{bg:"#FCEBEB",c:"#A32D2D",l:"紧急"},today:{bg:"#FAEEDA",c:"#854F0B",l:"今天"},normal:{bg:"#f0ede8",c:"#777",l:"普通"}};
  const s=S[type]||S.normal;
  return<span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>;
}
function MigrateTag({count}){
  if(!count)return null;
  const color=count>=3?"#A32D2D":count>=2?"#854F0B":"#aaa";
  return<span title={`已迁移${count}次`} style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:count>=3?"#FCEBEB":count>=2?"#FAEEDA":"#f0ede8",color,whiteSpace:"nowrap"}}>迁移×{count}</span>;
}
function SyncBadge({status,hasToken}){
  const S={
    idle:{c:"#bbb",l:hasToken?"":"未连接云同步"},
    saving:{c:"#854F0B",l:"同步中…"},
    saved:{c:"#0F6E56",l:"✓ 已同步"},
    error:{c:"#A32D2D",l:"⚠ 同步失败，点🔄重试"}
  };
  const s=S[status]||S.idle;
  if(!s.l)return null;
  return<span style={{fontSize:11,color:s.c}}>{s.l}</span>;
}

/* ═══════════════════════════════════════════
   TASK ROW
═══════════════════════════════════════════ */
function TaskRow({task,onToggle,onToggleSub,onExpand,onAI,onOpen,onCheckIn}){
  const p=getProj(task.project);
  const ov=isOverdue(task.due)&&!task.done;
  const stale=task.migrateCount>=3;
  const dueToday=task.due===todayStr()&&!task.done;
  const dueTomorrow=task.due===daysFromNow(1)&&!task.done;
  const isBlockTask=task.title.startsWith("[Day ")&&task.notes?.includes("📌 今日微任务");
  const hasCheckIn=task.checkInOutput||task.checkInDate;
  const prac=isPracticeTask(task);
  const needCI=needsCheckIn(task);

  // Urgency border color
  let borderColor="#e0ddd6";
  let bgColor="#fff";
  if(ov){borderColor="#f5a8a8";bgColor="#FFFAFA";}
  else if(dueToday){borderColor="#f0c070";bgColor="#FFFDF5";}
  else if(stale){borderColor="#f0b8b8";}
  else if(task.priority==="urgent"&&!task.done){borderColor="#e8b4b4";}

  return<div style={{marginBottom:5}} className="fade-in">
    <div style={{background:bgColor,border:"0.5px solid "+borderColor,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,opacity:task.done?.5:1,
      outline:ov&&!task.done?"2px solid rgba(163,45,45,.15)":"none",outlineOffset:1}}>
      <Check checked={task.done} onClick={()=>onToggle(task.id)}/>
      <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onOpen(task)}>
        <div style={{fontSize:14,color:task.done?"#aaa":"#1a1a1a",textDecoration:task.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
        <div style={{display:"flex",gap:8,marginTop:2,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:p.color}}>{p.name}</span>
          {needCI&&!task.done&&<span style={{fontSize:11,color:"#854F0B",background:"#FAEEDA",padding:"1px 6px",borderRadius:4,fontWeight:600}}>需打卡</span>}
          {prac&&!task.done&&<span style={{fontSize:11,color:"#A32D2D",background:"#FCEBEB",padding:"1px 6px",borderRadius:4}}>练习·易拖</span>}
          {hasCheckIn&&<span style={{fontSize:11,color:"#0F6E56",background:"#E1F5EE",padding:"1px 6px",borderRadius:4}}>✓ 已打卡</span>}
          {task.notes&&<span style={{fontSize:11,color:"#bbb"}}>📝</span>}
          {task.attachments?.length>0&&<span style={{fontSize:11,color:"#bbb"}}>📎{task.attachments.length}</span>}
          {stale&&<span style={{fontSize:11,color:"#A32D2D"}}>已推了{task.migrateCount}次</span>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {task.due&&<span style={{fontSize:11,color:ov?"#A32D2D":dueToday?"#854F0B":"#aaa",fontWeight:ov||dueToday?600:400,whiteSpace:"nowrap",background:ov?"#FCEBEB":dueToday?"#FAEEDA":"transparent",padding:ov||dueToday?"1px 6px":"0",borderRadius:4}}>📅{fmtDate(task.due)}</span>}
        <Tag type={task.priority}/>
        <MigrateTag count={task.migrateCount}/>
        {needCI&&!task.done&&onCheckIn&&(
          <button onClick={e=>{e.stopPropagation();onCheckIn(task);}} style={{fontSize:11,color:"#fff",background:"#854F0B",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>打卡↗</button>
        )}
        {!task.done&&!task.subtasks.length&&!isBlockTask&&<button onClick={()=>onAI(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>拆解↗</button>}
        {task.subtasks.length>0&&<button onClick={()=>onExpand(task.id)} style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"2px 5px"}}>{task.expanded?"▲":"▼"}{task.subtasks.length}步</button>}
      </div>
    </div>
    {task.expanded&&task.subtasks.length>0&&<div style={{paddingLeft:40,marginTop:3,display:"flex",flexDirection:"column",gap:3}}>
      {task.subtasks.map((s,i)=><div key={i} onClick={()=>onToggleSub(task.id,i)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:6,fontSize:13,color:task.subtaskDone[i]?"#aaa":"#555",background:"#f7f6f3",cursor:"pointer",textDecoration:task.subtaskDone[i]?"line-through":"none"}}>
        <Check checked={task.subtaskDone[i]} size={14} onClick={e=>{e.stopPropagation();onToggleSub(task.id,i);}}/>
        {s}
      </div>)}
    </div>}
    {isBlockTask&&task.notes&&!task.done&&(()=>{
      const micro=task.notes.match(/📌 今日微任务：(.+)/)?.[1];
      if(!micro)return null;
      return<div style={{marginLeft:40,marginTop:3,padding:"6px 10px",background:"#FAEEDA",borderRadius:6,fontSize:12,color:"#854F0B",borderLeft:"3px solid #854F0B"}}>
        今天做：{micro}
      </div>;
    })()}
  </div>;
}

   TASK DETAIL MODAL

function TaskDetail({task,onClose,onSave,onDelete}){
  const [f,setF]=useState({title:task.title,project:task.project,due:task.due||"",startDate:task.startDate||"",priority:task.priority,notes:task.notes||"",attachments:[...(task.attachments||[])],subtasks:[...task.subtasks],subtaskDone:[...task.subtaskDone],estimate:task.estimate||"",isPractice:task.isPractice||false,requireCheckIn:task.requireCheckIn||false});
  const [ns,setNs]=useState("");
  const fRef=useRef();
  function up(k,v){setF(x=>({...x,[k]:v}));}
  function addSub(){if(!ns.trim())return;setF(x=>({...x,subtasks:[...x.subtasks,ns.trim()],subtaskDone:[...x.subtaskDone,false]}));setNs("");}
  function rmSub(i){setF(x=>({...x,subtasks:x.subtasks.filter((_,j)=>j!==i),subtaskDone:x.subtaskDone.filter((_,j)=>j!==i)}));}

      <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"flex-start",gap:12}}>

        <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer",flexShrink:0}}>✕</button>
      </div>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["所属项目",<select value={f.project} onChange={e=>up("project",parseInt(e.target.value))} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>],
            ["优先级",<select value={f.priority} onChange={e=>up("priority",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}><option value="urgent">🔴 紧急</option><option value="today">🟡 今天</option><option value="normal">⚪ 普通</option></select>],

            ["截止日期",<input type="date" value={f.due} onChange={e=>up("due",e.target.value)} style={{width:"100%",padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>],

            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div><div style={{fontSize:11,color:"#aaa"}}>{fmtSize(a.size)}</div></div>
            <a href={a.data} download={a.name} style={{fontSize:11,color:"#185FA5",textDecoration:"none"}}>下载</a>
            <button onClick={()=>setF(x=>({...x,attachments:x.attachments.filter((_,j)=>j!==i)}))} style={{color:"#ccc",background:"none",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
          <button onClick={()=>fRef.current.click()} style={{padding:"6px 14px",border:"0.5px dashed #ccc",background:"#fafafa",borderRadius:6,fontSize:13,cursor:"pointer",color:"#666",width:"100%"}}>+ 上传文件</button>
          <input ref={fRef} type="file" multiple style={{display:"none"}} onChange={handleFile}/>
        </div>
      </div>
      <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={()=>onDelete(task.id)} style={{fontSize:13,color:"#A32D2D",background:"none",border:"none",cursor:"pointer"}}>删除任务</button>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{padding:"7px 14px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={()=>{if(f.title.trim())onSave({...task,...f});}} style={{padding:"7px 16px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}>保存</button>
        </div>
      </div>
    </div>
  </div>;
}

// ══════════════════════════════════════════
// §MIGRATION  迁移面板 / 脑倾倒 / 月度回顾
// ══════════════════════════════════════════
function MigrationPanel({tasks,onMigrate,onClose}){
  const pending=tasks.filter(t=>!t.done&&t.due<=todayStr());
  const [decisions,setDecisions]=useState(()=>Object.fromEntries(pending.map(t=>[t.id,"tomorrow"])));
  function decide(id,v){setDecisions(d=>({...d,[id]:v}));}
  function confirm(){onMigrate(decisions);onClose();}
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>🌙 结束今天</div>
        <div style={{fontSize:13,color:"#888"}}>今天有 {pending.length} 个未完成任务，每个选一个去向</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 24px",display:"flex",flexDirection:"column",gap:10}}>
        {pending.length===0&&<div style={{fontSize:14,color:"#aaa",textAlign:"center",padding:"32px 0"}}>🎉 今天全部完成了！厉害！</div>}
        {pending.map(t=>{
          const p=getProj(t.project);
          const stuckPrac=isPracticeTask(t)&&(t.migrateCount||0)>=2;
          const opts=stuckPrac
            ?[["tomorrow","明天第一个做","#854F0B"],["drop","承认不做·删掉","#A32D2D"]]
            :[["tomorrow","明天继续","#185FA5"],["nextweek","推到下周","#0F6E56"],["someday","推到未来","#854F0B"],["drop","直接删掉","#A32D2D"]];
          return<div key={t.id} style={{background:stuckPrac?"#FCEBEB":"#f7f6f3",borderRadius:10,padding:"12px 14px",border:stuckPrac?"0.5px solid #e8b4b4":"none"}}>
            <div style={{fontSize:14,fontWeight:500,marginBottom:stuckPrac?4:8,color:t.migrateCount>=3?"#A32D2D":"#1a1a1a"}}>
              {t.title}
              {t.migrateCount>0&&<span style={{fontSize:11,color:"#A32D2D",marginLeft:6}}>已推{t.migrateCount}次</span>}
            </div>
            {stuckPrac&&<div style={{fontSize:11,color:"#A32D2D",marginBottom:8,lineHeight:1.5}}>这个练习你躲了好几天了。不准再"推到未来"——要么明天第一个做掉，要么现在承认不做、删了它。</div>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {opts.map(([v,l,c])=>(
                <button key={v} onClick={()=>decide(t.id,v)} style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${decisions[t.id]===v?c:"#e0ddd6"}`,background:decisions[t.id]===v?c:"#fff",color:decisions[t.id]===v?"#fff":c,fontSize:12,cursor:"pointer",fontWeight:decisions[t.id]===v?600:400,transition:"all .15s"}}>{l}</button>
              ))}
            </div>
          </div>;
        })}
      </div>
      <div style={{padding:"14px 24px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onClose} style={{fontSize:13,color:"#888",background:"none",border:"none",cursor:"pointer"}}>稍后再说</button>
        <button onClick={confirm} style={{padding:"8px 20px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:500}}>确认并结束今天 →</button>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   BRAIN DUMP MODAL
═══════════════════════════════════════════ */
function BrainDump({onClose,onAddTasks,apiKey,courses=[],onAddIdeas}){
  const [text,setText]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [sel,setSel]=useState({});
  const [ideasSaved,setIdeasSaved]=useState(false);
  const courseList=courses.filter(c=>!c.archived);
  async function analyze(){
    if(!text.trim())return;
    if(!apiKey){setResult({error:"请先在AI助手里设置 Gemini API Key"});return;}
    setLoading(true);
    try{
      const prompt=`用户脑子很乱，把下面倒出来的内容整理成"能直接上手做"的 JSON。只返回 JSON，不要任何解释或 markdown 代码块。
格式：
{
 "tasks":[{"title":"动词开头、具体到能直接动手的任务名","estimate":数字(预计分钟,宁可往多估),"priority":"today"或"normal","firstStep":"2分钟内就能开始的最小第一步"}],
 "worries":["纯担忧/情绪，不是任务的"],
 "ideas":["以后也许想做、但现在不用做的想法"]
}
要求：
- title 必须具体、动词开头、能直接动手（反例"搞定项目"；正例"列出项目要交的3个文件"）。
- 真正今天必须做的才设 today，其余 normal。
- firstStep 要小到2分钟能开始（反例"开始写报告"；正例"新建文档、写下标题"）。
- 只把真正"需要行动的"放进 tasks；纯焦虑放 worries，灵感放 ideas，不要硬塞成任务。

用户内容：
${text}`;
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}),
      });
      const data=await res.json();
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      const tasks=(parsed.tasks||[]).map(t=>({
        title:(t.title||"").trim(),
        estimate:parseInt(t.estimate)>0?parseInt(t.estimate):30,
        priority:t.priority==="today"?"today":"normal",
        firstStep:(t.firstStep||"").trim(),
      })).filter(t=>t.title);
      setResult({tasks,worries:parsed.worries||[],ideas:parsed.ideas||[]});
      setSel(Object.fromEntries(tasks.map((_,i)=>[i,true])));
    }catch(e){setResult({error:"分析失败，请重试"});}
    setLoading(false);
  }
  const tasks=result&&!result.error?result.tasks:[];
  const chosen=tasks.filter((_,i)=>sel[i]);
  const toggle=i=>setSel(s=>({...s,[i]:!s[i]}));
  const setField=(i,k,v)=>setResult(r=>({...r,tasks:r.tasks.map((t,j)=>j===i?{...t,[k]:v}:t)}));
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:540,maxHeight:"86vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>🧠 脑倾倒</div>
        <div style={{fontSize:13,color:"#888"}}>{result&&!result.error?"勾选你真的要做的，每件都带估时和第一步；改两下就能上手":"把脑子里所有东西都倒出来，AI 帮你拆成能动手的小事"}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 24px"}}>
        {!result&&<>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"想到什么写什么，比如：\n- 明天要交报告好像\n- 一直担心那个项目\n- 想学摄影\n- 好像忘了回某人消息\n..."} rows={7} style={{width:"100%",padding:"10px 12px",border:"0.5px solid #ccc",borderRadius:8,fontSize:14,lineHeight:1.7,marginBottom:12}}/>
          <button onClick={analyze} disabled={loading} style={{width:"100%",padding:"10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:"pointer",opacity:loading?.7:1}}>
            {loading?"分析中…":"🪄 AI帮我拆成能做的事"}
          </button>
        </>}
        {result&&!result.error&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
          {tasks.length>0&&<div>
            <div style={{fontSize:12,color:"#185FA5",fontWeight:600,marginBottom:8}}>✅ 能动手的事（{chosen.length}/{tasks.length} 已选）</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {tasks.map((t,i)=>{
                const on=!!sel[i];
                return<div key={i} style={{border:`1px solid ${on?"#bcd6ef":"#eee"}`,background:on?"#F4F9FE":"#fafafa",borderRadius:9,padding:"10px 12px",opacity:on?1:.55}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:9}}>
                    <button onClick={()=>toggle(i)} style={{flexShrink:0,marginTop:1,width:18,height:18,borderRadius:5,border:`1.5px solid ${on?"#185FA5":"#ccc"}`,background:on?"#185FA5":"#fff",color:"#fff",fontSize:12,cursor:"pointer",lineHeight:"15px"}}>{on?"✓":""}</button>
                    <input value={t.title} onChange={e=>setField(i,"title",e.target.value)} style={{flex:1,fontSize:13.5,fontWeight:500,border:"none",background:"transparent",outline:"none",padding:0,color:"#1a1a1a"}}/>
                  </div>
                  {on&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginTop:8,paddingLeft:27}}>
                    <button onClick={()=>setField(i,"priority",t.priority==="today"?"normal":"today")} style={{fontSize:11,padding:"2px 9px",borderRadius:20,border:"1px solid "+(t.priority==="today"?"#A32D2D":"#ccc"),background:t.priority==="today"?"#A32D2D":"#fff",color:t.priority==="today"?"#fff":"#888",cursor:"pointer"}}>{t.priority==="today"?"今天":"普通"}</button>
                    <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,color:"#888"}}>估时
                      <input type="number" value={t.estimate} onChange={e=>setField(i,"estimate",parseInt(e.target.value)||0)} style={{width:46,fontSize:11,padding:"2px 4px",border:"0.5px solid #ccc",borderRadius:4,outline:"none"}}/>分
                    </span>
                  </div>}
                  {on&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:6,paddingLeft:27}}>
                    <span style={{fontSize:11,color:"#0F6E56",flexShrink:0}}>先做</span>
                    <input value={t.firstStep} onChange={e=>setField(i,"firstStep",e.target.value)} placeholder={'2分钟能开始的第一步'} style={{flex:1,fontSize:11.5,padding:"3px 7px",border:"0.5px solid #cde3d6",background:"#F3FAF6",borderRadius:5,outline:"none",color:"#2a2a2a"}}/>
                  </div>}
                  {on&&courseList.length>0&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:6,paddingLeft:27}}>
                    <span style={{fontSize:11,color:"#888",flexShrink:0}}>📚 同步到课程</span>
                    <select value={t.courseId||0} onChange={e=>setField(i,"courseId",+e.target.value||0)} style={{flex:1,fontSize:11.5,padding:"3px 6px",border:"0.5px solid #ccc",borderRadius:5,outline:"none",color:"#444",maxWidth:200}}>
                      <option value={0}>不绑定</option>
                      {courseList.map(c=><option key={c.id} value={c.id}>{c.title||"未命名课程"}</option>)}
                    </select>
                  </div>}
                </div>;
              })}
            </div>
          </div>}
          {(result.worries?.length>0||result.ideas?.length>0)&&<div style={{borderTop:"0.5px dashed #e8e5de",paddingTop:12}}>
            <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>下面这些只是先记下来，不会加进任务板：</div>
            {result.worries?.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:12,color:"#854F0B",fontWeight:600,marginBottom:5}}>😰 担忧/焦虑</div>
              {result.worries.map((w,i)=><div key={i} style={{padding:"5px 8px",background:"#FAEEDA",borderRadius:6,marginBottom:3,fontSize:12.5,color:"#6b4a14"}}>{w}</div>)}
            </div>}
            {result.ideas?.length>0&&<div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:"#0F6E56",fontWeight:600}}>💡 想法/灵感</span>
                {onAddIdeas&&(ideasSaved
                  ?<span style={{fontSize:11,color:"#0F6E56"}}>✓ 已存入未来清单</span>
                  :<button onClick={()=>{onAddIdeas(result.ideas);setIdeasSaved(true);}} style={{fontSize:11,color:"#185FA5",background:"none",border:"0.5px solid #185FA5",borderRadius:5,padding:"2px 8px",cursor:"pointer"}}>📥 全部存进未来清单</button>)}
              </div>
              {result.ideas.map((d,i)=><div key={i} style={{padding:"5px 8px",background:"#E1F5EE",borderRadius:6,marginBottom:3,fontSize:12.5,color:"#185c48"}}>{d}</div>)}
            </div>}
          </div>}
          {tasks.length===0&&<div style={{fontSize:13,color:"#aaa",textAlign:"center",padding:"12px 0"}}>没拆出需要行动的事——你倒出来的多是担忧或想法，先看看上面记下的就好。</div>}
        </div>}
        {result?.error&&<div style={{color:"#A32D2D",fontSize:13,padding:"8px 0"}}>{result.error}</div>}
      </div>
      <div style={{padding:"12px 24px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onClose} style={{fontSize:13,color:"#888",background:"none",border:"none",cursor:"pointer"}}>关闭</button>
        {result&&!result.error&&tasks.length>0&&(
          <button onClick={()=>{onAddTasks(chosen);onClose();}} disabled={chosen.length===0} style={{padding:"7px 16px",background:chosen.length?"#185FA5":"#ccc",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:chosen.length?"pointer":"default"}}>加入选中的 {chosen.length} 件 →</button>
        )}
      </div>
    </div>
  </div>;
}

   MONTHLY REVIEW MODAL

function MonthlyReview({tasks,onClose}){
  const [q1,setQ1]=useState("");
  const [q2,setQ2]=useState("");
  const [q3,setQ3]=useState("");
  const [saved,setSaved]=useState(false);
  const staleTasks=tasks.filter(t=>!t.done&&t.migrateCount>=3);
  function save(){
    const key=`review_${monthKey(new Date().getFullYear(),new Date().getMonth())}`;
    lsSet(key,{q1,q2,q3,date:todayStr()});
    setSaved(true);
    setTimeout(onClose,1200);
  }
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:500,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
      <div style={{padding:"20px 24px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>📅 月度回顾</div>
        <div style={{fontSize:13,color:"#888"}}>三个问题，5分钟完成</div>
      </div>
      <div style={{padding:"16px 24px",display:"flex",flexDirection:"column",gap:16}}>
        {staleTasks.length>0&&<div style={{background:"#FCEBEB",borderRadius:8,padding:"10px 14px"}}>
          <div style={{fontSize:12,color:"#A32D2D",fontWeight:600,marginBottom:6}}>⚠ 这些任务已经推了3次以上，考虑删掉？</div>
          {staleTasks.map(t=><div key={t.id} style={{fontSize:13,color:"#A32D2D",padding:"2px 0"}}>• {t.title}（推了{t.migrateCount}次）</div>)}
        </div>}
        {[["这个月完成了什么？（随便写，不用完整）",q1,setQ1],["哪些任务反复推迟？原因是什么？",q2,setQ2],["下个月最重要的一件事是什么？",q3,setQ3]].map(([q,v,set],i)=>(
          <div key={i}><div style={{fontSize:13,fontWeight:500,marginBottom:6,color:"#555"}}>{q}</div>
            <textarea value={v} onChange={e=>set(e.target.value)} rows={2} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,lineHeight:1.6}}/>
          </div>
        ))}
      </div>
      <div style={{padding:"12px 24px",borderTop:"0.5px solid #e0ddd6",display:"flex",justifyContent:"flex-end"}}>

          <button onClick={save} style={{padding:"8px 20px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>保存回顾</button>}
      </div>
    </div>
  </div>;
}

// ══════════════════════════════════════════
// §FUTURELOG  未来清单 FutureLog
// ══════════════════════════════════════════
function FutureLog({futureLog,onUpdate,onMoveToTasks}){
  const [input,setInput]=useState("");
  const [selMonth,setSelMonth]=useState(()=>{const d=new Date();return monthKey(d.getFullYear(),d.getMonth()+1);});
  const today=new Date();
  const months=Array.from({length:6},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()+1+i,1);return{key:monthKey(d.getFullYear(),d.getMonth()),label:`${d.getFullYear()}年${MONTHS[d.getMonth()]}`,y:d.getFullYear(),m:d.getMonth()};});
  function addItem(){
    if(!input.trim())return;
    const items=[...(futureLog[selMonth]||[]),{id:Date.now(),text:input.trim()}];
    onUpdate({...futureLog,[selMonth]:items});setInput("");
  }
  function removeItem(mk,id){onUpdate({...futureLog,[mk]:(futureLog[mk]||[]).filter(i=>i.id!==id)});}
  function moveToTask(mk,item){onMoveToTasks(item.text,mk);removeItem(mk,item.id);}
  return<div>
    <div style={{fontSize:13,color:"#888",marginBottom:16}}>把"以后想做但不是现在"的事放在这里，清空大脑里的模糊焦虑池</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
      {months.map(({key,label})=>{
        const items=futureLog[key]||[];
        return<div key={key} style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,overflow:"hidden"}}>
          <div style={{padding:"10px 14px",borderBottom:"0.5px solid #f0ede8",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,fontWeight:500}}>{label}</span>
            <span style={{fontSize:11,color:"#aaa"}}>{items.length}件事</span>
          </div>
          <div style={{padding:"8px 12px",minHeight:60}}>
            {items.length===0&&<div style={{fontSize:12,color:"#ddd",padding:"8px 0",textAlign:"center"}}>空的，随时可以放东西进来</div>}
            {items.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"0.5px solid #f7f6f3"}}>
              <span style={{flex:1,fontSize:13,color:"#555"}}>{item.text}</span>
              <button onClick={()=>moveToTask(key,item)} title="移入任务列表" style={{fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",padding:"1px 4px"}}>→任务</button>
              <button onClick={()=>removeItem(key,item.id)} style={{color:"#ddd",background:"none",border:"none",cursor:"pointer",fontSize:13}}>✕</button>
            </div>)}
          </div>
        </div>;
      })}
    </div>
    <div style={{marginTop:16,display:"flex",gap:8}}>
      <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{padding:"7px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}>
        {months.map(({key,label})=><option key={key} value={key}>{label}</option>)}
      </select>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="有什么事以后想做…" style={{flex:1,padding:"7px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
      <button onClick={addItem} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>放进去</button>
    </div>
  </div>;
}

// ══════════════════════════════════════════
// §GANTT  甘特图 GanttView
// ══════════════════════════════════════════
function GanttView({tasks,onOpen}){
  const today=todayStr();
  const active=tasks.filter(t=>t.startDate&&t.due);
  if(!active.length)return<div style={{padding:"40px 0",textAlign:"center",color:"#aaa",fontSize:14}}>在任务详情里添加「开始日期」后会显示在这里</div>;
  const all=[...active.flatMap(t=>[t.startDate,t.due]),today];
  const minD=all.reduce((a,b)=>a<b?a:b);
  const maxD=all.reduce((a,b)=>a>b?a:b);
  const span=Math.max(daysBetween(minD,maxD)+1,14);
  const dates=Array.from({length:span},(_,i)=>addDays(minD,i));
  const COL=36,ROW=38,LEFT=180;
  return<div style={{overflowX:"auto",paddingBottom:8}}>
    <div style={{minWidth:LEFT+span*COL}}>
      <div style={{display:"flex",position:"sticky",top:0,background:"#f7f6f3",zIndex:2,borderBottom:"0.5px solid #e0ddd6",paddingBottom:4}}>
        <div style={{width:LEFT,flexShrink:0,fontSize:12,color:"#aaa",padding:"6px 8px"}}>任务</div>
        {dates.map(d=>{const isT=d===today;const dom=new Date(d+"T00:00:00").getDate();const isMon=new Date(d+"T00:00:00").getDay()===1;return<div key={d} style={{width:COL,flexShrink:0,textAlign:"center",fontSize:10,color:isT?"#185FA5":isMon?"#555":"#bbb",fontWeight:isT?700:isMon?500:400,paddingTop:6}}>{isT?<span style={{background:"#185FA5",color:"#fff",borderRadius:10,padding:"1px 5px"}}>{dom}</span>:dom}</div>;})}
      </div>
      {active.map(t=>{
        const p=getProj(t.project);
        const s=daysBetween(minD,t.startDate);const e=daysBetween(minD,t.due);
        const w=Math.max(e-s+1,1)*COL;const x=s*COL;
        const pct=t.subtasks.length?Math.round(t.subtaskDone.filter(Boolean).length/t.subtasks.length*100):t.done?100:0;
        return<div key={t.id} style={{display:"flex",alignItems:"center",borderBottom:"0.5px solid #f0ede8",height:ROW,position:"relative"}}>
          <div style={{width:LEFT,flexShrink:0,padding:"0 8px",cursor:"pointer",overflow:"hidden"}} onClick={()=>onOpen(t)}>
            <div style={{fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:t.done?"#aaa":"#1a1a1a",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
            <div style={{fontSize:11,color:p.color}}>{p.name}</div>
          </div>
          {dates.map((d,i)=><div key={d} style={{position:"absolute",left:LEFT+i*COL,top:0,width:COL,height:"100%",background:d===today?"rgba(24,95,165,.05)":"transparent",borderRight:i%7===6?"0.5px solid #e0ddd6":"none"}}/>)}
          <div onClick={()=>onOpen(t)} style={{position:"absolute",left:LEFT+x,width:w,height:22,top:(ROW-22)/2,borderRadius:5,background:t.done?"#ddd":p.color,cursor:"pointer",overflow:"hidden",display:"flex",alignItems:"center"}}>
            {pct>0&&!t.done&&<div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,.3)",borderRadius:"5px 0 0 5px"}}/>}
            {w>60&&<span style={{position:"absolute",left:8,fontSize:11,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",maxWidth:w-16}}>{t.title}</span>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function CalendarView({tasks,onAddTask,journal,onJournalUpdate}){

  function getDayEntries(d){return journal[d]||[];}
  function saveJ(j){onJournalUpdate(j);}
  function addEntry(){
    if(!newEntry.trim())return;
    const entry={id:Date.now(),sym:newType,text:newEntry.trim(),done:false};
    saveJ({...journal,[selDay]:[...getDayEntries(selDay),entry]});
    if(newType==="•")onAddTask({title:newEntry.trim(),project:1,due:selDay,priority:"normal",fromJournal:true});
    setNewEntry("");
  }

  const lastDay=new Date(curMonth.y,curMonth.m+1,0);

        </div>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 8px 8px",gap:2}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={`e${i}`}/>;
            const ds=yyyymmdd(d);const isT=ds===today;const isSel=ds===selDay;const has=hasDot(d);
            return<div key={ds} onClick={()=>setSelDay(ds)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:8,cursor:"pointer",position:"relative",background:isSel?"#1a1a1a":isT?"#EBF3FB":"transparent",color:isSel?"#fff":isT?"#185FA5":"#1a1a1a",fontWeight:isT||isSel?600:400,fontSize:13}}>
              {d.getDate()}
              {has&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,.6)":isT?"#185FA5":"#bbb",position:"absolute",bottom:3}}/>}
            </div>;

// ── Markdown Renderer ──
// ══════════════════════════════════════════
// §MD_UTILS  Markdown渲染工具函数
// ══════════════════════════════════════════
function renderMarkdown(text){
  if(!text)return null;
  const lines=text.split("\n");
  const elements=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Blank line
    if(!line.trim()){elements.push(React.createElement("div",{key:i,style:{height:6}}));i++;continue;}
    // HR
    if(/^---+$/.test(line.trim())){elements.push(React.createElement("hr",{key:i,style:{border:"none",borderTop:"0.5px solid #e0ddd6",margin:"8px 0"}}));i++;continue;}
    // H1/H2/H3
    const h3=line.match(/^###\s+(.*)/);
    const h2=line.match(/^##\s+(.*)/);
    const h1=line.match(/^#\s+(.*)/);
    if(h1||h2||h3){
      const txt=(h1||h2||h3)[1];
      const sz=h1?15:h2?14:13;
      elements.push(React.createElement("div",{key:i,style:{fontSize:sz,fontWeight:600,margin:"10px 0 4px",color:"#1a1a1a"}},inlineMarkdown(txt)));
      i++;continue;
    }
    // Bullet list (*, -, •)
    if(/^[\s]*[*\-•]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^[\s]*[*\-•]\s/.test(lines[i])){
        const indent=(lines[i].match(/^(\s*)/)||["",""])[1].length;
        const txt=lines[i].replace(/^[\s]*[*\-•]\s/,"");
        items.push(React.createElement("div",{key:i,style:{display:"flex",gap:6,paddingLeft:indent>0?16:0,marginBottom:2}},
          React.createElement("span",{style:{color:"#888",flexShrink:0,marginTop:1}},"·"),
          React.createElement("span",{style:{flex:1}},inlineMarkdown(txt))
        ));
        i++;
      }
      elements.push(React.createElement("div",{key:"ul"+i,style:{fontSize:13,lineHeight:1.6,color:"#1a1a1a",marginBottom:4}},items));
      continue;
    }
    // Numbered list
    if(/^[\s]*\d+[.)]\s/.test(line)){
      const items=[];
      let num=1;
      while(i<lines.length&&/^[\s]*\d+[.)]\s/.test(lines[i])){
        const txt=lines[i].replace(/^[\s]*\d+[.)]\s/,"");
        items.push(React.createElement("div",{key:i,style:{display:"flex",gap:8,marginBottom:2}},
          React.createElement("span",{style:{color:"#888",flexShrink:0,minWidth:16,textAlign:"right"}},(num++)+"."),
          React.createElement("span",{style:{flex:1}},inlineMarkdown(txt))
        ));
        i++;
      }
      elements.push(React.createElement("div",{key:"ol"+i,style:{fontSize:13,lineHeight:1.6,color:"#1a1a1a",marginBottom:4}},items));
      continue;
    }
    // Normal paragraph
    elements.push(React.createElement("div",{key:i,style:{fontSize:13,lineHeight:1.7,color:"#1a1a1a",marginBottom:3}},inlineMarkdown(line)));
    i++;
  }
  return elements;
}

function inlineMarkdown(text){
  // Parse **bold**, *italic*, `code` inline
  const parts=[];
  const re=/(\*\*([^*]+)\*\*|\*([^*]+)\*|`([^`]+)`)/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    if(m[2])parts.push(React.createElement("strong",{key:m.index,style:{fontWeight:600}},m[2]));
    else if(m[3])parts.push(React.createElement("em",{key:m.index,style:{fontStyle:"italic"}},m[3]));
    else if(m[4])parts.push(React.createElement("code",{key:m.index,style:{fontFamily:"monospace",background:"#f0ede8",padding:"1px 4px",borderRadius:3,fontSize:12}},m[4]));
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return parts.length===1&&typeof parts[0]==="string"?parts[0]:parts;
}

// ── External plan importer ──
// Parses Claude-generated HTML plans (day-card format) or JSON into task arrays
function parseExternalPlan(content){
  // Try JSON first
  try{
    const clean=content.replace(/```json|```/g,"").trim();
    const data=JSON.parse(clean);
    if(Array.isArray(data))return data.map(t=>({
      title:t.title||t.name||"未命名任务",
      priority:t.priority||"normal",
      due:t.due||t.deadline||"",
      estimate:String(t.estimate||t.minutes||t.mins||""),
      notes:t.notes||t.desc||t.description||"",
      subtasks:Array.isArray(t.subtasks)?t.subtasks:Array.isArray(t.steps)?t.steps:[],
      subtaskDone:Array.isArray(t.subtasks)?t.subtasks.map(()=>false):Array.isArray(t.steps)?t.steps.map(()=>false):[],
      project:t.project||2,
    }));
  }catch(e){}

  // Try Claude HTML plan format (day-card structure)
  const tasks=[];
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(content,"text/html");
    const dayCards=doc.querySelectorAll(".day-card");
    if(dayCards.length>0){
      dayCards.forEach((card,i)=>{
        const titleEl=card.querySelector(".day-title");
        const subEl=card.querySelector(".day-sub");
        const badgeEl=card.querySelector(".badge");
        const taskEls=card.querySelectorAll(".tasks li");
        const hwEls=card.querySelectorAll(".hw-tasks li");
        const timeLabelEl=card.querySelector(".time-label");

        const title=(titleEl?.textContent||"Day "+(i+1)).trim();
        const sub=(subEl?.textContent||"").trim();
        const badge=(badgeEl?.textContent||"").trim();
        // Parse estimate from badge like "2h" "2.5h" "3h"
        const estMatch=badge.match(/([\d.]+)h/);
        const estMins=estMatch?Math.round(parseFloat(estMatch[1])*60):"";

        // Reading key points → notes
        const points=Array.from(taskEls).map(el=>el.textContent.trim()).filter(Boolean);
        // Homework tasks → subtasks
        const hw=Array.from(hwEls).map(el=>el.textContent.replace(/^\d+/,"").trim()).filter(Boolean);

        tasks.push({
          title:"Day "+(i+1)+" "+title,
          priority:i===0?"urgent":i<2?"today":"normal",
          due:"",
          estimate:estMins?String(estMins):"",
          notes:points.length?"📖 "+sub+"\n\n阅读重点：\n"+points.map(p=>"• "+p).join("\n"):"",
          subtasks:hw,
          subtaskDone:hw.map(()=>false),
          project:2,
        });
      });
      if(tasks.length>0)return tasks;
    }
  }catch(e){}

  // Fallback: line-by-line heuristic (markdown / plain text)
  const lines=content.split("\n").filter(l=>l.trim());
  const dayBlocks=[];
  let cur=null;
  for(const line of lines){
    const dayMatch=line.match(/^(Day\s*\d+|第\s*[\d一二三四五六七八九十]+\s*[天日])[：:\s—–-]*(.*)/i);
    if(dayMatch){
      if(cur)dayBlocks.push(cur);
      cur={title:dayMatch[0].replace(/^[\*#\s]+/,"").trim(),bullets:[],hw:[]};
    } else if(cur){
      const hw=/作业|homework|练习|output|产出/i.test(line);
      if(/^[\s]*[-•*]\s/.test(line)){
        const text=line.replace(/^[\s]*[-•*]\s/,"").trim();
        hw?cur.hw.push(text):cur.bullets.push(text);
      }
    }
  }
  if(cur)dayBlocks.push(cur);
  if(dayBlocks.length>0){
    return dayBlocks.map((b,i)=>({
      title:b.title,
      priority:i===0?"urgent":i<2?"today":"normal",
      due:"",estimate:"",
      notes:b.bullets.length?"阅读重点：\n"+b.bullets.map(p=>"• "+p).join("\n"):"",
      subtasks:b.hw,subtaskDone:b.hw.map(()=>false),
      project:2,
    }));
  }
  return[];
}

  function handleFile(e){
    Array.from(e.target.files).forEach(file=>{
      if(!file.type.startsWith("image/"))return;
      const r=new FileReader();
      r.onload=ev=>{
        const b64=ev.target.result.split(",")[1];
        setPendingImgs(imgs=>[...imgs,{preview:ev.target.result,data:b64,type:file.type,name:file.name}]);
      };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }

  async function callGemini(key,contents){
    const models=["gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];
    for(const model of models){
      try{
        const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({contents}),
        });
        const data=await res.json();
        if(data.error){
          if(data.error.code===404||data.error.status==="NOT_FOUND")continue;
          throw new Error(data.error.message);
        }
        return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }catch(e){
        if(e.message?.includes("NOT_FOUND")||e.message?.includes("not found"))continue;
        throw e;
      }
    }
    throw new Error("所有模型不可用，请检查Key权限或访问 aistudio.google.com 重新获取");
  }

  function hasTaskContent(text){
    if(!text)return false;
    const lines=text.split("\n");
    const taskLines=lines.filter(l=>
      /^[\s]*[•\-\*\d]+[.)\s]/.test(l.trim())||
      /Day\s*\d+/i.test(l)||
      /第[\d一二三四五六七八九十]+[天周步]/.test(l)||
      /^#{1,3}\s/.test(l)
    );
    return taskLines.length>=2;
  }

  async function extractTasks(msgIndex,text){
    if(!apiKey)return;
    setExtracting(msgIndex);
    const prompt="从以下学习计划中提取任务，返回JSON数组。\n"
      +"每个任务对应一天或一个阶段，格式严格如下：\n"
      +"{\"title\":\"Day 1 标题\",\"priority\":\"urgent|today|normal\",\"due\":\"\","
      +"\"estimate\":\"分钟数字符串，如 120 代表2小时\","
      +"\"notes\":\"当天的阅读重点/学习要点，每条用•开头\","
      +"\"subtasks\":[\"作业1完整描述\",\"作业2完整描述\"]}\n\n"
      +"规则：\n"
      +"1. estimate：从时间标记提取，1h=60，2h=120，2.5h=150，只填数字字符串\n"
      +"2. notes：填该天的阅读重点/学习要点，不是作业\n"
      +"3. subtasks：只填作业/练习/每日产出的内容，每条保留完整描述\n"
      +"4. 第1天priority=urgent，第2-3天today，其余normal\n"
      +"5. 只返回JSON数组，不要其他文字\n\n"
      +"内容：\n"+text;
    try{
      const reply=await callGemini(apiKey,[{parts:[{text:prompt}]}]);
      const clean=reply.replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g,"").trim();
      const parsed=JSON.parse(clean);
      if(Array.isArray(parsed)&&parsed.length>0){
        // 自动选 active 课程
        const defCourse=(courses||[]).find(c=>c.active&&!c.archived)||null;
        setTaskPreview({
          msgIndex,
          tasks:parsed.map(t=>({
            title:t.title||"",
            priority:t.priority||"normal",
            due:t.due||"",
            estimate:String(t.estimate||""),
            notes:t.notes||"",
            project:2,
            subtasks:Array.isArray(t.subtasks)?t.subtasks:[],
            subtaskDone:Array.isArray(t.subtasks)?t.subtasks.map(()=>false):[],
          })),
          selected:parsed.map(()=>true),
          targetCourseId:defCourse?defCourse.id:""
        });
      }
    }catch(e){console.error("Extract failed:",e);}
    setExtracting(null);
  }

  function confirmAddTasks(){
    if(!taskPreview)return;
    const toAdd=taskPreview.tasks.filter((_,i)=>taskPreview.selected[i]);
    // ── 同步到指定课程 ──
    if(courses&&onUpdateCourse&&taskPreview.targetCourseId){
      const targetCourse=courses.find(c=>String(c.id)===String(taskPreview.targetCourseId));
      if(targetCourse){
        const learningTasks=toAdd.filter(t=>t.project===2||t.project==="2");
        if(learningTasks.length>0)syncTasksToCourse(targetCourse,learningTasks);
      }
    }
    // 给每个 task 加 nextId（addTask 内部会分配，这里提前记录 courseId）
    toAdd.forEach(t=>onAddTask(t));
    setTaskPreview(null);
    // 生成任务记录快照，保留在对话历史里
    const courseNote=taskPreview.targetCourseId&&courses
      ?"→ 已同步到课程："+(courses.find(c=>String(c.id)===String(taskPreview.targetCourseId))?.title||"")
      :"";
    const taskList=toAdd.map((t,i)=>{
      const subs=(t.subtasks||[]).length?"\n"+t.subtasks.map(s=>"    • "+s).join("\n"):"";
      const est=t.estimate?" ("+Math.round(t.estimate/60*10)/10+"h)":"";
      return(i+1)+". "+t.title+est+subs;
    }).join("\n");

  // 把一批学习任务同步到课程的章节列表
  function syncTasksToCourse(course,taskList){
    // 已有的 taskId 列表，避免重复
    const existingTaskIds=new Set((course.episodes||[]).map(e=>e.taskId).filter(Boolean));
    const newEps=taskList
      .filter(t=>!existingTaskIds.has("pending_"+t.title)) // 用 title 作临时 key（id 未分配）
      .map((t,i)=>({
        ...BLANK_EPISODE,
        id:Date.now()+i,
        title:t.title,
        status:"todo",
        duration:t.estimate||"",
        taskTitle:t.title, // 用 title 做反向索引，等 addTask 分配 id 后由 syncEpisodeTaskIds 补全
        pushedToBoard:true, // 已在任务板
      }));
    if(newEps.length>0){
      const updated={...course,episodes:[...(course.episodes||[]),...newEps]};
      onUpdateCourse(updated);
    }
  }

  async function doSend(text,btid,imgOverride){
    const imgs=imgOverride!==undefined?imgOverride:pendingImgs;
    if(!text?.trim()&&!imgs.length||loading)return;
    if(!apiKey){setShowKey(true);return;}
    const msg=(text||"").trim();
    setInput("");setPendingImgs([]);
    // 先把用户消息加到界面
    setMsgs(m=>[...m,{role:"user",text:msg,images:imgs.map(p=>p.preview)}]);
    setLoading(true);

    const ctx=tasks.filter(t=>!t.done).slice(0,20).map(t=>"- "+t.title+"（"+getProj(t.project).name+"，"+t.priority+"）").join("\n");
    const sysText="你是一个思考深入的学习规划师和效率助手。\n\n"+
      "用户当前任务（仅供参考）：\n"+ctx+"\n\n"+
      "回答原则：\n"+
      "- 真正分析内容，不要逐条复述原文\n"+
      "- 做学习规划时：按天/阶段组织，说明每天的学习重点和逻辑\n"+
      "- 任务拆解时：以天或阶段为单位，把具体内容作为子步骤\n"+
      "- 给出真实的判断和建议\n"+
      "- 直接回答，不用开场白";

    // ── 构建多轮上下文 ──
    // 取当前对话的历史消息（最多 20 条，避免 token 过多）
    const histMsgs=(activeConv?.msgs||[]).slice(-20);
    const contents=[];

    // 第一条作为带 system prompt 的 user 消息
    let firstUserDone=false;
    for(const m of histMsgs){
      if(m.role==="ai"||m.role==="model"){
        contents.push({role:"model",parts:[{text:m.text||""}]});
      } else {
        // user 消息
        const parts=[];
        if(!firstUserDone){
          // 第一条 user 消息带 system prompt
          parts.push({text:sysText+"\n\n"+m.text});
          firstUserDone=true;
        } else {
          parts.push({text:m.text||""});
        }
        // 恢复该消息的图片（base64 preview）
        (m.images||[]).forEach(img=>{
          if(img&&img.startsWith("data:")){
            const mime=img.split(";")[0].split(":")[1]||"image/jpeg";
            const data=img.split(",")[1]||"";
            if(data)parts.push({inline_data:{mime_type:mime,data}});
          }
        });
        contents.push({role:"user",parts});
      }
    }

    // 当前这条新消息（还未存入 activeConv，手动加）
    const newParts=[];
    if(!firstUserDone){
      newParts.push({text:sysText+"\n\n"+msg});
    } else {
      newParts.push({text:msg});
    }
    // 带上当前新上传的图片
    imgs.forEach(p=>newParts.push({inline_data:{mime_type:p.type,data:p.data}}));
    contents.push({role:"user",parts:newParts});

    try{
      const reply=await callGemini(apiKey,contents);
      setMsgs(m=>[...m,{role:"ai",text:reply,images:[]}]);
      if(btid){
        const steps=reply.split("\n").filter(l=>l.trim().startsWith("•")).map(l=>l.replace(/^•\s*/,"").trim()).filter(Boolean);
        if(steps.length)onSubtasksAdded(btid,steps);
      }
    }catch(e){
      setMsgs(m=>[...m,{role:"ai",text:"错误："+e.message,images:[]}]);
    }
    setLoading(false);
  }

  useEffect(()=>{if(msgRef.current)msgRef.current.scrollTop=9999;},[msgs]);
  useEffect(()=>{
    if(sendRef)sendRef.current=(task)=>doSend("帮我把这个任务拆解成具体可执行的步骤："+task.title,task.id,[]);
  });

  if(!open)return null;

  // ── History sidebar panel ──
  if(showHistory) return(
    <div style={{position:"fixed",right:0,top:0,height:"100%",width:"min(580px,100vw)",background:"#fff",borderLeft:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",zIndex:100,boxShadow:"-4px 0 24px rgba(0,0,0,.1)"}}>
      <div style={{padding:"14px 16px",borderBottom:"0.5px solid #e0ddd6",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={()=>setShowHistory(false)} style={{fontSize:13,color:"#666",background:"none",border:"none",cursor:"pointer"}}>← 返回</button>
        <span style={{fontSize:14,fontWeight:500,flex:1}}>历史对话</span>
        <button onClick={newConv} style={{fontSize:12,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer"}}>+ 新对话</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        {history.length===0&&<div style={{fontSize:13,color:"#bbb",textAlign:"center",padding:"40px 0"}}>还没有历史对话</div>}
        {allGroups.map(g=>(
          <div key={g} style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,padding:"0 4px"}}>{g}</div>
            {history.filter(c=>c.group===g).map(c=>(
              <ConvItem key={c.id} conv={c} active={activeConvId===c.id} onSelect={()=>{setActiveConvId(c.id);setShowHistory(false);}}

          <div>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6,padding:"0 4px"}}>未分组</div>
            {history.filter(c=>!c.group).map(c=>(
              <ConvItem key={c.id} conv={c} active={activeConvId===c.id} onSelect={()=>{setActiveConvId(c.id);setShowHistory(false);}}

        <button onClick={()=>setShowImport(true)} title="导入外部计划" style={{fontSize:11,border:"0.5px solid #ccc",background:"#f7f6f3",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:"#555"}}>📥 导入计划</button>
        <button onClick={()=>setShowHistory(true)} style={{fontSize:11,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",color:"#666"}}>🗂 历史{history.length>0?" ("+history.length+")":""}</button>

        <button onClick={onClose} style={{fontSize:12,border:"0.5px solid #ccc",background:"none",borderRadius:5,padding:"4px 9px",cursor:"pointer"}}>✕</button>

      {/* Conv name bar */}
      {activeConv&&(

            <button onClick={()=>setTaskPreview(null)} style={{fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>取消</button>
            <button onClick={confirmAddTasks} disabled={!taskPreview.selected.some(Boolean)} style={{fontSize:12,fontWeight:500,color:"#fff",background:"#185FA5",border:"none",borderRadius:6,padding:"6px 14px",cursor:"pointer"}}>

        {msgs.map((m,i)=>(

              <div style={{background:m.role==="ai"?"#f7f6f3":"transparent",borderRadius:8,overflow:"hidden"}}>
                <div style={{fontSize:13,lineHeight:1.65,padding:m.role==="ai"?"10px 12px":"0",color:m.role==="ai"?"#1a1a1a":"#555",textAlign:m.role==="user"?"right":"left",fontStyle:m.role==="user"?"italic":"normal"}}>
                  {m.role==="ai"?renderMarkdown(m.text):m.text}
                </div>
                {m.role==="ai"&&hasTaskContent(m.text)&&taskPreview?.msgIndex!==i&&(
                  <div style={{padding:"6px 12px 10px",borderTop:"0.5px solid #e8e5e0"}}>
                    <button onClick={()=>extractTasks(i,m.text)} disabled={extracting===i}

                      {extracting===i?"⏳ 提取中…":"📋 提取为任务（含时长+重点+作业）"}
                    </button>
                  </div>
                )}
                {m.role==="ai"&&taskPreview?.msgIndex===i&&(
                  <div style={{padding:"10px 12px",borderTop:"0.5px solid #e8e5e0"}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1a1a1a",marginBottom:8}}>选择要加入的任务：</div>
                    <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:240,overflowY:"auto",marginBottom:10}}>
                      {taskPreview.tasks.map((t,ti)=>(
                        <label key={ti} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 6px",borderRadius:5,background:taskPreview.selected[ti]?"#f0f7ff":"#fafafa",cursor:"pointer"}}>
                          <input type="checkbox" checked={taskPreview.selected[ti]} onChange={()=>setTaskPreview(p=>({...p,selected:p.selected.map((s,j)=>j===ti?!s:s)}))} style={{marginTop:2,flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,color:"#1a1a1a",lineHeight:1.4,fontWeight:500}}>{t.title}</div>
                            {t.estimate&&<div style={{fontSize:11,color:"#854F0B",marginTop:1}}>⏱ {t.estimate}分钟</div>}
                            {t.notes&&<div style={{fontSize:11,color:"#0F6E56",marginTop:1}}>📝 有学习重点</div>}
                            {t.subtasks&&t.subtasks.length>0&&(
                              <div style={{fontSize:11,color:"#666",marginTop:2,lineHeight:1.5}}>
                                {t.subtasks.slice(0,2).map((s,si)=>(
                                  <div key={si} style={{paddingLeft:8}}>· {s.length>40?s.slice(0,40)+"…":s}</div>
                                ))}
                                {t.subtasks.length>2&&<div style={{paddingLeft:8,color:"#aaa"}}>+{t.subtasks.length-2}个作业</div>}
                              </div>
                            )}
                          </div>
                        </label>
                      ))}
                    </div>
                    {courses&&courses.filter(c=>!c.archived).length>0&&(
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,padding:"6px 8px",background:"#f7f6f3",borderRadius:6}}>
                        <span style={{fontSize:11,color:"#555",whiteSpace:"nowrap"}}>同步到课程：</span>
                        <select value={taskPreview.targetCourseId||""} onChange={e=>setTaskPreview(p=>({...p,targetCourseId:e.target.value}))}
                          style={{flex:1,fontSize:12,padding:"3px 6px",border:"0.5px solid #ccc",borderRadius:5}}>
                          <option value="">不同步</option>
                          {courses.filter(c=>!c.archived).map(c=><option key={c.id} value={c.id}>{c.title}</option>)}
                        </select>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#aaa",flex:1}}>{taskPreview.selected.filter(Boolean).length}/{taskPreview.tasks.length} 已选</span>
                      <button onClick={()=>setTaskPreview(null)} style={{fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>取消</button>
                      <button onClick={confirmAddTasks} disabled={!taskPreview.selected.some(Boolean)}
                        style={{fontSize:12,fontWeight:500,color:"#fff",background:"#1a1a1a",border:"none",borderRadius:6,padding:"6px 14px",cursor:"pointer"}}>
                        加入专注板 ({taskPreview.selected.filter(Boolean).length})
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
        {loading&&<div style={{fontSize:13,color:"#aaa",fontStyle:"italic"}} className="pulse">思考中…</div>}
      </div>

      {pendingImgs.length>0&&(
        <div style={{padding:"8px 12px",borderTop:"0.5px solid #f0ede8",display:"flex",gap:8,flexWrap:"wrap",flexShrink:0,background:"#fafafa"}}>
          {pendingImgs.map((img,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={img.preview} style={{width:56,height:56,borderRadius:6,objectFit:"cover"}}/>
              <button onClick={()=>setPendingImgs(imgs=>imgs.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,width:18,height:18,borderRadius:"50%",background:"#A32D2D",color:"#fff",border:"none",cursor:"pointer",fontSize:11,lineHeight:"18px",padding:0,textAlign:"center"}}>✕</button>
            </div>
          ))}
        </div>
      )}

      <div style={{padding:"10px 12px",borderTop:"0.5px solid #e0ddd6",display:"flex",flexDirection:"column",gap:8,flexShrink:0,background:"#fff"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(input.trim()||pendingImgs.length)doSend(input);}}}
          placeholder="输入消息… (Enter发送，Shift+Enter换行)"
          rows={2}
          style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,resize:"none",lineHeight:1.5,fontFamily:"inherit",outline:"none"}}
        />
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>fileRef.current.click()} style={{padding:"6px 12px",border:"0.5px solid #ccc",background:"#f7f6f3",borderRadius:6,fontSize:12,cursor:"pointer",color:"#555",flexShrink:0}}>📎 图片</button>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleFile}/>
          <span style={{flex:1,fontSize:11,color:"#ccc"}}>支持截图分析</span>
          <button onClick={()=>doSend(input)} disabled={loading||(!input.trim()&&!pendingImgs.length)}
            style={{padding:"7px 22px",background:loading?"#ccc":"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:loading?"default":"pointer",fontWeight:500,flexShrink:0}}>发送</button>
        </div>
      </div>
    </div>
  );
}

// ── ConvItem: history list item ──
function ConvItem({conv,active,onSelect,onDelete,onRename,onSetGroup,allGroups}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(conv.name);
  const [showGroup,setShowGroup]=useState(false);
  const [newGrp,setNewGrp]=useState("");
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 8px",borderRadius:7,marginBottom:3,background:active?"#EBF3FB":"transparent",cursor:"pointer"}} onClick={onSelect}>
      {editing?(
        <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
          onBlur={()=>{onRename(val);setEditing(false);}}
          onKeyDown={e=>{if(e.key==="Enter"){onRename(val);setEditing(false);}}}
          onClick={e=>e.stopPropagation()}
          style={{flex:1,fontSize:12,padding:"2px 6px",border:"0.5px solid #ccc",borderRadius:4,outline:"none"}}/>
      ):(
        <span style={{flex:1,fontSize:13,color:active?"#185FA5":"#333",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{conv.name}</span>
      )}
      <span style={{fontSize:10,color:"#bbb",flexShrink:0}}>{conv.createdAt}</span>
      <button onClick={e=>{e.stopPropagation();setEditing(true);setVal(conv.name);}} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",flexShrink:0}}>✏</button>
      <button onClick={e=>{e.stopPropagation();setShowGroup(v=>!v);}} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",flexShrink:0}}>🗂</button>
      <button onClick={e=>{e.stopPropagation();if(confirm("删除这条对话记录？"))onDelete();}} style={{fontSize:11,color:"#bbb",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",flexShrink:0}}>✕</button>
      {showGroup&&(
        <div style={{position:"absolute",right:60,background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:8,padding:"8px 10px",boxShadow:"0 4px 16px rgba(0,0,0,.1)",zIndex:200,minWidth:160}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>移动到分组</div>
          {allGroups.map(g=><div key={g} onClick={()=>{onSetGroup(g);setShowGroup(false);}} style={{fontSize:12,padding:"4px 8px",borderRadius:4,cursor:"pointer",color:"#333"}}>{g}</div>)}
          <div style={{display:"flex",gap:4,marginTop:6}}>
            <input value={newGrp} onChange={e=>setNewGrp(e.target.value)} placeholder="新建分组名" style={{flex:1,fontSize:11,padding:"3px 6px",border:"0.5px solid #ccc",borderRadius:4}}/>
            <button onClick={()=>{if(newGrp.trim()){onSetGroup(newGrp.trim());setShowGroup(false);}}} style={{fontSize:11,padding:"3px 8px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>＋</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Import Plan Modal ──
// ══════════════════════════════════════════
// §IMPORT  导入计划 ImportPlanModal
// ══════════════════════════════════════════
function ImportPlanModal({onClose,onImport}){
  const [tab,setTab]=useState("paste"); // paste | file | format
  const [text,setText]=useState("");
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState("");
  const fileRef=useRef();

  function tryParse(content){
    setErr("");
    const result=parseExternalPlan(content);
    if(result.length>0){setParsed(result);}
    else{setErr("无法识别格式，请查看「格式说明」或手动粘贴JSON");}
  }
  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setText(ev.target.result);tryParse(ev.target.result);};
    r.readAsText(f,"utf-8");
  }

  const FORMAT_SPEC=`// 专注板通用导入格式（JSON数组）
[
  {
    "title": "Day 1 传统与光源",
    "priority": "urgent",
    "due": "2026-06-10",
    "estimate": "120",      // 分钟，字符串
    "notes": "• 阅读重点1\n• 阅读重点2",
    "subtasks": [           // 每日作业，每条完整描述
      "作业1：画一个球体标注五个调子",
      "作业2：找一幅大师画分析光源"
    ],
    "project": 2            // 1=工作 2=个人成长 3=健康
  }
]

// 让Claude生成此格式的提示词示例：
// "帮我生成《Color and Light》5天阅读计划，
//  以JSON数组返回，每天包含：
//  title/priority/estimate（分钟）/notes（阅读重点）/subtasks（作业列表）"`;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
        <div style={{padding:"16px 20px 12px",borderBottom:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:600}}>📥 导入外部计划</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>把Claude/GPT生成的学习计划直接导入专注板</div>
          </div>
          <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>

        <div style={{display:"flex",gap:0,borderBottom:"0.5px solid #e0ddd6",flexShrink:0}}>
          {[["paste","粘贴内容"],["file","上传文件"],["format","格式说明"]].map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 16px",fontSize:13,background:"none",border:"none",cursor:"pointer",color:tab===id?"#1a1a1a":"#888",borderBottom:tab===id?"2px solid #1a1a1a":"2px solid transparent",fontWeight:tab===id?500:400}}>{l}</button>
          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          {tab==="paste"&&(
            <div>
              <div style={{fontSize:12,color:"#555",marginBottom:6}}>支持格式：JSON数组、Claude生成的HTML计划、Markdown日程</div>
              <textarea value={text} onChange={e=>setText(e.target.value)} rows={10}
                placeholder={'粘贴JSON数组、HTML计划或Markdown文本… / 例如让Claude生成：帮我制定3天Python学习计划，返回JSON格式，包含每天的标题、时长、学习重点和作业'}
                style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:12,lineHeight:1.7,fontFamily:"monospace"}}/>
              {err&&<div style={{fontSize:12,color:"#A32D2D",marginTop:6}}>{err}</div>}
              {parsed&&(
                <div style={{marginTop:10,background:"#E1F5EE",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontSize:12,color:"#0F6E56",fontWeight:500,marginBottom:4}}>✓ 解析成功：{parsed.length} 个任务</div>
                  {parsed.slice(0,3).map((t,i)=>(
                    <div key={i} style={{fontSize:12,color:"#333",padding:"3px 0"}}>

                <strong>快速提示词：</strong><br/>
                "帮我制定[X天][课程名]学习计划，以JSON数组返回，每天包含：title（Day N 标题）、priority、estimate（分钟数字符串）、notes（学习重点，•开头多行）、subtasks（作业列表数组）、project（数字2）"
              </div>
            </div>
          )}
        </div>

        <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",gap:8}}>
          <button onClick={onClose} style={{padding:"8px 16px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={()=>{if(parsed)onImport(parsed);}} disabled={!parsed}
            style={{flex:1,padding:"10px",background:parsed?"#0F6E56":"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:parsed?"pointer":"default"}}>
            ✓ 导入 {parsed?"("+parsed.length+"个任务)":""}
          </button>
        </div>
      </div>
    </div>
  );
}
