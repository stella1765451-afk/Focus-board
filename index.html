// BLOCK BREAKER: 严苛节点拆解 + 每日打卡
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §BLOCKBREAKER  节点拆解 BlockBreaker
// ══════════════════════════════════════════
function BlockBreaker({tasks,onAddTask,onUpdateTask,geminiKey,onClose}){
  const [step,setStep]=useState("select"); // select | config | breaking | done
  const [selTask,setSelTask]=useState(null);
  const [deadline,setDeadline]=useState("");
  const [dailyMins,setDailyMins]=useState("60");
  const [outputType,setOutputType]=useState("截图");
  const [loading,setLoading]=useState(false);
  const [blocks,setBlocks]=useState([]); // [{day, title, microtask, output, done}]
  const [editIdx,setEditIdx]=useState(null);

  const bigTasks=tasks.filter(t=>!t.done&&(t.subtasks.length>0||t.estimate>="60"||t.priority==="urgent"));
  const allTasks=tasks.filter(t=>!t.done);

  async function breakTask(){
    if(!selTask||!deadline)return;
    setLoading(true);setStep("breaking");
    const daysLeft=Math.max(daysBetween(todayStr(),deadline),1);
    const prompt="你是一个严格的ADHD效率教练。将以下任务拆解成每日微任务节点。\n\n"
      +"任务："+selTask.title+"\n"
      +(selTask.notes?"背景："+selTask.notes+"\n":"")
      +"截止日期："+deadline+"（还剩"+daysLeft+"天）\n"
      +"每天可用时间："+dailyMins+"分钟\n"
      +"要求产出格式："+outputType+"\n\n"
      +"拆解原则（严格执行）：\n"
      +"1. 第1天必须是'跑通最粗糙的全流程骨架'，哪怕极其简陋，要能看到完整框架\n"
      +"2. 每一天只能做一件事，粒度要细到当天坐下来就知道怎么开始\n"
      +"3. 每天必须有一个具体可上传/截图/展示的产出物\n"
      +"4. 优先跑通全流程，再从第3天起逐步细化局部\n"
      +"5. 最后1天是'收尾+验收'，不加新内容\n\n"
      +"返回JSON数组，每项格式：\n"
      +"{\"day\":1,\"title\":\"Day 1 标题（10字内）\",\"microtask\":\"今天具体做什么（20字内，动词开头）\",\"output\":\"今天必须产出什么（具体，如：一张截图/一个文件/一段代码）\",\"mins\":"+dailyMins+"}\n\n"
      +"只返回JSON数组，不要其他内容。节点数="+Math.min(daysLeft,14)+"个。";
    try{
      const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+geminiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const data=await res.json();
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"[]";
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setBlocks(parsed.map((b,i)=>({...b,id:Date.now()+i,done:false,checkIn:""})));
      setStep("done");
    }catch(e){
      alert("拆解失败："+e.message+"\n请检查Gemini Key");
      setStep("config");
    }
    setLoading(false);
  }

  function addBlocksToTasks(){
    const baseDate=todayStr();
    blocks.forEach((b,i)=>{
      const due=addDays(baseDate,i);
      onAddTask({
        title:"[Day "+b.day+"] "+b.title,
        project:selTask.project,
        priority:i===0?"urgent":i<3?"today":"normal",
        due,
        estimate:String(b.mins||parseInt(dailyMins)||60),
        notes:"📌 今日微任务："+b.microtask+"\n\n✅ 产出要求："+b.output,
        subtasks:[b.microtask,"上传/记录产出："+b.output],
        subtaskDone:[false,false],
      });
    });
    onClose();
  }

  const OUTPUT_TYPES=["截图","笔记文档","代码文件","草图/线稿","录屏","表格","思维导图","其他"];

  if(step==="select") return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
        <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:600}}>🔨 节点拆解</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>把大任务拆成每天只管跑通一个节点</div>
          </div>
          <button onClick={onClose} style={{fontSize:18,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          <div style={{fontSize:12,color:"#888",marginBottom:10}}>选择要拆解的任务：</div>
          {allTasks.length===0&&<div style={{fontSize:13,color:"#bbb",textAlign:"center",padding:"32px 0"}}>没有待办任务</div>}
          {allTasks.map(t=>(
            <div key={t.id} onClick={()=>setSelTask(t)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,marginBottom:6,cursor:"pointer",border:"1.5px solid "+(selTask?.id===t.id?"#185FA5":"#e0ddd6"),background:selTask?.id===t.id?"#EBF3FB":"#fff",transition:"all .15s"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:getProj(t.project).color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:selTask?.id===t.id?600:400}}>{t.title}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{getProj(t.project).name}{t.due&&" · 截止 "+fmtDate(t.due)}</div>
              </div>
              <Tag type={t.priority}/>
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6"}}>
          <button onClick={()=>{if(selTask)setStep("config");}} style={{width:"100%",padding:"11px",background:selTask?"#1a1a1a":"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:selTask?"pointer":"default",fontWeight:500}}>
            {selTask?"下一步：设置节奏 →":"先选一个任务"}
          </button>
        </div>
      </div>
    </div>
  );

  if(step==="config") return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:460,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
        <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
          <div style={{fontSize:15,fontWeight:600}}>设置拆解节奏</div>
          <div style={{fontSize:12,color:"#185FA5",marginTop:4,background:"#EBF3FB",padding:"4px 10px",borderRadius:6,display:"inline-block"}}>{selTask.title}</div>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>截止日期 <span style={{color:"#A32D2D"}}>*</span></div>
            <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} min={todayStr()}
              style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
            {deadline&&<div style={{fontSize:11,color:"#888",marginTop:4}}>还剩 {Math.max(daysBetween(todayStr(),deadline),0)} 天，生成 {Math.min(Math.max(daysBetween(todayStr(),deadline),1),14)} 个节点</div>}
          </div>
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>每天能投入多少分钟？</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["30","45","60","90","120"].map(m=>(
                <button key={m} onClick={()=>setDailyMins(m)} style={{padding:"6px 16px",borderRadius:20,border:"1.5px solid "+(dailyMins===m?"#185FA5":"#e0ddd6"),background:dailyMins===m?"#185FA5":"#fff",color:dailyMins===m?"#fff":"#555",fontSize:13,cursor:"pointer",transition:"all .15s"}}>{m}分钟</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>每天必须产出什么格式？</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {OUTPUT_TYPES.map(o=>(
                <button key={o} onClick={()=>setOutputType(o)} style={{padding:"5px 12px",borderRadius:20,border:"1.5px solid "+(outputType===o?"#0F6E56":"#e0ddd6"),background:outputType===o?"#0F6E56":"#fff",color:outputType===o?"#fff":"#555",fontSize:12,cursor:"pointer",transition:"all .15s"}}>{o}</button>
              ))}
            </div>
          </div>
          <div style={{background:"#FAEEDA",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#854F0B",lineHeight:1.6}}>
            💡 <strong>Blocking原则：</strong>第1天会强制要你跑通最粗糙的全流程骨架，哪怕极其简陋。先有全局，再细化局部。
          </div>
        </div>
        <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",gap:8}}>
          <button onClick={()=>setStep("select")} style={{padding:"8px 16px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>← 返回</button>
          <button onClick={breakTask} disabled={!deadline||!geminiKey} style={{flex:1,padding:"10px",background:deadline&&geminiKey?"#1a1a1a":"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:14,cursor:deadline&&geminiKey?"pointer":"default",fontWeight:500}}>
            {!geminiKey?"需要先设置AI Key":"🔨 AI拆解成每日节点"}
          </button>
        </div>
      </div>
    </div>
  );

  if(step==="breaking") return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#fff"}}>
        <div style={{fontSize:32,marginBottom:16}} className="pulse">🔨</div>
        <div style={{fontSize:16,fontWeight:500,marginBottom:8}}>正在拆解节点…</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.5)"}}>AI正在生成每日微任务</div>
      </div>
    </div>
  );

  // step === done: show blocks
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,boxShadow:"0 12px 48px rgba(0,0,0,.2)",marginBottom:40}} className="fade-in">
        <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
          <div style={{fontSize:15,fontWeight:600}}>✅ 节点拆解完成</div>
          <div style={{fontSize:12,color:"#185FA5",marginTop:4}}>{selTask.title} → {blocks.length}个每日节点</div>
        </div>
        <div style={{padding:"14px 20px",maxHeight:"55vh",overflowY:"auto"}}>
          {blocks.map((b,i)=>(
            <div key={b.id} style={{marginBottom:10,border:"0.5px solid "+(i===0?"#854F0B":"#e0ddd6"),borderRadius:10,overflow:"hidden",background:i===0?"#FFFBF2":"#fff"}}>
              <div style={{padding:"10px 14px",borderBottom:"0.5px solid "+(i===0?"#f0d8a8":"#f0ede8"),display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,fontWeight:700,color:i===0?"#854F0B":"#185FA5",background:i===0?"#FAEEDA":"#EBF3FB",padding:"2px 8px",borderRadius:10,flexShrink:0}}>
                  Day {b.day}{i===0?" 🏗 骨架优先":""}
                </span>
                <span style={{fontSize:13,fontWeight:500,flex:1}}>{b.title}</span>
                <span style={{fontSize:11,color:"#aaa"}}>{b.mins}分钟</span>
              </div>
              <div style={{padding:"8px 14px",display:"flex",flexDirection:"column",gap:4}}>
                <div style={{fontSize:12,color:"#333"}}>
                  <span style={{color:"#0F6E56",fontWeight:600}}>📌 今天做：</span> {b.microtask}
                </div>
                <div style={{fontSize:12,color:"#185FA5"}}>
                  <span style={{fontWeight:600}}>📤 产出：</span> {b.output}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",background:"#f7f6f3",borderRadius:"0 0 14px 14px"}}>
          <div style={{fontSize:12,color:"#888",marginBottom:10}}>加入任务列表后，每天在"今日焦点"里会出现对应节点，完成时必须记录产出。</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"8px 16px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
            <button onClick={addBlocksToTasks} style={{flex:1,padding:"10px",background:"#0F6E56",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer"}}>
              ✓ 加入任务列表 ({blocks.length}个节点)
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// BLOCKING VIEW: 全局框架视图
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §BLOCKING  全局框架 BlockingView
// ══════════════════════════════════════════
function BlockingView({tasks,onUpdate,onAddTask,geminiKey,onSaveLayers}){
  const [showSetup,setShowSetup]=useState(false);
  const [projName,setProjName]=useState("");
  const [projGoal,setProjGoal]=useState("");
  const [layers,setLayers]=useState([]); // [{id,phase,title,desc,tasks:[id],color,expanded}]
  const [loading,setLoading]=useState(false);
  const [savedLayers,setSavedLayers]=useState(()=>lsGet("zj_blocking_layers",[]));
  const [activeLayer,setActiveLayer]=useState(null);

  function saveLayers(l){setSavedLayers(l);lsSet("zj_blocking_layers",l);if(onSaveLayers)onSaveLayers(l);}

  const PHASES=[
    {id:"skeleton",label:"第1层：骨架跑通",color:"#854F0B",bg:"#FAEEDA",desc:"最粗糙的完整流程，哪怕极简陋"},
    {id:"rough",label:"第2层：粗略完善",color:"#185FA5",bg:"#EBF3FB",desc:"填充主要内容，不管细节质量"},
    {id:"refine",label:"第3层：局部细化",color:"#0F6E56",bg:"#E1F5EE",desc:"逐个打磨细节，提升质量"},
    {id:"polish",label:"第4层：收尾验收",color:"#533AB7",bg:"#EDE8FF",desc:"整合、检查、最终交付"},
  ];

  async function generateBlocking(){
    if(!projName||!geminiKey)return;
    setLoading(true);
    const existingTasks=tasks.filter(t=>!t.done).map(t=>"- "+t.title).join("\n");
    const prompt="你是一个项目拆解专家，专门帮助ADHD用户用Blocking（区块化）工作流管理项目。\n\n"
      +"项目名称："+projName+"\n"
      +(projGoal?"项目目标："+projGoal+"\n":"")
      +(existingTasks?"现有相关任务：\n"+existingTasks+"\n\n":"")
      +"按照4个阶段生成Blocking工作框架：\n"
      +"1. 骨架跑通（Skeleton）：用最简陋的方式完成整个流程，目的是确认思路和时间线是对的\n"
      +"2. 粗略完善（Rough）：填充主要内容，不需要质量，只要覆盖所有模块\n"
      +"3. 局部细化（Refine）：选择重点区域深度打磨\n"
      +"4. 收尾验收（Polish）：整合检查，准备交付\n\n"
      +"每个阶段生成2-4个具体任务。\n"
      +"返回JSON：{\"phases\":[{\"phase\":\"skeleton\",\"tasks\":[{\"title\":\"任务名\",\"desc\":\"具体做什么（一句话）\"}]}]}\n"
      +"只返回JSON，不要其他内容。";
    try{
      const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+geminiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const data=await res.json();
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      const newLayers=PHASES.map(ph=>{
        const phData=parsed.phases?.find(p=>p.phase===ph.id)||{tasks:[]};
        return{id:ph.id+Date.now(),phase:ph.id,title:ph.label,phTasks:phData.tasks||[],expanded:ph.id==="skeleton"};
      });
      const newEntry={id:Date.now(),name:projName,goal:projGoal,layers:newLayers,createdAt:todayStr()};
      const updated=[...savedLayers,newEntry];
      saveLayers(updated);
      setActiveLayer(newEntry.id);
      setShowSetup(false);setProjName("");setProjGoal("");
    }catch(e){alert("生成失败："+e.message);}
    setLoading(false);
  }

  function addPhaseTaskToBoard(phaseName,taskDef,layerId){
    const phObj=PHASES.find(p=>p.id===phaseName);
    onAddTask({
      title:"["+phObj?.label.replace("层：","/")+"] "+taskDef.title,
      project:2,
      priority:phaseName==="skeleton"?"urgent":phaseName==="rough"?"today":"normal",
      due:"",
      notes:taskDef.desc||"",
    });
  }

  const activeEntry=savedLayers.find(l=>l.id===activeLayer)||savedLayers[savedLayers.length-1];

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:14,fontWeight:500}}>🏗 Blocking 框架</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>先跑通全流程骨架，再逐层细化——防止陷入细节</div>
        </div>
        <button onClick={()=>setShowSetup(true)} style={{padding:"7px 14px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:12,cursor:"pointer"}}>
          {geminiKey?"✨ AI生成框架":"+ 新建框架"}
        </button>
      </div>

      {savedLayers.length===0&&(

// DAILY CHECKIN: 每日产出打卡
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §CHECKIN  每日打卡 DailyCheckIn
// ══════════════════════════════════════════
function DailyCheckIn({task,onSave,onClose}){
  const [output,setOutput]=useState(task.checkInOutput||"");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(task.checkInPreview||"");
  const fileRef=useRef();

  // Extract expected output from notes
  const expectedOutput=task.notes?.match(/✅ 产出要求：(.+)/)?.[1]||"记录今天的产出";

  function handleFile(e){
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setPreview(ev.target.result);setFile(f);};
    r.readAsDataURL(f);
  }
  function save(){
    onSave(task.id,{
      checkInOutput:output,
      checkInPreview:preview,
      checkInDate:todayStr(),
      done:true,
    });
    onClose();
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:450,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:460,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}} className="fade-in">
        <div style={{padding:"18px 20px 14px",borderBottom:"0.5px solid #e0ddd6"}}>
          <div style={{fontSize:15,fontWeight:600}}>📤 完成打卡</div>
          <div style={{fontSize:13,color:"#1a1a1a",marginTop:6,fontWeight:500}}>{task.title}</div>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#EBF3FB",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,color:"#185FA5",fontWeight:600,marginBottom:4}}>今天的产出要求</div>
            <div style={{fontSize:13,color:"#185FA5"}}>{expectedOutput}</div>
          </div>
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>描述你今天做了什么 / 完成了什么 <span style={{color:"#A32D2D"}}>*</span></div>
            <textarea value={output} onChange={e=>setOutput(e.target.value)} rows={3}
              placeholder={"简单说明今天的进展，例如：\n完成了基础骨架，角色可以在场景中移动了"}
              style={{width:"100%",padding:"8px 10px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13,lineHeight:1.6,resize:"none"}}/>
          </div>
          <div>
            <div style={{fontSize:12,color:"#555",marginBottom:6,fontWeight:500}}>上传截图/文件（可选）</div>
            {preview?(
              <div style={{position:"relative",marginBottom:8}}>
                {preview.startsWith("data:image")
                  ?<img src={preview} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:8,border:"0.5px solid #e0ddd6"}}/>
                  :<div style={{padding:"10px 14px",background:"#f7f6f3",borderRadius:8,fontSize:13}}>📄 {file?.name||"已上传文件"}</div>
                }
                <button onClick={()=>{setPreview("");setFile(null);}} style={{position:"absolute",top:6,right:6,width:22,height:22,borderRadius:"50%",background:"#A32D2D",color:"#fff",border:"none",cursor:"pointer",fontSize:12,lineHeight:"22px",textAlign:"center"}}>✕</button>
              </div>
            ):(
              <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"10px",border:"1.5px dashed #e0ddd6",borderRadius:8,background:"#fafafa",fontSize:13,color:"#888",cursor:"pointer"}}>
                📎 点击上传截图 / 文件
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*,.pdf,.doc,.docx,.txt,.md" style={{display:"none"}} onChange={handleFile}/>
          </div>
        </div>
        <div style={{padding:"12px 20px",borderTop:"0.5px solid #e0ddd6",display:"flex",gap:8}}>
          <button onClick={onClose} style={{padding:"8px 16px",border:"0.5px solid #ccc",background:"#fff",borderRadius:7,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={save} disabled={!output.trim()} style={{flex:1,padding:"10px",background:output.trim()?"#0F6E56":"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:output.trim()?"pointer":"default"}}>
            ✓ 打卡完成今天
          </button>
        </div>
      </div>
    </div>
  );
}

// FEATURE 2: ENERGY-AWARE TODAY VIEW helper
// ═══════════════════════════════════════════
function getEnergyLevel(){
  const h=new Date().getHours();
  if((h>=10&&h<11)||(h>=15&&h<18)||(h>=21&&h<24))return"high";
  if((h>=11&&h<14)||(h>=18&&h<21))return"low";
  return"medium";
}
function getEnergyLabel(){
  const e=getEnergyLevel();
  return{high:{label:"高能时段",color:"#0F6E56",bg:"#E1F5EE",tip:"适合做需要脑力的任务"},
    medium:{label:"正常时段",color:"#185FA5",bg:"#EBF3FB",tip:"适合推进日常任务"},
    low:{label:"低能时段",color:"#854F0B",bg:"#FAEEDA",tip:"做简单执行类任务，别硬撑"}
  }[e];
}
function getTaskDifficulty(task){
  // Infer from priority + title keywords
  if(task.priority==="urgent")return"hard";
  const easy=["回复","发送","预约","买","整理","打印","转发"];
  if(easy.some(k=>task.title.includes(k)))return"easy";
  return"normal";
}

// FEATURE 3: SPACED REPETITION REVIEW
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §REVIEW  间隔复习面板 ReviewPanel
// ══════════════════════════════════════════
function ReviewPanel({notes,courses,onUpdateNote,onClose}){
  // Collect all notes with AI summaries that are due for review
  const today=todayStr();
  const allNotes=[];
  courses.forEach(c=>{
    (c.notes||[]).forEach(n=>{
      if(n.aiSummary&&n.aiSummary.length>0){
        allNotes.push({...n,courseName:c.title,courseId:c.id});
      }
    });
  });

  const dueNotes=allNotes.filter(n=>{
    if(!n.nextReview)return true; // never reviewed
    return n.nextReview<=today;
  });

  const [idx,setIdx]=useState(0);
  const [revealed,setRevealed]=useState(false);

  if(dueNotes.length===0){
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:14,padding:32,maxWidth:400,width:"100%",textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:12}}>🎉</div>
          <div style={{fontSize:16,fontWeight:500,marginBottom:8}}>今日复习完成！</div>
          <div style={{fontSize:13,color:"#888",marginBottom:20}}>所有笔记都已复习过了</div>
          <button onClick={onClose} style={{padding:"8px 24px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>关闭</button>
        </div>
      </div>
    );
  }

  const note=dueNotes[idx];
  function respond(remembered){
    // Spaced repetition intervals: 1d, 3d, 7d, 14d, 30d
    const intervals=[1,3,7,14,30];
    const lvl=Math.min((note.reviewLevel||0)+(remembered?1:-1),intervals.length-1);
    const nextD=new Date();
    nextD.setDate(nextD.getDate()+intervals[Math.max(0,lvl)]);
    onUpdateNote(note.courseId,note.id,{reviewLevel:Math.max(0,lvl),nextReview:yyyymmdd(nextD),lastReviewed:today});
    if(idx<dueNotes.length-1){setIdx(i=>i+1);setRevealed(false);}
    else onClose();
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:440,boxShadow:"0 12px 48px rgba(0,0,0,.2)"}}>
        <div style={{padding:"16px 20px",borderBottom:"0.5px solid #e0ddd6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:500}}>🔁 间隔复习</span>
          <span style={{fontSize:12,color:"#aaa"}}>{idx+1}/{dueNotes.length}</span>
          <button onClick={onClose} style={{fontSize:16,color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"20px"}}>
          <div style={{fontSize:11,color:"#888",marginBottom:4}}>{note.courseName}</div>
          <div style={{fontSize:14,fontWeight:500,marginBottom:16,color:"#1a1a1a"}}>{note.title}</div>
          {!revealed?(
            <button onClick={()=>setRevealed(true)} style={{width:"100%",padding:"12px",background:"#f7f6f3",border:"0.5px dashed #ccc",borderRadius:8,fontSize:13,cursor:"pointer",color:"#666"}}>
              点击显示关键要点
            </button>
          ):(
            <div style={{background:"#EBF3FB",borderRadius:8,padding:"12px 14px",marginBottom:16}}>
              {note.aiSummary.map((p,i)=><div key={i} style={{fontSize:13,color:"#1a1a1a",marginBottom:4}}>• {p}</div>)}
              {note.aiAction&&<div style={{fontSize:13,color:"#0F6E56",marginTop:6,fontWeight:500}}>→ {note.aiAction}</div>}
            </div>
          )}
        </div>
        {revealed&&(
          <div style={{padding:"0 20px 20px",display:"flex",gap:10}}>
            <button onClick={()=>respond(false)} style={{flex:1,padding:"10px",background:"#FCEBEB",color:"#A32D2D",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:500}}>😅 还没记住</button>
            <button onClick={()=>respond(true)} style={{flex:1,padding:"10px",background:"#E1F5EE",color:"#0F6E56",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:500}}>✓ 记住了</button>
          </div>
        )}
      </div>
    </div>
  );
}

// FEATURE 4: WEEKLY PLAN VIEW
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §WEEKLY  本周计划视图 WeeklyView
// ══════════════════════════════════════════
function WeeklyView({tasks,onUpdate,onAddTask}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [showWeekPlan,setShowWeekPlan]=useState(false);
  const [weekNote,setWeekNote]=useState(()=>lsGet("week_note_"+getWeekKey(0),""));

  function getWeekKey(offset){
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1+offset*7);
    return yyyymmdd(d);
  }
  function getWeekDays(offset){
    const days=[];
    const monday=new Date();
    monday.setDate(monday.getDate()-((monday.getDay()+6)%7)+offset*7);
    for(let i=0;i<7;i++){
      const d=new Date(monday);d.setDate(d.getDate()+i);
      days.push(yyyymmdd(d));
    }
    return days;
  }

  const days=getWeekDays(weekOffset);
  const today=todayStr();
  const DAY_NAMES=["周一","周二","周三","周四","周五","周六","周日"];

  function getTasksForDay(day){
    return tasks.filter(t=>t.due===day);
  }
  function moveTask(taskId,newDay){
    const t=tasks.find(x=>x.id===taskId);
    if(t)onUpdate({...t,due:newDay});
  }

  const totalPending=tasks.filter(t=>!t.done&&days.includes(t.due)).length;
  const totalDone=tasks.filter(t=>t.done&&days.includes(t.due)).length;

  return(
    <div>
      {/* Week nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"none",border:"0.5px solid #e0ddd6",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,color:"#666"}}>← 上周</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:500}}>{weekOffset===0?"本周":weekOffset===1?"下周":weekOffset===-1?"上周":days[0]+" 那周"}</div>
          <div style={{fontSize:11,color:"#aaa",marginTop:2}}>{totalPending}个待办 · {totalDone}个已完成</div>
        </div>
        <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:"none",border:"0.5px solid #e0ddd6",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,color:"#666"}}>下周 →</button>
      </div>

      {/* Week note */}
      <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
        <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>本周目标（一句话）</div>
        <input value={weekNote} onChange={e=>{setWeekNote(e.target.value);lsSet("week_note_"+getWeekKey(weekOffset),e.target.value);}} placeholder="这周最重要的是什么？" style={{width:"100%",border:"none",outline:"none",fontSize:13,color:"#1a1a1a"}}/>
      </div>

      {/* 7-day grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
        {days.map((day,di)=>{
          const dayTasks=getTasksForDay(day);
          const isToday=day===today;
          const isPast=day<today;
          return(
            <div key={day} style={{background:"#fff",border:`0.5px solid ${isToday?"#185FA5":"#e0ddd6"}`,borderRadius:8,padding:"8px 6px",minHeight:100}}>
              <div style={{textAlign:"center",marginBottom:6}}>
                <div style={{fontSize:11,color:isToday?"#185FA5":isPast?"#bbb":"#666"}}>{DAY_NAMES[di]}</div>
                <div style={{fontSize:16,fontWeight:isToday?700:400,color:isToday?"#185FA5":isPast?"#bbb":"#1a1a1a",background:isToday?"#EBF3FB":"transparent",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto"}}>
                  {new Date(day+"T00:00:00").getDate()}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>

// FEATURE 5: HABIT TRACKER
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §HABITS  习惯追踪 HabitTracker
// ══════════════════════════════════════════
function HabitTracker({habits,onUpdateHabits}){
  const today=todayStr();
  const [showManage,setShowManage]=useState(false);
  const [newHabit,setNewHabit]=useState("");

  const DEFAULT_HABITS=[
    {id:1,name:"学习",icon:"📚",color:"#185FA5"},
    {id:2,name:"运动",icon:"🏃",color:"#0F6E56"},
    {id:3,name:"早睡",icon:"🌙",color:"#533AB7"},
  ];
  const habitList=habits&&habits.length>0?habits:DEFAULT_HABITS;

  function toggleHabit(habitId){
    const updated=habitList.map(h=>{
      if(h.id!==habitId)return h;
      const log=h.log||{};
      const newLog={...log,[today]:!log[today]};
      return{...h,log:newLog};
    });
    onUpdateHabits(updated);
  }
  function addHabit(){
    if(!newHabit.trim())return;
    const icons=["⭐","🎯","💪","📖","🧘","🍎","💤","✏️"];
    const colors=["#185FA5","#0F6E56","#993C1D","#533AB7","#854F0B"];
    const h={id:Date.now(),name:newHabit.trim(),icon:icons[Math.floor(Math.random()*icons.length)],color:colors[Math.floor(Math.random()*colors.length)],log:{}};
    onUpdateHabits([...habitList,h]);
    setNewHabit("");
  }
  function removeHabit(id){onUpdateHabits(habitList.filter(h=>h.id!==id));}

  // Get streak
  function getStreak(habit){
    const log=habit.log||{};
    let streak=0;
    const d=new Date();
    while(true){
      const k=yyyymmdd(d);
      if(!log[k])break;
      streak++;
      d.setDate(d.getDate()-1);
    }
    return streak;
  }

  // Last 14 days for mini heatmap
  function getLast14(habit){
    const log=habit.log||{};
    return Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return{day:yyyymmdd(d),done:!!log[yyyymmdd(d)]};});
  }

  return(
    <div style={{background:"#fff",border:"0.5px solid #e0ddd6",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:500}}>习惯打卡</span>
        <button onClick={()=>setShowManage(v=>!v)} style={{fontSize:12,color:"#185FA5",background:"none",border:"none",cursor:"pointer"}}>{showManage?"完成":"管理"}</button>
      </div>
      {habitList.map(h=>{
        const done=!!(h.log||{})[today];
        const streak=getStreak(h);
        const last14=getLast14(h);
        return(
          <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <button onClick={()=>toggleHabit(h.id)} style={{width:36,height:36,borderRadius:10,border:`2px solid ${done?h.color:"#e0ddd6"}`,background:done?h.color:"#fff",color:done?"#fff":"#aaa",fontSize:16,cursor:"pointer",flexShrink:0,transition:"all .15s"}}>
              {done?"✓":h.icon}
            </button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,fontWeight:500,color:"#1a1a1a"}}>{h.name}</span>
                {streak>0&&<span style={{fontSize:11,color:h.color}}>🔥{streak}天</span>}
              </div>
              <div style={{display:"flex",gap:2,marginTop:3}}>
                {last14.map((d,i)=>(
                  <div key={i} style={{width:8,height:8,borderRadius:2,background:d.done?h.color:"#f0ede8"}}/>
                ))}
              </div>
            </div>
            {showManage&&<button onClick={()=>removeHabit(h.id)} style={{color:"#ddd",background:"none",border:"none",cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>}
          </div>
        );
      })}
      {showManage&&(
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input value={newHabit} onChange={e=>setNewHabit(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="新习惯名称" style={{flex:1,padding:"6px 8px",border:"0.5px solid #ccc",borderRadius:6,fontSize:13}}/>
          <button onClick={addHabit} style={{padding:"6px 12px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer"}}>+添加</button>
        </div>
      )}
    </div>
  );
}

// SOUND ENGINE — cute Web Audio tones
// ═══════════════════════════════════════════
// ══════════════════════════════════════════
// §SOUND  音效引擎 SoundEngine
// ══════════════════════════════════════════
const SoundEngine=(()=>{
  let ctx=null;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  function tone(freq,dur,type="sine",vol=0.18,delay=0){
    try{
      const c=getCtx();const g=c.createGain();const o=c.createOscillator();
      o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);
      g.gain.setValueAtTime(0,c.currentTime+delay);
      g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);
      o.connect(g);g.connect(c.destination);
      o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+0.05);
    }catch(e){}
  }
  return{
    // step start: gentle chime ding-ding
    stepStart:()=>{tone(880,0.18,"sine",0.14);tone(1108,0.22,"sine",0.10,0.12);},
    // countdown beep: soft heartbeat last 3s
    countdownBeep:()=>{tone(440,0.08,"sine",0.08);},
    // step done: rising happy ding
    stepDone:()=>{tone(523,0.12,"sine",0.15);tone(659,0.12,"sine",0.13,0.1);tone(784,0.25,"sine",0.18,0.2);},
    // routine complete: cheerful melody
    routineDone:()=>{
      [[523,0],[659,0.13],[784,0.26],[1047,0.42],[784,0.58],[880,0.72],[1047,0.88]].forEach(([f,d])=>tone(f,0.2,"sine",0.16,d));
    },
    // task slot linked: soft pop
    taskLinked:()=>{tone(660,0.08,"triangle",0.12);tone(880,0.14,"triangle",0.1,0.07);},
  };
})();

  const idle=[
    [_,B,B,_,_,_,_,_,B,B,_,_],  // ear tips
    [B,B,B,B,_,_,_,B,B,B,B,_],  // ears

    [B,B,E,B,B,B,B,B,E,B,B,_],  // eyes
    [B,B,B,B,N,B,B,N,B,B,B,_],  // nose + whisker dots
    [B,B,B,W,W,W,W,W,B,B,B,_],  // muzzle
    [_,B,B,B,B,B,B,B,B,B,_,_],  // chin
    [_,B,W,W,W,W,W,W,W,B,_,_],  // upper body
    [_,B,W,W,W,W,W,W,W,B,_,_],  // body
    [_,B,W,W,W,W,W,W,W,B,_,_],  // body
    [_,B,B,_,B,B,B,_,B,B,_,_],  // front legs
    [_,A,A,_,A,A,A,_,A,A,_,_],  // paws
    [_,_,_,_,_,_,_,_,_,_,B,B],  // tail base
    [_,_,_,_,_,_,_,_,_,_,_,B],  // tail tip
  ];
  // walk frame: tail up, one paw lifted
  const walk=[
    [_,B,B,_,_,_,_,_,B,B,_,_],
    [B,B,B,B,_,_,_,B,B,B,B,_],
    [B,B,B,B,B,B,B,B,B,B,B,_],
    [B,B,E,B,B,B,B,B,E,B,B,_],
    [B,B,B,B,N,B,B,N,B,B,B,_],
    [B,B,B,W,W,W,W,W,B,B,B,_],
    [_,B,B,B,B,B,B,B,B,B,_,_],
    [_,B,W,W,W,W,W,W,W,B,_,_],
    [_,B,W,W,W,W,W,W,W,B,_,_],
    [_,B,W,W,W,W,W,W,W,B,_,_],
    [_,B,B,_,_,B,B,B,_,B,_,_],  // one paw lifted
    [_,A,A,_,_,A,A,A,_,A,_,_],
    [_,_,_,_,_,_,_,_,_,B,B,_],  // tail curved up
    [_,_,_,_,_,_,_,_,_,_,B,_],
  ];
  // sleep: curled up, eyes closed (lines for eyes)
  const sleep=[
    [_,_,_,_,_,_,_,_,_,_,_,_],
    [_,_,B,B,_,_,B,B,_,_,_,_],
    [_,B,B,B,B,B,B,B,B,_,_,_],

    [_,B,B,B,B,N,B,B,B,B,_,_],

    [_,_,_,_,_,_,_,_,_,_,_,_],

  ];
  return{idle,walk,sleep,celebrate:idle,sad:sleep};

function PixelCat({state="idle",size=3,darkMode=false}){
  const pal=useCatPalette();
  const frames=buildCatFrames(pal);
  const [frame,setFrame]=useState(0);
  const [stars,setStars]=useState([]);

  // Frame cycling
  useEffect(()=>{
    if(state==="walk"){
      const t=setInterval(()=>setFrame(f=>(f+1)%2),300);
      return()=>clearInterval(t);
    }
    setFrame(0);
  },[state]);

  // Walk: no horizontal drift — just frame swap

  // Celebrate stars
  useEffect(()=>{
    if(state==="celebrate"){
      const make=()=>[...Array(5)].map((_,i)=>({id:Date.now()+i,x:Math.random()*80-10,delay:Math.random()*0.4}));
      setStars(make());
      const t=setInterval(()=>setStars(make()),1200);
      return()=>clearInterval(t);
    }
    setStars([]);
  },[state]);

  const pixelMap={idle:frames.idle,walk:frames[frame===0?"idle":"walk"],celebrate:frames.idle,sleep:frames.sleep,sad:frames.sleep,run:frames.walk};
  const pixels=pixelMap[state]||frames.idle;

  const anim={
    idle:"cat-idle 2.5s ease-in-out infinite",
    walk:"cat-walk-bob 0.5s ease-in-out infinite",
    celebrate:"cat-celebrate 0.5s ease-in-out infinite",
    sleep:"cat-sleep 3s ease-in-out infinite",
    sad:"cat-sad 2s ease-in-out infinite",
    run:"none",
  };

  return(
    <div style={{position:"relative",display:"inline-block"}}>
      {state==="celebrate"&&stars.map(s=>(
        <div key={s.id} style={{position:"absolute",top:-16,left:s.x+"%",fontSize:10,animation:`star-pop 1.2s ${s.delay}s ease-out forwards`,pointerEvents:"none"}}>
          {["⭐","✨","💫","🌟"][Math.floor(Math.random()*4)]}
        </div>
      ))}
      <div style={{animation:anim[state]}}>
        <PixelGrid pixels={pixels} cellSize={size}/>
      </div>
      {state==="sleep"&&(
        <div style={{position:"absolute",top:-8,right:-4,fontSize:10,animation:"float-up 2s ease-out infinite",opacity:0}}>💤</div>
      )}
    </div>
  );
}

// Status cat widget — lives in today view, reflects task completion
function StatusCat({tasks,darkMode}){
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const overdue=tasks.filter(t=>isOverdue(t.due)&&!t.done).length;
  const todayFocus=tasks.filter(t=>!t.done&&(t.priority==="urgent"||t.priority==="today")).length;
  const ratio=total>0?done/total:0;

  let state="idle",label="",color="#888";
  if(total===0){state="sleep";label="今天还没有任务";color="#aaa";}
  else if(ratio>=1){state="celebrate";label="今天全部完成啦！";color="#0F6E56";}
  else if(overdue>2){state="sad";label=`${overdue}个任务逾期了...`;color="#A32D2D";}
  else if(todayFocus===0&&ratio>0.5){state="walk";label="继续走！还不错~";color="#185FA5";}
  else if(ratio>0){state="walk";label=`已完成 ${done}/${total}`;color="#185FA5";}
  else{state="idle";label="等你开始今天~";color="#854F0B";}

  return(
    <div style={{background:darkMode?"rgba(255,255,255,.05)":"#fff",border:`0.5px solid ${darkMode?"rgba(255,255,255,.1)":"#e0ddd6"}`,borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
      <PixelCat state={state} size={3} darkMode={darkMode}/>
      <div style={{flex:1}}>
        <div style={{fontSize:13,color:color,fontWeight:500,marginBottom:2}}>{label}</div>
        {total>0&&(
          <div style={{height:4,background:darkMode?"rgba(255,255,255,.1)":"#f0ede8",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${ratio*100}%`,background:ratio>=1?"#0F6E56":ratio>0.5?"#185FA5":"#854F0B",borderRadius:2,transition:"width .6s ease"}}/>
          </div>
        )}
      </div>
    </div>
  );
}
